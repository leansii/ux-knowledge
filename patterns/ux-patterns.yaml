- id: Breadcrumbs
  name: Breadcrumbs
  problem: Users navigating deep hierarchies lose track of where they are and how to go back.
  source_problem: >-
    The user needs to know their location in the website's hierarchical structure in order to possibly
    browse back to a higher level in the hierarchy.
  when_to_use:
  - Sites with 3+ levels of hierarchy
  - E-commerce categories, documentation, file systems
  solution: |
    Show the path from home to current page as clickable links.
    Separate levels with > or /. Current page is the last item, non-clickable.
    Place at top of content area, below main navigation.
  rationale: |-
    Breadcrumbs serve as an effective visual aid, indicating the location of the user within the website’s hierarchy, making them a great source of contextual information for landing pages. Also, breadcrumbs allow for easy navigation to higher-level pages. Breadcrumbs inform users of their location in relation to the entire sites hierarchy. The structure of the website is more easily understood when it is laid out in a breadcrumb than if it is put into a menu. Breadcrumbs take up minimal space and even though not all users use them, they still hint the structure of the website and the current location of the page in question. The term ‘breadcrumb’ is deceptive, as it implies the history of how the user got to that page. A more correct term would describe the current location’s place in the hierarchy of the website.
    This article has been commented 17 times.
  avoid_when:
  - Flat site structure with no hierarchy
  related_patterns: [HomeLink, NavigationTabs]
  tags: [navigation, hierarchy, wayfinding]
  source_url: https://ui-patterns.com/patterns/Breadcrumbs
  votes:
