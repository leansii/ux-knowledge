- id: AdaptableView
  name: Adaptable View
  problem: Different users prefer different ways of viewing the same content (list, grid, map, table).
  source_problem: You want to let the site's presentation of content fit the specific needs of the user.
  when_to_use:
  - File managers, product catalogs
  - Search results, real estate listings
  solution: |
    Provide view toggle buttons (grid/list/map icons).
    Remember the user's preference. Ensure all views show the same data.
  rationale: >-
    By providing a mechanism to present different views of content to the user, you can tailor usability
    and the experience you want to give your users to their specific needs.
  discussion: |-
    At first it may seem that a style adjuster is a superfluous feature that falls one step short of showing off. After all, don’t users already have control over the presentation of content through the means of user stylesheets and the browser’s built in font resizing? Well, just because a user has the ability to use these tools, doesn’t mean that they have the knowledge or willingness to get their hands dirty with them. Enter the on page adjustable style control. It can give a web designer the ability to extend a browser’s accessibility support and provide them in a much more convenient way. Beyond accessibility concerns, style adjusters can also cure some of the common annoyances that almost everyone deals with. One example of this is when a site forces a user to use the mobile version. A simple button that switches the site to the full featured version is enough to alleviate the feeling of being trapped.
    This article has been commented 7 times.
  avoid_when:
  - Only one view makes sense for the content type
  related_patterns: [cards, ArticleList, Thumbnail]
  tags: [navigation, content, view-switching]
  source_url: https://ui-patterns.com/patterns/AdaptableView
  votes:
    up: 11
    down: 90
- id: ArticleList
  name: Article List
  problem: Multiple content items need to be scannable so users can find what interests them.
  source_problem: >-
    The user needs guidance in finding editorial content of interest, which hierarchical navigation alone
    does not accomplish.
  when_to_use:
  - Blog posts, news feeds, search results
  - Any list of content with title + summary
  solution: |
    Show title, excerpt, metadata (date, author, category) for each item.
    Include a thumbnail if visual. Consistent layout per item.
    Most recent or relevant items first.
  rationale: >-
    On a website delivering editorial content, the article teaser is one of the most important design
    elements besides the design of the article itself. The article teaser is part of an article list,
    and its main purpose to lure visitors to keep on browsing. The most pure form of article lists is
    seen on magazine and news websites, but the convention is also relevant to all other sites trying
    to tease another click out of the visitor.
  discussion: >-
    Think from the user’s perspective – not your own It should be no surprise that you should put yourself
    in the shoes of the user. An article that will get many hits or become publicly popular with your
    audience is not necessarily the one you spend the most time on, or the one that you find interesting.
    Constantly evaluate an article’s value from the reader’s perspective when deciding to highlight it
    or not. Put yourself in the users’ shoes when you decide on what data you want to present to them.
    Do you want to have different kinds of article list items – for instance one for galleries, one for
    blog posts, one for events, and one feature articles? It might make sense. Think about how you can
    make it easier for the user and stop forcing the user to think like you.
  avoid_when:
  - Content is better represented as cards or a grid
  related_patterns: [Pagination, ContinuousScrolling, cards]
  tags: [navigation, content, listing]
  source_url: https://ui-patterns.com/patterns/ArticleList
  votes:
    up: 9
    down: 132
- id: Tag
  name: Tag
  problem: Content doesn't fit neatly into a single category and needs flexible cross-cutting labels.
  source_problem: Items need to be labelled, categorized, and organized using keywords that describe them.
  when_to_use:
  - Blog posts, products, bookmarks
  - Any content that belongs to multiple categories
  solution: |
    Allow multiple tags per item. Make tags clickable to filter content.
    Show tags as colored pills or labels. Support user-created tags if appropriate.
  rationale: |-
    Tagging helps make it easier for users to find their own content and for their peers to discover content related to their interests. Tags are relevant keywords associated with or assigned to a piece of information. Tags are often used on social websites, where users can upload their own content. Here, tags are used to let users organize and categorize their own data in the public sphere. In this way, tags can be seen as a bottom-up categorization of data rather than a top-down categorization of data, where the creators of the site define the hierarchy data is submitted to.
    This article has been commented 1 time.
  avoid_when:
  - Strict single-category taxonomy is required
  related_patterns: [TagCloud, categorization, LiveFilter]
  tags: [navigation, content, taxonomy]
  source_url: https://ui-patterns.com/patterns/Tag
  votes:
