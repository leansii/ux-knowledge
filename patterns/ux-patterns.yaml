- id: self-monitoring
  name: Self-Monitoring
  problem: Users can't improve what they can't measure.
  source_problem: Enable users to track the behavior they want to change
  when_to_use:
  - Fitness, finance, learning apps
  - Productivity tools, habit trackers
  solution: |
    Show personal stats, streaks, and trends over time.
    Provide charts and summaries. Allow setting personal goals.
    Weekly/monthly reports of activity.
  rationale: >-
    Make it easy for users to track performance or status to help them achieve predetermined goals or
    outcomes. Letting users understand how well they are performing, willl increase the likelihood of
    continuing to produce the behavior. Self-monitoring can help users learn about themselves and can
    be intrinsically motivating, but will almost always fail to get people to do things they do not want
    to do.
  discussion: |-
    Measurement paradox. We tend to enjoy experiences less when tracking them. While measuring our performance may increase it, it also comes with the risk of decreasing how much we enjoy measured activities and how much we want to keep on doing them.
    Sources Self-monitoring is a concept introduced in the 1970s by social psychologist, Mark Snyder, that refers to our ability to regulate behavior to accommodate social situations. In 2002, Stanford professor, BJ Fogg, included Self-Monitoring as a persuasion strategy in his seminal book on Persuasive Technology. 1 Snyder, M. (1974). Self-monitoring of expressive behavior. Journal of Personality and Social Psychology, 30(4), 526–537. 2 B. J. Fogg (2002). Persuasive technology: using computers to change what we think and do. Ubiquity, Volume 2002, Issue December 3 Self Monitoring at Wikipedia.org 4 Self-Determination Theory by Anders Toxboe at Learning Loop
  avoid_when:
  - Tracking would create anxiety rather than motivation
