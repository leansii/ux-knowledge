- id: framing
  name: Framing
  problem: The same information presented differently leads to different user decisions.
  source_problem: The way a fact is presented greatly alters our judgement and decisions
  when_to_use:
  - Pricing pages (save 20% vs. pay $X less)
  - Feature comparisons, risk communication
  solution: |
    Frame information to emphasize the desired perspective.
    "95% uptime" vs "only 18 days of downtime per year."
    Use positive framing for benefits, loss framing for urgency.
  rationale: |-
    The same piece of information can be reframed substantially to influence decision-making through words, numbers, and imagery. The same fact can generally be framed as a loss or gain and as we try to avoid risks when a choice is framed positively and seek risk when framed negatively, decisions will also vary. An implied story makes more desirable choices seem obvious. We determine value by comparing and contrasting things. The value of particular items can seem very different in various situations, depending on the comparison. An implied story makes more desirable choices seem obvious. We tend to avoid risk when a positive frame is presented but seek risks when a negative frame is presented
    Sources The Framing effect is explained by Prospect Theory as put forward by Tversky & Kahneman in 1981. 1 Tversky, A., & Kahneman, D. (1981). The framing of decisions and the psychology of choice. Science, 211(4481), 453–458 2 Gamliel & Herstein (2007). The effect of framing on willingness to buy private brands. Journal of Consumer Marketing 24(6):334-339 3 Framing at Wikipedia.org 4 The Framing Effect at Learning Loop
  avoid_when:
  - Framing would be deceptive or misleading
  related_patterns: [Anchoring, decoy-effect, Loss-aversion]
