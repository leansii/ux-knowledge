- id: InlineHelpBox
  name: Inline Help Box
  problem: Users need help understanding a feature without leaving the page or opening docs.
  source_problem: The user needs assistive information located close to the interaction they are about
    to perform.
  when_to_use:
  - Complex form fields
  - Features that are used infrequently
  solution: |
    Show a small help icon (?) or info icon next to the element.
    On click/hover, display a tooltip or expandable box with explanation.
    Keep help text concise and action-oriented.
  rationale: |-
    Providing your users with assistive information, located close to an interaction, makes accessing and consuming instructional info simple and easy. In Line help boxes are far more engaging than reading disconnected FAQ’s or help sections. By allowing the user to easily close/hide each help box, the user is not bothered with unnecessary information once it has been understood.
    This article has been commented 4 times.
  avoid_when:
  - The UI is self-explanatory
  - Help content would be distracting for most users
