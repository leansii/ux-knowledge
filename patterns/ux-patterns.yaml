- id: Chunking
  name: Chunking
  problem: Large amounts of information overwhelm working memory (7±2 items).
  source_problem: Information grouped into familiar, manageable units is more easily processed and remembered
  when_to_use:
  - Long forms, phone numbers, data displays
  - Navigation menus, feature lists
  solution: |
    Group related items into chunks of 3-5. Use visual separators.
    "123-456-7890" is easier than "1234567890."
    Organize settings into categories, steps into groups.
  rationale: |-
    A chunk is a unit of information in short-term memory – a string of letters, a word, or a series or numbers. By chunking information into small bits we seek to accommodate the limits of our short-term memory. The goal of chunking is to aid processing of information. Chunking helps the process by breaking longer strings of information into bit-size chunks that are easier to remember and grasp – especially when the memory is faced with competing stimuli4.
    Sources In 1956, George Miller produced evidence that people can remember about seven chunks in short term memory, which was later corrected to three to five items in later research. Using this finding, chunking large sets of data into smaller chunks, makes them more managable to digest, processing one chunk at a time. 1 Universal Principles of Design, William Lidwell et. al., Rockport Publishers, 2003 2 “The Magical Number Four in Short-Term Memory: A Reconsideration of Mental Storage Capacity” by Nelson Cowan, Behavioral and Brain Sciences, 2001. 3 “The Magical Number Seven, Plus or Minus Two: Some Limits on Our Capacity for Processing Information” by George Miller, The Psychological Review, 1956, vol. 63, p. 71-97. 4 Chunking on interaction-design.org 5 “Chunks and Chunking ":https://www.nngroup.com/articles/chunking/#:~:text=UX%2DDefinition%3A%20In%20the%20field,mess%20of%20atomic%20information%20items by Kate Moran 6 Chunking design technique at Learning Loop
  avoid_when:
  - Information is already naturally chunked
  related_patterns: [ProgressiveDisclosure, categorization, Wizard]
  tags: [persuasion, comprehension, organization]
  source_url: https://ui-patterns.com/patterns/Chunking
