- id: Pagination
  name: Pagination
  problem: Large datasets can't be loaded or displayed all at once without performance issues.
  source_problem: The user needs to view a subset of sorted data in a comprehensible form.
  when_to_use:
  - Search results, product listings
  - Any dataset over ~20-50 items
  solution: |
    Show page numbers with previous/next buttons.
    Display current page and total count. Allow jumping to first/last page.
    Show items per page selector if appropriate.
  rationale: |-
    Reduce perceived complexity by parting large datasets into smaller chunks that are more manageable for the user. Significant technical performance can be achieved by only having to return subsets of the overall data. First and foremost, pagination parts large datasets into smaller bits that are manageable for the user to read and cope with. Secondly, pagination controls conveys information to the user about, how big the dataset is, and how much is left to read or view and how much have they already viewed. Pagination provides the user with a natural break from reading or scanning the contents of the dataset, and allows them to re-evaluate whether they wish to continue looking through more data, or navigate away from the page. This is also why pagination controls are most often placed below the list: to provide the user with an option to continue reading through the larger dataset.
    This article has been commented 5 times.
  avoid_when:
  - Users benefit from continuous browsing (use infinite scroll)
  - Dataset is small enough to show entirely
  related_patterns: [ContinuousScrolling, TableFilter, SortByColumn]
  tags: [navigation, content, paging]
  source_url: https://ui-patterns.com/patterns/Pagination
  votes:
    up: 17
    down: 173
- id: categorization
  name: Categorization
  problem: Content needs hierarchical organization so users can browse by topic.
  source_problem: The user wants to make sense of content by browsing and grouping them into categories
  when_to_use:
  - E-commerce product taxonomy
  - Documentation, knowledge bases
  solution: |
    Define a clear category hierarchy. Allow browsing by category.
    Show category counts. Use faceted navigation for complex taxonomies.
  rationale: |-
    Where tagging works to explain tiny distinctions and details in content, categories represent broader and more easily explained distinctions. Having multiple categories help to wall section off from each other and help suggest what content is to be found, needed and appropriate for a site. Categorization is the process in which ideas and objects are recognized, differentiated, and understood1. Categories help us make sense of the world faster and more easily. We seek to categorize all we experience in an attempt to explain how the world works – how our knowledge is represented in the real world.
    Sources 1 Categorization on Wikipedia.org
  avoid_when:
  - Content is better served by search than browsing
  related_patterns: [Tag, Breadcrumbs, AccordionMenu]
  tags: [navigation, content, organization]
  source_url: https://ui-patterns.com/patterns/categorization
  votes:
    up: 5
