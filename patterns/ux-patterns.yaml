- id: Scarcity
  name: Scarcity
  problem: Users don't feel urgency when supply seems unlimited.
  source_problem: If something is promoted as being scarce, we perceive it as more desirable and more
    valuable
  when_to_use:
  - E-commerce, ticket sales, bookings
  - Limited edition products
  solution: |
    Show remaining stock: "Only 3 left in stock."
    Display how many others are viewing the same item.
    Use honest scarcity — fake scarcity destroys trust.
  rationale: >-
    Scarcity is often used to encourage purchasing behaviors. It prevents customers from taking the time
    to think and instead pushes them into making a decision immediately. Limit resources, durations, or
    intervals to make users value an asset more (whether it is a potential purchase or an action which
    they can carry out). Scarcity is the condition where there is an inadequate amount of something to
    please everybody. The feeling of a shortage can be invoked simply by indicating that there is not
    enough for everybody. If something is scarce, it will seem more desirable and more valuable to us.
    According to Cialdini1, the influence scarcity has on us comes from two things: (1) our weakness for
    shortcuts and the fact that (2) we hate to loose the freedoms we already have. Our weakness for shortcuts
    When things are difficult to possess we typically connect it to being better than those that re easy
    to possess. We use an items availability to quickly determine its quality and value. By following
    the scarcity principle we usually and efficiently make correct and quick decisions. We hate to loose
    the freedoms we already have As opportunities become less available, the need to retain those opportunities
    make us desire them significantly more. As we loose freedom and choice, we put more value in the them.
    Because we hate to loose the freedoms we already have, we react by making quick decisions. We react
    against interferences of removing access to items by wanting and trying to possess the item more than
    before.
  discussion: |-
    Optimal conditions for scarcity to work Newly experienced scarcity is the most powerful. People see a thing as more desirable when it has recently become less available than when it has been scarce all along. Furthermore, scarcity created by social demand is significantly stronger than scarcity by mistake. This highlights the importance of competition in the pursuit of limited resources. We not only want the same item more when it is scarce – we want it most when we are in competition for it. Retailers have tried taking advantage of this tendency by teaching us about products that are in popular demand and that we should hurry to buy. This is not only playing on the power of social proof – that we think the product is good because other people think so – but also that we are in direct competition with other people for the item. A product doesn’t have to be good or of high quality for scarcity to work. We desire a scarce product not because we want to experience it, but because we want to possess it. Make a decision today or loose out forever Simply put, people want more of those things they can have less of. The scarcity principle focuses on forcing people into making a decision, within a small window of time, by emphasizing the future unavailability of something. If you give people all the time in the world to make a decision, they will either take up every minute of that time, or never make a decision at all. By implementing scarcity techniques, you are essentially forcing users to take action. People will act more quickly under pressure from the Scarcity principle, as they are fearful they will lose the opportunity forever. Scarcity forces us to prioritize a decision, so that it becomes more important, more desirable, and more urgent than other decisions, that are unlimited in nature. It’s not enough simply to tell people about the benefits they will gain, if they choose your product or services, you will also need to point out what’s unique about your proposition, and what they stand to loose, if they fail to consider your proposal. The successful application of the Scarcity principle in design and marketing campaigns, is preventing users to take time to think about their decision, and instead try to push people into making a decision, immediately. By playing on scarcity to push decisions, you are utilizing the power of Loss Aversion. Origins of the term Scarcity The term scarcity was first used in French in the 1300s. Since, it became a basic principle in micro economics, examined by Adam Smith in the 1700s. In regards to psychology, Robert Cialdini popularized its persuasive effects in his seminal book on influence and persuasion.
    Sources 1 Cialdini, R. (1984), Influence: The Psychology of Persuasion, New York: HarperCollins 2 Loss Aversion Design pattern 3 Six persuasion tips from Autoquake 4 Martijn Schins (2014), The influence of quantity scarcity and time restrictions on consumer preference and purchase intention 5 Scarcity at wikipedia.org 6 The psychology of Scarcity by Amy Novotney 7 Lynn, Michael (1989). “Scarcity effects on desirability: Mediated by assumed expensiveness?”. Journal of Economic Psychology. 10 (2): 257–274 8 Scarcity Bias at Learning Loop
  avoid_when:
  - Supply is genuinely unlimited
  - Artificial scarcity would feel manipulative
  related_patterns: [Limited-duration, Loss-aversion, Social-proof]
  tags: [persuasion, scarcity, urgency]
  source_url: https://ui-patterns.com/patterns/Scarcity
