- id: Recognition-over-recall
  name: Recognition over Recall
  problem: Users struggle to remember exact terms, paths, or options from memory.
  source_problem: We are better at recognizing things previously experienced than we are at recalling
    them from memory
  when_to_use:
  - Navigation, search interfaces
  - Form fields with known options
  solution: |
    Show options for users to recognize rather than requiring them to recall.
    Use dropdowns, suggestion lists, visual menus, and recent items.
    "Pick from these" > "Type what you remember."
  rationale: |-
    Recognition is triggered by context. Weâ€™re quite good at it. With the radio on, we can sing the lyrics to thousands of songs. Recall works without context. At this, weâ€™re terribly bad. With the radio off, our memories inevitably fade to black. This imbalance is shared across our senses, and itâ€™s a huge factor in design3. Recognition vs Recall It’s easier to click and choose from a variety of options than to write out those same things from memory. Recognition tasks provide memory cues that facilitate searching through memory why it is easier to recognize things than recall them from memory. It’s easier to provide a correct answer for a multiple-choice question than it is for a fill-in-the-blank question as the multiple-choice questions provide a list of possible answers1. Open-ended short answer questions provide no such memory cues, why the range of possibilities is much greater. Recognition doesn’t involve origin, context, or relevance Recognition memory is much easier to access than recall memory. While recognition memory is obtained through exposure, recall memory is obtained through learning. Recognition does not necessarily involve memory about origin, context, or relevance while recall usually involves some combination of of memorization, practice and application. Furthermore recognition memory is retained for longer periods of time than recall memory – it is harder to recall the name of an acquaintance than it is to recognize it when heard1.
    Sources 1 Universal Principles of Design, William Lidwell et. al., Rockport Publishers, 2003 2 Recognition over recall at Getmentalnotes.com 3 Recognition Over Recall on flickr.com by Peter Morville 4 Recognition over Recall on the Nielsen Norman group website 5 Principles of Design #38 â€“ Recognition Over Recall 6 Bettman, J. R. (1979). Memory Factors in Consumer Choice: A Review, Journal of Marketing (pre-1986), pg. 37 7 Recognition over Recall design technique at Learning Loop
  avoid_when:
  - The option space is too large for browsing
  related_patterns: [Autocomplete, ShortcutDropdown, favorites]
  tags: [persuasion, comprehension, usability]
  source_url: https://ui-patterns.com/patterns/Recognition-over-recall
