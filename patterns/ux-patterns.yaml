- id: Sequencing
  name: Sequencing
  problem: The order in which information or steps are presented affects comprehension and outcomes.
  source_problem: Break down complex tasks into small and easily completed actions
  when_to_use:
  - Onboarding flows, tutorials
  - Pricing page layout, form field ordering
  solution: |
    Order information from most to least important (inverted pyramid).
    In forms, start with easy fields to build momentum.
    In pricing, show the plan you want users to choose first.
  rationale: |-
    It is easier to take action when complex activities are broken down into smaller and more manageable tasks. Our working memory has limited capacity that can temporarily hold the information needed for reasoning and the guidance of decision-making.
    Sources In the 1960s, reasearch began emerging on the topic of working memory and its effect on decision making. In product design, the UX discipline of Task Analysis is concerned with splitting up complex tasks into more managable bits. 1 Pribram, Karl H.; Miller, George A.; Galanter, Eugene (1960). Plans and the structure of behavior. New York: Holt, Rinehart and Winston. pp. 65 2 Crandall, B., et. al. (2006). Working Minds: A Practitioner’s Guide to Cognitive Task Analysis<. MIT Press. 3 How to improve your UX designs with Task Analysis 4 Working memory at Wikipedia.org 5 The Sequencing technique at Learning Loop
  avoid_when:
  - Natural order (chronological, alphabetical) makes more sense
  related_patterns: [Serial-positioning-effect, Wizard, framing]
