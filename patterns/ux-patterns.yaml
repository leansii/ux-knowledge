- id: Tunnelling
  name: Tunnelling
  problem: Users get distracted during critical processes and don't complete them.
  source_problem: Guiding users through a process or experience provides opportunities to persuade along
    the way
  when_to_use:
  - Checkout flows, onboarding wizards
  - Any multi-step process where abandonment is costly
  solution: |
    Remove navigation, sidebars, and distractions during the critical flow.
    Show only what's needed for the current step.
    Minimize exit points. Progress bar shows commitment already made.
  rationale: |-
    Tunneling makes it easier to go through a process. For designers, tunneling controls what the user experiences – the content, possible pathways, and the nature of the activities. Tunnels are controlled environments in which users must accept the assumptions, values, and logic inflicted upon them. Tunneling is effective as we value consistency. Once users commit to an idea or a process, most tend to stick with it. This is especially true in a tunnel situations that have been freely chosen2.
    Sources Having established the Captology Lab at Stanford (renamed to Behavior Design Lab), BJ Fogg was among the first to research persuasive technologies. Although somewhat ignored his book on Persuasion kicked off a new field of research and continues to grow in importance. Tunneling was among the core persuasive strategies BJ Fogg discovered. 1 Amanda Shiga, Persuasion and Information Architecture 2 B.J. Fogg, Persuasive Technology – using computers to change what we think and do, Morgan Kaufmann, 2003 3 Tunneling persuasive technique at Learning Loop
  avoid_when:
  - Users need to reference other information to complete the process
  related_patterns: [Wizard, modal-windows, Reduction]
  tags: [persuasion, attention, focus]
  source_url: https://ui-patterns.com/patterns/Tunnelling
  votes:
    up: 0
