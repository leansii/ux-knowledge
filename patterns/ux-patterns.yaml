- id: Completion
  name: Completion
  problem: Users want the satisfaction of finishing something 100%.
  source_problem: Our motivation increases as we move closer to a goal
  when_to_use:
  - Course progress, collection systems
  - Profile completion, achievement sets
  solution: |
    Show clear progress toward 100%. Make the final items achievable but require effort.
    Celebrate 100% completion with a special reward or badge.
    List what's remaining to encourage final push.
  rationale: |-
    Far-away rewards are much less motivating than near term ones. If you are offering rewards for specific user actions, you will most likely want to reward sooner than later. By increasing the velocity of rewards, you may find that the total reward sum needed will be lower. Furthermore, the illusion of progress toward a goal induces task and purchase acceleration.
    Sources Behaviorist Clark Hull first proposed the goal gradient hypothesis in 1932 – that our tendency to approach a goal increases with proximity to the goal. Its effect has important theoretical and practical implications for behavior in reward programs. Although the hypothesis has been extensively studied on animals, its implications for human behavior and decision making are understudied. 1 Hull, Clark L. (1932), “The Goal-Gradient Hypothesis and Maze Learning,” Psychological Review, 39 (1), 25–43. 2 Kivetz, R., et. al. (2006). The goal-gradient hypothesis resurrected: Purchase acceleration, illusionary goal progress, and customer retention. Journal of Marketing Research, 43(1), 39–58 3 Goal Gradient Effect at Coglode.com 4 Goal-graident effect at Laws of UX 5 Moving the Finish Line: The Goal Gradient Hypothesis 6 Designing for motivation with the goal-gradient effect by Ian Batterbee 7 Brad A. Myers (1985). The importance of percent-done progress indicators for computer-human interfaces. ACM SIGCHI Bulletin 16(4):11-17 8 Cryder, et. al. (2013). Goal gradient in helping behavior, Journal of Experimental Social Psychology 9 Even The Illusion Of Progress Is Motivating by Susan Weinschenk 10 Goal-Gradient Effect at Learning Loop
  avoid_when:
  - 100% completion requires unreasonable effort
  related_patterns: [set-completion, CompletenessMeter, Need-for-closure]
  tags: [gamification, rewards, motivation]
  source_url: https://ui-patterns.com/patterns/Completion
