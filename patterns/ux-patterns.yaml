- id: coachmarks
  name: Coachmarks
  problem: New users don't notice important UI elements in a complex interface.
  source_problem: The user needs help to understand a complex user interface
  when_to_use:
  - First-time experience in feature-rich apps
  - After significant UI changes
  solution: |
    Highlight specific UI elements with a spotlight effect and explanatory tooltip.
    Show one coachmark at a time. Allow skipping the entire sequence.
    Don't show again after dismissal.
  rationale: >-
    Coachmarks can help explain overly complicated or novel user interfaces to users, but they do not
    help solve the underlying problems of poorly composed interfaces. Consider other onboarding patterns
    before settling with coachmarks.
  discussion: |-
    Using coachmarks adds another mode (or layer) to your user interface. They thereby obstruct interaction to the elements they help explain. If users are in the middle of a task, coachmarks can be perceived as an obstruction, which they may want to quickly dismiss without reading. This makes the Coachmark pattern borderline an anti-pattern: they do not solve the underlying problems of a confusing user interface. Adding a new level of complexity to help explain an already complex interface is treating symptoms and not the root course. Furthermore, attention is diverted from one single tip to the explanation of the entire user interface. You are essentially asking the user to memorize not only how to solve the task at hand, but also all other tasks that might come at hand. Multiple coachmarks increase the cognitive load – especially on shot-term memory. Address underlying issues first Before settling on using Coachmarks, try to see if you can solve the problem in other ways first. Address any underlying user interface issues before you introduce Coachmarks. Consider a Playthrough or a Guided Tour, which allow users modeless assistance where they can interact with the elements about which they are being instructed. If you must use Coachmarks, be easy on the users cognitive load. We can only remember 3-4 things at a time. Lay out coachmarks in a readable and easy-to-skim way. Instead of merely displaying a screenshot, try placing the Coachmarks above the user’s normal view of the user interface.
    Sources 1 Patterns for new user experiences by Krystal Higgins 2 Instructional Overlays and Coach Marks for Mobile Apps
  avoid_when:
  - The interface is intuitive enough without guidance
  - User is returning and already familiar
  related_patterns: [Guided-tour, inline-hints, Tour]
  tags: [onboarding, guidance, highlighting]
  source_url: https://ui-patterns.com/patterns/coachmarks
  votes:
    up: 2
    down: 158
- id: playthrough
  name: Playthrough
  problem: Users learn best by doing, not by reading instructions.
  source_problem: The user wants to know how to use the different features of the application.
  when_to_use:
  - Complex tools where hands-on practice is essential
  - Games, creative tools
  solution: |
    Guide users through real tasks with real data (or sample data).
    Provide step-by-step prompts that require the user to perform each action.
    Celebrate completion.
  rationale: |-
    By allowing users to get out into the full product world early and safely, you can keep users from facing horrible failure if they hadn’t had an introduction.
    Sources 1 UX Flows: How to Turn Onboarding into an Amazing First Date with Your User by MK Cook 2 UI design pattern tips: walkthroughs and coach marks 3 Patterns for new user experiences by Krystal Higgins
  avoid_when:
  - Tasks are self-explanatory
  - Forced walkthroughs would annoy experienced users
  related_patterns: [Guided-tour, coachmarks, Appropriate-challenge]
  tags: [onboarding, guidance, interactive]
  source_url: https://ui-patterns.com/patterns/playthrough
  votes:
