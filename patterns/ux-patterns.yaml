- id: Pattern-recognition
  name: Pattern Recognition
  problem: Users waste time relearning interfaces that don't follow familiar conventions.
  source_problem: Even when there is no pattern, we seek ways to organize and simplify complex information
  when_to_use:
  - All interface design
  - Especially for common actions (search, settings, navigation)
  solution: |
    Follow established UI conventions: magnifying glass for search, gear for settings.
    Use consistent patterns within your app. Match platform expectations.
    Innovation in patterns needs strong justification.
  rationale: |-
    We seek ways to organize and simplify complex information as we try to make sense of how information is grouped and presented. We look for cues (affordances) in objects to figure out how we should interact with them and use our knowledge and past experience to make sense and meaning.
    Sources How we recognize patterns has been researched was researched in cognitive science from the 1970s and up. How we understand images through the Recognition-by-Compontent (RBC) theory by Biederman and how we apply it to design experiences through affordances by Donald Norman. 1 Biederman, I. (1987). Recognition-by-components: a theory of human image understanding. Psychol Rev. 1987 Apr;94(2):115-147. 2 Norman, D. (1999). Affordance, conventions, and design, Interactions Volume 6, Issue 3, pp 38–43 3 Pattern Recognition persuasive technique at Learning Loop
  avoid_when:
  - You have data showing a novel pattern significantly outperforms convention
