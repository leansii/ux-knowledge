- id: pull-to-refresh
  name: Pull to Refresh
  problem: Mobile users need an intuitive way to check for new content.
  source_problem: The user wants to to retrieve more data or refresh already available contents on the
    screen.
  when_to_use:
  - Mobile feeds, inboxes, lists
  - Any mobile content that updates frequently
  solution: |
    Pull down from the top of a scrollable list to trigger a refresh.
    Show a spinner or animation during refresh.
    Provide visual feedback that new content was loaded.
  rationale: >-
    Why should we use pull to refresh? Pull to refresh are sometimes considered as an extra unnecessary
    step to refresh, as the user has to manually trigger refreshing or the loading content process of
    the application. As the pull-to-refresh gesture signifies a manual request for updates, it requires
    a user involvement into the process and creates a superficial layer between users and their content.
    In most cases such kind of operations can be performed automatically using auto-sync procedure, without
    user involvement. For example, when users use Gmail in the browser on their desktops the service show
    them the latest emails automatically (and keeps the inbox up-to-date in the background). So why would
    email clients on mobile devices act differently? Manual refreshing do provide benefits for the user
    interface, and can act as a great supplement to syncing: It is convenient for users because they’re
    able to update the screen whenever they choose. It feels natural for power users. The pull-to-refresh
    pattern has become a standard in mobile applications. The pull-to-refresh gesture is so universal
    now, that it’s hard for developers to ignore using it as power users expect it to be part of the application
    experience. It brings context and continuity. When users open Twitter, the application won’t throwing
    users to an unfamiliar spot in their Twitter timeline. Instead, the app brings them to the last read
    tweet. If users want to load new tweets they do it manually by pull-to-refresh. It also saves bandwidth
    for data-conscious customers.
  discussion: |-
    Using the Pull-to-refresh pattern helps the user perform a content update task, but this pattern isn’t universally applicable and has its own downsides. Visible “refresh” button vs Hidden pull-to-refresh gesture Many developers consider using ‘pull-to-refresh’ as a way to save space on screen (remove UI clutter). While it obviously saves screen estate (nothing is visible on screen at all), users have to know it’s there. Gestures are hidden controls. Thus, it’s not as intuitive as a visible “Refresh” button. A visible refresh button is easier to implement for developer and to use for user (since it’s always visible and available). When you should use visible “Refresh” button or auto-update instead of Pull-to-refresh You might want to consider a refresh button… When you have a view with pannable content (e.g. map). Because such view has no primary direction or content origin from which users can presume the swipe to refresh gesture will originate. When list items are sorted in chronological order. For a “oldest first” lists, you should use a refresh button, because pulling down to append items at the bottom of a list would be awkward. When you have a non-ordered list of items. Because when the user is looking at non-ordered list view in the first place, there is no expectation that pulling down will do anything special, and the pull-to-refresh is not intuitive. Photo-related apps that display galleries and calendar apps are a good example of this. When the application does not contain content that typically needs to be refreshed on a frequent basis. For example, Evernote app where content is likely not being refreshed without user knowing about it. Consider no refresh button (or auto-refresh in addition to a button) whenever the things are changing too fast (refreshed becomes stale within a minute or less). Examples: Live stock data Auction reporting Thumb-reach issue on iPad Pull-to-refresh feels natural on a mobile device, but it looks kind of odd on the iPad (especially in landscape mode). It’s almost impossible to update the content using one-thumb interaction — you need either stretch your thumb or put the device on a flat surface in order to comfortably operate with user interface. Augmented Pull-to-refresh In the Google Chrome app, the functionality of the pull to refresh interaction has been expanded with the ability to perform two other actions — open a new tab or close the current tab. Like the standard pull-to-refresh design pattern, pulling down on the screen and then letting it go will just refresh the screen: However, when user pulls down and swipe right, Chrome will close the current tab. Alternatively, swiping left will open a new tab. This augmented pull-to-refresh interaction gives users three possible actions to choose from, instead of just one. Opening a new tab with the augmented pull-to-refresh interaction is much more efficient since it can be done with just one smooth gesture.
    Sources 1 Why the pull to refresh gesture must die by Austin Carr 2 Pull to refresh via Wikipedia 3 Swipe to refresh via Material design 4 Loren Brichter Talks About Pull-To-Refresh Patent and Design Process by Graham Spencer 5 Augmented Pull to refresh by Jacob Gube
  avoid_when:
  - Desktop-only applications
  - Content updates automatically via real-time connections
  related_patterns: [ContinuousScrolling, ActivityStream]
  tags: [navigation, mobile, gesture]
  source_url: https://ui-patterns.com/patterns/pull-to-refresh
