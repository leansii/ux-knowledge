    up: 9
    down: 49
- id: invite-friends
  name: Invite Friends
  problem: Organic growth through existing users bringing in their contacts.
  source_problem: The user wants to experience the application with their friends.
  when_to_use:
  - Any app that benefits from network effects
  - Referral programs
  solution: |
    Provide easy sharing via email, SMS, social media, or link.
    Offer incentives for both inviter and invitee.
    Show status of invitations. Don't be spammy.
  rationale: >-
    If an experience is enjoyable or useful enough, users will want to share it with friends and similar
    others. If users aren’t connected to the experience already, they will need to be invited through
    an invitation.
  avoid_when:
  - The app doesn't benefit from social connections
  related_patterns: [TipAFriend, Reciprocation, Social-proof]
