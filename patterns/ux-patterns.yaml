- id: Peakend-rule
  name: Peak-End Rule
  problem: Users judge an experience by its most intense moment and its ending, not the average.
  source_problem: We primarily judge past experiences on how they were at their peak and how they ended
  when_to_use:
  - Designing checkout flows, onboarding, support interactions
  - Any experience with a clear beginning and end
  solution: |
    Create a positive peak moment (delight, surprise, achievement).
    End on a high note (celebration, thank you, clear next step).
    Fix the worst moments — they disproportionately define the memory.
  rationale: >-
    Pleasant or unpleasant, our brains heavily weigh the the most intense felt point and the end when
    judging an experience, rather than on its total sum or average of every moment. Other information
    like duration and other logically relevant information aside from the peak and end is not lost, but
    merely neglected. The peak end rule is a heuristic in which we judge our past experiences almost entirely
    on how they were at their peak (whether pleasant or unpleasant) and how they ended1. When we do this
    we discard virtually all other information, including net pleasantness or unpleasantness and how long
    the experience lasted. We only remember certain details of a whole experience; the peak and the end.
    Whether most parts of the experience were acceptable is without influence on the user’s perception
    of the experience as a whole. An acceptable experience is often neither memorable, nor differentiating
    and will not be what makes or brakes your product. Designing for the peak-end rule is about designing
    for the moments of truth. Moments of truth are where users experience how poor or good your product
    really is, and hopefully how it will help them kick ass. A sure moment of truth is at the end of an
    experience, but there are more. Find your product’s moments of truth through user research and address
    them. Emphasize them. Turn up the volume of the peak as much as possible and make sure it is pleasant
    so that it will leave a great lasting impression. Make sure that your peak and end is memorable, branded,
    satisfactory and different from your competitors. An interesting twist to the peak-end rule was found
    when it came to measuring the experienced discomfort of pain. Consider the series 2-5-8 and 2-5-8-4
    in which the numbers refer to reports of pain provided on a 10-point scale every 5 minutes. Rationally,
    adding 5 extra minutes of pain will only increase total discomfort, although experiments showed the
    longer period of pain (20 minutes), but with a period of diminished discomfort in the end, were rated
    less discomforting than the shorter period of pain (15 minutes), but with an increased discomfort
    in the end. An episode, in which discomfort increases gradually to a high level, is evaluated similarly
    to an episode in which discomfort is high throughout. Furthermore, when test subjects were asked to
    evaluate moments, duration was completely neglected until they reminded themselves that it is better
    for episodes of discomfort to be short rather than long.
  discussion: |-
    Why the peak is memorable The peak-end rule can be explained by several factors. First, we have a tendency to remember intensely emotional events better than less intensely emotional events567. Furthermore, this bias for more intense emotional experiences is evident in nostalgic preferences8. Why the end is memorable People exhibit serial position effects such that they have better memory for both the beginning and end of sequences, phenomena known as primacy bias and recency bias, respectively. The memory bias for the end can be explained by the recency effect: we have better emotional memory for the end of an experience rather than the beginning9.
    Sources Although coined by behavioral economist, Daniel Kahnemann, the peak-end rule can be explained by several factors. First, we have a tendency to remember intensely emotional events better than less intensely emotional events. Furthermore, this bias for more intense emotional experiences is evident in nostalgic preferences. This explains the peak. The memory bias for the end can be explained by the recency effect: we have better emotional memory for the end of an experience rather than the beginning. 1 Kahneman, Well-being: The foundations of hedonic psychology, 1999 2 Peak-end rule shown graphically by Greg Ness 3 Peak-end rule at Coglode.com 4 Peak-end rule at Wikipedia.org 5 Dutta, Satrajit; Kanungo, Rabindra N.; Freibergs, Vaira (1972). “Retention of affective material: Effects of intensity of affect on retrieval”. Journal of Personality and Social Psychology. 23 (1): 64–80. 6 Ochsner, Kevin N. (2000). “Are affective events richly recollected or simply familiar? The experience and process of recognizing feelings past”. Journal of Experimental Psychology: General. 129 (2): 242–261 7 Morewedge, Carey K.; Gilbert, Daniel T.; Wilson, Timothy D. (2005). “The Least Likely of Times How Remembering the Past Biases Forecasts of the Future”. Psychological Science. 16 (8): 626–630 8 Morewedge, Carey K. (2013). “It Was a Most Unusual Time: How Memory Bias Engenders Nostalgic Preferences”. Journal of Behavioral Decision Making. 26 (4): 319–326 9 Garbinsky, Emily N.; Morewedge, Carey K.; Shiv, Baba (2014). “Interference of the End Why Recency Bias in Memory Determines When a Food Is Consumed Again”. Psychological Science. 25 (7): 1466–1474. 10 The Peak-end Rule at Learning Loop
  avoid_when:
  - Optimizing peaks at the expense of consistent quality
  related_patterns: [delighters, Praise, Negativity-bias]
  tags: [persuasion, cognition, experience]
  source_url: https://ui-patterns.com/patterns/Peakend-rule
