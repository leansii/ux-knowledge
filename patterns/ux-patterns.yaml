- id: periodic-events
  name: Periodic Events
  problem: Routine use becomes monotonous without novelty.
  source_problem: Construct recurring events to build up anticipation, a sense of belonging, comfort,
    and a sustained interest
  when_to_use:
  - Games (seasonal events), marketplaces (sales events)
  - Community platforms (weekly challenges)
  solution: |
    Create recurring special events with unique rewards or content.
    Build anticipation with announcements. Vary the events to prevent predictability.
  rationale: |-
    Anticipation of an upcoming event can in itself be motivating and can provide a limited period of time, where users prepare themselves potential action or commitments. Events temporarily create special places that are different from everyday places, which provides a great occation for taking action, breaking patterns, starting new habits, or changing behaviors or attitudes.
    Sources Studies conncerning the field of events is mostly found in the disciplines of sociology and anthropology. However, research on social psychology and the motivatinng power of anticipation of events is gaining momentum. 1 Benckendorff & Pearce (2012). The Psychology of Events. In S. Page & J. Connell (Eds.), Handbook of Events. New York: Routledge. 2 Filep, S., et. al. (2015). On Positive Psychology of Events, Event Management 19(4):pp. 495-507. 3 Periodic Events at Learning Loop
  avoid_when:
