- id: nostalgia-effect
  name: Nostalgia Effect
  problem: Users have positive emotional associations with familiar past experiences.
  source_problem: Reminiscing about the past make us downplay costs
  when_to_use:
  - Year-in-review features, throwback content
  - Retro design elements, anniversary campaigns
  solution: |
    Reference shared cultural touchpoints. Show users their own history ("On this day").
    Use familiar visual styles or sounds that evoke positive memories.
  rationale: >-
    When we reminisce about the past, we start favoring social connections over economic costs. Use nostalgia
    to promote pro-social behavior such as donating to charities, hiring volunteers for a cause, in other
    ways taking a social responsibility, or just getting back in touch with old friends. Nostalgia can
    help build long-term social relationships and foster social connectedness.
  discussion: |-
    In the context of nostalgia, social connectedness and money are said to be interchangeable. Where nostalgia fosters social connectedness, reduces loneliness, and increases pro-social behavior, where money reduce the need of social connectness and promove isolation. When a person feels socially connected to others, their desire to hold on to their money will weaken.
    Sources 1 “Nostalgia Effect, explained”: https://thedecisionlab.com/biases/nostalgia-effect/ 2 Lasaleta, J.D., Sedikides, C., and Vohs, K.D. (2014). Nostalgia Weakens the Desire for Money. Journal of Consumer Research. 41(3), 713-729. DOI: 10.1086/677227 3 Freidman, L. (2016). Why Nostalgia Marketing Works So Well With Millennials, And How Your Brand Can Benefit. Forbes. 4 Nostalgia Effect at Coglode.com 5 Anticipated nostalgia: Looking forward to looking back 6 From nostalgia through social connectedness to self-continuity: Replication and extension 7 Nostalgia Effect at Learning Loop
  avoid_when:
  - Nostalgia would feel manipulative or out of place
  related_patterns: [Peakend-rule, Liking, Self-expression]
  tags: [persuasion, social, emotion]
  source_url: https://ui-patterns.com/patterns/nostalgia-effect
