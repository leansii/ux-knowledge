- id: Variable-rewards
  name: Variable Rewards
  problem: Predictable rewards become boring and lose motivational power.
  source_problem: >-
    Use random rewards to convey a sense of scarcity and unpredictability to entice users curiosity in
    discovering the pattern
  when_to_use:
  - Social feeds (what will I see next?)
  - Loot boxes, mystery rewards, randomized content
  solution: |
    Vary the type, size, and timing of rewards unpredictably.
    Slot-machine mechanics: sometimes small, sometimes big.
    Keep the core experience rewarding even without the variable element.
  rationale: >-
    As humans, and animals, we react differently to certain patterns of rewards. Behaviorism has studied
    these patterns2 and have come to the conclusion that variable reward schedules and contingencies motivate
    us more than fixed schedules and contingencies. Contingencies are rules or sets of rules defining
    when rewards are given out. There are two fundamental sort of contingencies: ratios and intervals.
    Ratios schedules provide a reward after a certain amount of actions have been carried out – the more
    you do, the more you get. Interval schedules provide a reward after a certain amount of time has passed.
    Fixed vs variable ratios Rewards with a fixed ratio are given out again and again after completing
    the same action the same amount of times. It could be that you will receive 10 karma points every
    5th time you reply to a comment or that you would increase your level every 10th time you uploaded
    a video. The problem with fixed ratios is that users distinctly pause completing actions when they
    receive a reward, as they know receiving a new reward will take a while. This creates an opportune
    moment for the user to walk away. However, the break in rewards caused by fixed reward ratios might
    also give the user an opportunity to explore different aspects the system. Variable ratios are rewarded
    after a specific number of actions have been carried out, but that number changes every time. A user
    might know to upload approximately 10 videos to rise in levels, but the precise number is randomly
    generated every time – everything has a chance of reward. Such variable ratios have proven to stimulate
    more activity than fixed ratios – even when on average the same amount of rewards are given out. Variable
    ratios are free from the pause in activity generated from fixed ratios. It’s important to note that
    users do not know how many actions are required this time, just the average number from previous experience2.
    Rewarding with fixed ratios produces a pause in activity after a reward has been given and a burst
    of activity just before being rewarded. While users typically respond at a higher rate in the fixed
    ratios bursts, variable reward ratios provide a more consistent rate free from pauses of the fixed
    ratios. Fixed vs variable intervals Instead of providing a reward after a certain number of actions
    has been completed, interval schedules provide rewards after a certain amount of time has passed.
    Users being rewarded in fixed intervals will pause activity once an award has been given and wander
    around for a while. They will return frequently to check if their reward has been “refilled” or has
    reappeared. Gradually, checks will become more frequent as the proper time nears. Vimeo.com utilizes
    fixed reward intervals for its regular users, who are allowed to upload only 500 mb of video every
    week. After the fixed interval of one week, the user’s upload quota is refilled. As users reach their
    upload quota on vimeo.com, their activity will pause until its refilled next week. Vimeo hopes users
    will use the pause to consider buying a pro account with no upload quota. With variable reward intervals,
    the period of time changes after each reward as with the variable ratios. As with variable ratios,
    variable intervals also produce a steady and continuous flow of activity – there is always a reason
    to be active.
  discussion: |-
    Variable and fixed ratios and intervals can successfully be combined. Say that you need to upload 20 videos to become an elite member, where after you will have the chance of picking up a free pro-membership appearing at variable intervals. Extinction Extinction is what happens when you stop providing a reward and will feel as a punishment that cause anger and frustration in the user. Behavior learned on the variable schedules are much harder to extinguish, as users will never know if what they are experiencing is just an unusually long run of misses and that next reward will justify their patience. Avoidance The principle of avoidance uses the negative reward of decay, pain, or other forms of punishment to keep users active. An example could be to force users to revisit your site and log in once a week to avoid their “elite” status to be taken away.
    Sources In behavioral psychology rewards (or positive reinforcement on people) is one way reinforcing a behavior by providing a desirable stimulus. The western school of behavioral psychology and reinforcements was grounded by the 1938 seminal work on reinforcements by B.F. Skinner. The school has been critiqued for focusing too narrowly on extrinsic motivation (external benefits) and not embrace intrinsic motivation (incentive from the pleasure of the activity itself). 3 Jesse Schell, “The Art of Game Design – A Book of Lenses”, Carnegie Mellon University 2 Behavioral Game Design at Gamasutra.com 3 Psychology is fun at Gamasutra.com 4 Reinforcement on wikipedia.org 5 Only a game by Chris Bateman 6 Skinner, B. F. (1938). The Behavior of Organisms: An Experimental Analysis, New York: Appleton-Century-Crofts 6 Miltenberger, R. G. (2008). Behavioral Modification: Principles and Procedures. Thomson/Wadsworth 7 Rewards at Learning Loop
  avoid_when:
  - Users need predictable outcomes (financial, safety)
  - Variable rewards feel like gambling for vulnerable users
  related_patterns: [Fixed-rewards, hedonic-adaptation, delighters]
  tags: [gamification, rewards, engagement]
  source_url: https://ui-patterns.com/patterns/Variable-rewards
  votes:
    up: 0
    down: 13
- id: Fixed-rewards
  name: Fixed Rewards
  problem: Users need to know what they'll get for completing an action to feel motivated.
  source_problem: Use rewards to encourage continuation or introduction of wanted behavior
  when_to_use:
  - Referral programs, loyalty points
  - Course completion certificates
  solution: |
    Clearly communicate the reward before the action. "Complete X, get Y."
    Deliver the reward immediately upon completion.
    Make the reward proportional to the effort.
  rationale: Use rewards to encourage continuation or introduction of wanted behavior in your users.
  discussion: |-
    In behaviorism, the rate or probability of a behavior (“response”) is tried increased through stimulus (e.g. candy). The quality, or response strength, is assessed by measuring frequency, duration, latency, and accuracy2. Positive and negative rewards (and punishments) There are two ways to strengthen behavior through rewards: bring pleasure or excuse from pain – positive or negative rewards (also called reinforcements). Opposite of rewards are punishments, which does not necessarily remove what was first rewarded behavior3. Positive rewards and punishments introduce stimuli to modify behavior where negative rewards and punishments take away stimuli to modify behavior. Rewards increase possibility of behavior while punishments decrease possibility of behavior. Primary and secondary rewards A secondary reward are the stimuli we have come to associate with the primary reward. When we see the message number notification appear on facebook, we associate that number with the feeling of receiving a message from our friends, which is the primary reward.
    Sources 1 Jesse Schell, “The Art of Game Design – A Book of Lenses”, Carnegie Mellon University 2 Reinforcement at Wikipedia.org 3 Psychology is fun at gamasutra.com 4 Rewards at Learning Loop Notes What we call rewards in this article is also called reinforcement. The opposite of a reinforcement is punishment.
  avoid_when:
  - Predictability makes the experience boring
  related_patterns: [Variable-rewards, Achievements, Completion]
  tags: [gamification, rewards, reinforcement]
  source_url: https://ui-patterns.com/patterns/Fixed-rewards
  votes:
    up: 3
    down: 13
- id: shaping
  name: Shaping
  problem: Users give up on difficult tasks if they're not eased into them gradually.
  source_problem: Successively reinforce approximations to a target behavior
  when_to_use:
  - Learning progressions, onboarding
  - Skill-based features
  solution: |
    Start with very simple tasks that guarantee success.
    Gradually increase complexity as users build confidence and skill.
    Reward early steps generously, then taper as competence grows.
  rationale: |-
    Clearly define a target behavior with your users. Then design a program that rewards any response that in some way resembles the target behavior and gradually moves your reinforcement only to behavior that is closer to the target behavior until the final target behavior is achieved, which then is the only behavior to be rewarded.
    Sources The method of Shaping was introduced by B. F. Skinner with pigeons and extended to dogs, dolphins, humans and other species. The field of conditioning was also examined by Ivan Pavlov, although it differs from Skinner’s shaping as the reward came irrespective of the behavior of the animal. 1 Skinner, B.F. (1953). Science and human behavior. pp. 92–3. Oxford, England: Macmillan. 2 Peterson, G.B. (2004) A day of great illumination: B.F. Skinner’s discovery of shaping. Journal of the Experimental Analysis of Behavior, 82: 317–28 3 Operant conditioning at Wikipedia.org 4 Shaping at Wikipedia.org
  avoid_when:
  - Users are already skilled and would find baby steps frustrating
  related_patterns: [Appropriate-challenge, Levels, Guided-tour]
  tags: [gamification, rewards, progression]
  source_url: https://ui-patterns.com/patterns/shaping
  votes:
    up: 3
