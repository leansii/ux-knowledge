- id: Feedback-loops
  name: Feedback Loops
  problem: Users can't see the consequences of their actions, so they don't learn or adjust.
  source_problem: We are influenced by information that provides clarity on our actions
  when_to_use:
  - Activity tracking, spending dashboards
  - Any behavior change application
  solution: |
    Show users clear, timely data about their actions and outcomes.
    "You've used 80% of your budget." "Your response time improved by 15%."
    Make feedback immediate when possible.
  rationale: >-
    Every action creates an equal opposite reaction. When reactions loop back to affect themselves, a
    feedback loop is created1.
  discussion: |-
    There are two types of feedback loops: positive and negative. Where positive feedback amplifies system output, resulting in growth or decline, negative feedback dampens output, stabilizing the system around an equilibrium point. In game design, Fixed rewards are often used as a basis for providing positive and negative feedback loops. Positive feedback loops Positive feedback loops are effective for creating change, but generally result in negative consequences if not moderated (or dampened) by negative feedback loops. Negative feedback loops Negative feedback loops are effective for resisting change and thus acts as a dampening effect keeping positive feedback loops to go out of control. Negative feedback loops typically act as stabilisers. Things are connected Changing one variable in a system will affect other variables in that system and other systems. A designer must not only consider particular elements of a design, but also their relation to the design as a whole and the greater environment1. Consider positive feedback loops to act as systems for change, and include negative feedback loops to prevent runaway behaviors that lead to system failure. Consider negative feedback loops to stabilize a system, but beware that too much negative feedback can lead to stagnation. The four distinct stages of a feedback loop The evidence stage: A behavior must be measured, captured, and stored. The individual needs to know where he or she stands. You can’t change what you don’t measure. The relevance stage: The information must be relayed to the individual, not in the raw-data form in which it was captured but in a context that makes it emotionally resonant. Through information design, social context or some other proxy for meaning, the right incentive will transform rational information into an emotional imperative. The user needs to know if he or she did good or bad. Consequence: Even compelling information is useless if we don’t know what to make of it – if it doesn’t tie to into some larger goal or purpose. This is why we need consequence. The information must illuminate one or more paths ahead. People must have a sense of what to do with the information and any opportunities they will have to act on it. Action: There must be a clear moment when the individual can recalibrate a behavior, make a choice, and act. Then that action is measured, and the feedback loop can run once more, every action stimulating new behaviors that inch us closer to our goals. The individual has to engage with all of the above and act – thus closing the loop and allowing new action to be measured2.
    Sources Feedback systems has been used since antiquity, but the word feedback didn’t exist until 1920 and was not recognized as a universal abstraction until the 1960s with Jay W. Forrester publishing his seminal book on Industrial Mechanics that it gained broader influence as a concept. In the field of psychology feedback loops especially concerned with self-regulation and how processes are purposive and can help self-corrective adjustments. 1 Universal Principles of Design, William Lidwell et. al., Rockport Publishers, 2003 2 Harnessing the power of feedback loops by Thomas Goetz at wired.com 3 Forrester, J. W. (1961). Industrial dynamics. Cambridge, Mass.: M.I.T. Press. 4 Carver & Scheier (1998). On the self-regulation of behavior. New York: Cambridge University Press. 5 Feedback Loops persuasive technique at Learning Loop
  avoid_when:
  - Metrics would create unhealthy obsession
  related_patterns: [self-monitoring, InputFeedback, dashboard]
  tags: [persuasion, feedback, learning]
  source_url: https://ui-patterns.com/patterns/Feedback-loops
  votes:
    up: 25
    down: 32
- id: Tailoring
  name: Tailoring
  problem: Generic one-size-fits-all content is less relevant and persuasive.
  source_problem: Adapt the offerings of a system to match individual users’ needs and abilities
  when_to_use:
  - Email campaigns, product recommendations
  - Content feeds, onboarding flows
  solution: |
    Personalize content based on user behavior, preferences, demographics, or stage.
    "Recommended for you" based on past activity.
    Segment users and tailor messaging to each segment.
  rationale: >-
    Tailored information is more effective in changing attitudes and beliefs than generic information.
    Make life simpler for users by showing only what is relevant to them. Tailor to individual needs,
    interests, personality, usage context, or other factors relevant to the individual. Users are persuaded
    either through a central route, with full cognitive attention, or through a peripheral route, relying
    on heuristics
  avoid_when:
  - Personalization data is insufficient and guesses would feel wrong
  related_patterns: [GoodDefaults, Kairos, Trigger]
  tags: [persuasion, feedback, personalization]
  source_url: https://ui-patterns.com/patterns/Tailoring
