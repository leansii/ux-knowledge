- id: Slideshow
  name: Slideshow
  problem: Images need to be presented sequentially in a focused, immersive way.
  source_problem: A collection of media needs to be displayed in a presentation as a sequence of still
    images.
  when_to_use: ['Presentations, photo stories', Product image sequences]
  solution: |
    Show one image at a time, full-size. Provide prev/next controls.
    Optional auto-advance with pause on interaction.
    Show progress indicator (dots or count).
  rationale: |-
    Slideshows highlight several different stories on the same screen real estate. They allow users to quickly skim through stories. Slideshows capture the user’s attention and retain attention with simple navigation, captivating content and calls to action. They focus users’ attention sharply on the content instead of interacting with the browser.
    Sources 1 Slideshows In Web Design: When And How To Use Them by Matt Cronin at smashingmagazine.com
  avoid_when:
  - Users need to compare images side by side
  related_patterns: [Carousel, Gallery]
