- id: friend-list
  name: Friend List
  problem: Users need to see and manage their social connections in one place.
  source_problem: The user wants to keep track of and engage a subset of their friends on the site in
    a meaningful way.
  when_to_use:
  - Social networks, gaming platforms
  - Any app with mutual connections
  solution: |
    Show a list of connections with name, avatar, and online status.
    Allow searching, categorizing (groups/lists), and removing friends.
    Show mutual friends on profiles.
  rationale: >-
    Friend lists can be used to help users engage with your web application in a better way by keeping
    up with how other people they know are using the application. Friend lists also come in handy when
    the users want to control who they share with. Whether it’s one-on-one communication or keeping track
    of someone’s tastes and preferences, the way users explore their blossoming friend groups will become
    increasingly contextual, requiring friends to become a more integral part of the content-consumption
    experience.
  avoid_when:
  - Connections are one-way only (use following list instead)
  related_patterns: [friend, follow, direct-messaging]
  tags: [social, connections, management]
  source_url: https://ui-patterns.com/patterns/friend-list
