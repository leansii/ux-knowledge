- id: present-bias
  name: Present Bias
  problem: Users prefer immediate rewards over larger future benefits.
  source_problem: What we want now is not what we aspire to in the future
  when_to_use:
  - Onboarding (show immediate value)
  - Loyalty programs (instant small reward > delayed big one)
  solution: |
    Provide immediate gratification for desired actions.
    Front-load value: give something useful right away.
    For future benefits, make them feel more concrete and immediate.
  rationale: |-
    Our short-term desires (wants) and longer intentions (should) differ wildly. We tend to focus on and over-value immediate rewards at the expense of long-term wishes and benefits. Allow customers to perform “future lock-in” to help them make healthier “should” choices rather than caving in to here-and-now “wants”.
    Sources People are biased towards the present as the perceived value of receiving a reward in the immediate future falls rapidly and only less more looking to the distant future. This model of how the value of a reward is discounted over time is called Hyperbolic discounting and is a form of Delay Discounting, which are cornerstones of behavioral economics. 1 Milkman, Rogers & Bazerman (2010). Ice cream soon and vegetables later: A study of online grocery purchases and order lead time. Marketing Letters 21(1):17-35 2 Balakrishnan, Haushofer & Jakiela (2017). How Soon Is Now? Evidence of Present Bias from Convex Time Budget Experiments. Cambridge, MA. 3 Present Bias at Wikipedia.org 4 Dynamic inconsistency at Wikipedia.rg 5 Present Bias at Coglode.com 6 What Goes Around Comes Around: Behavioral “Lock In,” and How to Crack It to Save the Planet by Toby Park 7 The Present Bias at Learning Loop
  avoid_when:
  - Encouraging impulsive decisions that users will regret
  related_patterns: [delay-discounting, Variable-rewards, Trigger]
  tags: [persuasion, cognition, timing]
  source_url: https://ui-patterns.com/patterns/present-bias
