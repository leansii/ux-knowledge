    up: 6
    down: 6
- id: Value-attribution
  name: Value Attribution
  problem: Users judge quality based on superficial cues and first impressions.
  source_problem: The perceived value of things increases with their cost and appearance
  when_to_use:
  - Product presentation, landing pages
  - Pricing and packaging
  solution: |
    Invest in visual quality and polish — it signals overall quality.
    Premium packaging, beautiful design, and professional copy increase perceived value.
    First impressions set the tone for the entire experience.
  rationale: >-
    We tend to assign unobservable traits to people and things based on its context and a few predominant
    cues rather than objective data. A high price may induce perceived qualities not seen if priced lower.
    An attractive appearance may infer a perception that a product works better. As we evaluate the value
    and traits of a product, cues like price, brand, appearance, and behavior have significant influence.
  discussion: |-
    We also use attribution theory to explain why a particular event or outcome has occurred, why an experience met a users experiential needs, or why the experience was to the users’s liking If we itemised the stages of such an experience and the process of value attribution, it would look something like this: What happened? – outside events do not exist unless we are aware of them Moods, emotions, feelings – how we interpret the event Perceived duration – involvement Cognitive components – intentions move our minds and focus Sense of competence/control – we use to perfect our skills Sense of freedom – objective and subjective perception of control
    Sources Attribution theories address the issue of how people, from limited available evidence, infer unobservable characteristics about things. The undisputed founder of attribution theory is Fritz Heider, however the theory was further advanced by Harold Kelley and Bernard Weiner. Attribution theory has been criticised as being mechanistic and reductionist for assuming that people are rational, logical, and systematic thinkers. Robert Settle started applying attribution theory to marketing in the 1970. 1 Attribution theory at Wikipedia.org 2 Heider, F. (1958). The psychology of interpersonal relations. New York: Wiley Settle, R. (1972). 3 Attribution theory and acceptance of information, JMR, Journal of Marketing Research (pre-1986), Vol 9 4 Bertram F. Malle (2011). Attribution theories: How people make sense of behavior, Theories in social psychology (pp.72-95), Edition: 1st, Wiley-Blackwell 5 Carol A. Scott (1982) ,On Using Attribution Theory to Understand Advertising Effects, in NA – Advances in Consumer Research Volume 09, eds. Andrew Mitchell, Ann Abor, MI : Association for Consumer Research, Pages: 293-295. 6 R. E. Burnkrant (1975) ,Attribution Theory in Marketing Research: Problems and Prospects, in NA – Advances in Consumer Research Volume 02, eds. Mary Jane Schlinger, Ann Abor, MI : Association for Consumer Research, Pages: 465-470. 7 Value Attribution at Learning Loop
  avoid_when:
  - Substance doesn't match the polished surface
  related_patterns: [halo-effect, Authority, framing]
  tags: [persuasion, cognition, perception]
  source_url: https://ui-patterns.com/patterns/Value-attribution
