- id: decoy-effect
  name: Decoy Effect
  problem: Users struggle to choose between two options and often defer the decision.
  source_problem: Create a new option that is easy to discard
  when_to_use:
  - Pricing tiers where you want to steer toward a specific plan
  - Product comparisons
  solution: |
    Introduce a third "decoy" option that is clearly inferior to the target option
    but similar in price. This makes the target option look like the best deal.
  rationale: >-
    We tend to have a specific change in preference between two options when a third option is also presented.
    When the third option is asymmetric between the original two options, customer preference will lean
    toward the asymmetry. If the original two options are $5 and $10, then a third $9 option will make
    choice lean toward the $10 option. The decoy option is superior to the first option, but similar to
    the second.
  discussion: |-
    Decoys are a type of behavioral nudge, an unobtrusive and, to the user unconscious, type of intervention that can subconsciously alter the way we make decisions. Decoys capitalize on a number of weaknesses of our decision making processes: they make it easier to rationalize our intuitive choices, they make us feel less overwhelmed by choice overload, and they prey upon our dislike of losing out.
    Sources The concept of asymmetric dominance was coined by Joel Huber, John Payne, and Chris Puto in 1982. They found that new products in the marketplace, rather than always cannabilizing on each other (similarity hypothesis), can help boost the popularity of the alternative that it is closest to (the target) and even boost the likelihood of choosing an option in the original market (regularity principle). 1 Huber, Payne & Puto (1982). Adding asymmetrically dominated alternatives: Violations of regularity and the similarity hypothesis. Journal of Consumer Research, 9(1), 90. 2 Hiebert, P. (2014, December 18). The paradox of choice, 10 years later. Pacific Standard. 3 Chernev, A., Böckenholt, U., & Goodman, J. (2015). Choice overload: A conceptual review and meta-analysis. Journal of Consumer Psychology, 25(2), 333-358. 4 Ariely, Dan (2009). Predictably Irrational: The Hidden Forces that Shape Our Decisions. HarperCollins. Chapter 1. 5 Why do we feel more strongly about one option after a third one is added? The Decoy Effect, explained. 6 Bateman, I. J., Munro, A., & Poe, G. L. (2008). Decoy effects in choice experiments and contingent valuation: Asymmetric dominance. Land Economics, 84(1), 115-127. 7 Simonson, I. (1989). Choice based on reasons: The case of attraction and compromise effects. Journal of Consumer Research, 16(2), 158-174. 8 Slaughter, J. E., Bagger, J., & Li, A. (2006). Context effects on group-based employee selection decisions. Organizational Behavior and Human Decision Processes, 100(1), 47-59. 9 Stoffel, S. T., Yang, J., Vlaev, I., & von Wagner, C. (2019). Testing the decoy effect to increase interest in colorectal cancer screening. PLOS ONE, 14(3), e0213668. 10 The Decoy Effect at Learning Loop
  avoid_when:
  - Users would feel manipulated if they noticed
  - Only two genuine options exist
  related_patterns: [PricingTable, Anchoring, framing]
  tags: [persuasion, cognition, pricing]
  source_url: https://ui-patterns.com/patterns/decoy-effect
