- id: optimism-bias
  name: Optimism Bias
  problem: Users overestimate positive outcomes, which can be leveraged for engagement or managed for
    realistic expectations.
  source_problem: We consistently overstate expected success and downplay expected failure
  when_to_use: [Goal-setting features, Free trial conversions]
  solution: |
    Show success stories and potential outcomes to inspire action.
    But also set realistic expectations to prevent disappointment.
    Use to encourage starting (people believe they'll succeed).
  rationale: |-
    As we compare ourselves to our peers, we tend to overestimate our future success and downplay our future failure. We tend to believe in the best case scenario and ignore conflicting data as we look at what has worked in the past to predict the future, but often neglect to examine if something has been overlooked. Disclaimer: the Optimism Bias doesn’t seem to kick in for people suffering with depression.
    Sources Tali Shorat is among the leading researches on the Optimism Bias. Tali and her team has sown that optimists save more, are more healthy, take more vitamins and more readily adopt a low-fat diet. Although that sounds great, the bias can also lead to dangerous outcomes as it also means that we change our beliefs selectively in light of only positive information. 1 Sharot, T. (2011), The Optimism Bias, Current Biology, Volume 21, Issue 23, 6 December 2011, Pages R941-R945 2 Shepperd, J. A., et. al. (2002). Exploring the Causes of Comparative Optimism, Psychologica Belgica. 42: 65–98. 3 Optimism Bias at Learning Loop
  avoid_when:
  - It would lead to harmful over-commitment
  related_patterns: [framing, Social-proof, testimonials]
  tags: [persuasion, cognition, bias]
