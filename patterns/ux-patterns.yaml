- id: CompletenessMeter
  name: Completeness Meter
  problem: Users don't know how much of their profile or task they've completed.
  source_problem: The user wants to complete a goal but needs guidance in when it is reached and how to
    reach it.
  when_to_use:
  - Profile completion
  - Multi-section forms or applications
  solution: |
    Show a progress bar or percentage indicating how much is done.
    Highlight what sections are incomplete. Make incomplete items clickable.
    Celebrate reaching 100%.
  rationale: >-
    Extrinsically motivate users by triggering their desire for achievement, curiosity, and completion
    by providing a feedback loop that lets users gauge their progress toward reaching an end goal. This
    pattern uses a set of psychological drivers that pushes the user to move forward towards the end goal.
    One is curiosity. We are curious to find out what happens when we reach 100%. Will I be rewarded or
    will my profile look different? Another is the feedback loop. As the user completes sub-tasks, his
    or her progress moves towards 100%. A clear link between completing tasks and reaching the end goal
    has been established.
  discussion: |-
    As humans, we feel inclined to complete the goals we have decided to start. Most often we choose goals for ourselves based on what we want to spend our time on, afterwards we put our minds into it. The Completeness Meter pattern is an attempt to present such a goal to the user in order for him or her to decide on completing it. By presenting easily completed sub-tasks, it is possible to convince and persuade the user into spending time he or she in other circumstances wouldn’t have.
    This article has been commented 1 time.
  avoid_when:
  - Completion is optional and pressuring users would feel manipulative
  related_patterns: [StepsLeft, Wizard, Completion]
  tags: [input, progress, motivation]
  source_url: https://ui-patterns.com/patterns/CompletenessMeter
  votes:
    up: 0
    down: 91
- id: StepsLeft
  name: Steps Left
  problem: Users want to know how long a process will take before committing.
  source_problem: The user is about to go through the process of filling in data over several steps and
    is in need of guidance.
  when_to_use:
  - Checkout flows, wizards, onboarding
  - Any multi-step process
  solution: |
    Show "Step 2 of 5" or a step indicator at the top of each step.
    Optionally label each step. Show completed steps differently from future ones.
  rationale: |-
    The Steps Left pattern is used when it is critical to maintain the user’s focus throughout the process of filling in data to the system. This is for instance critical in e-commerce websites, where the checkout process is often guided by this pattern. In e-commerce websites, the checkout process is the most critical part of the site, as this is the part that captures the customer’s money. The Steps Left pattern provide the user with a great overview of how far in the process the user has gone: it provides a visible end to the process, which the user can aim for. This pattern is similar to the Wizard pattern most commonly found in desktop applications, which guide the user step by step.
    This article has been commented 1 time.
  avoid_when:
  - The number of steps varies dynamically
  related_patterns: [Wizard, CompletenessMeter]
  tags: [input, progress, transparency]
  source_url: https://ui-patterns.com/patterns/StepsLeft
