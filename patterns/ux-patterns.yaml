- id: AccountRegistration
  name: Account Registration
  problem: Users need to create accounts but complex registration forms drive them away.
  source_problem: You wish to know who the active user is in order to provide personalized content or
    opportunities to conduct a purchase.
  when_to_use:
  - Any product requiring user accounts
  solution: |
    Minimize required fields (email + password, or social login).
    Allow progressive profile completion later. Show password requirements upfront.
    Send confirmation email. Provide SSO options.
  rationale: >-
    Account registration enables personalized and contextual content to be presented to authenticated
    users. Account registration allows for remembering details about the user; product wish lists, preferences,
    interests, shipping and billing addresses, VAT number for billing purposes, and more. Benefits of
    letting the users register an account with your site include: You know who is using your system You
    know how often they visit You know what they do on your site. You can store information your users
    might need later, such as billing info or wish lists for future purchases. You can use account registration
    to reserve special content from your regular users. You can differentiate prices, information displayed,
    and access rights depending on who the logged in user is.
  discussion: |-
    Is account registration necessary? And when? Customers do not like to identify themselves until they actually need to. They need to when he or she has decided take action – for instance to purchase a product. Until then, you do not want to block users from taking action or browsing your website. In general, you will only want to protect the pages that actually requires you to know the user’s identity. Users hate having to register an account to do something simple. An example of premature sign-in would be forcing users to sign in before they can browse your online shop’s products. User’s want to get an idea of what is offered before they commit to creating an account, not the other way round. What kind of site do you run? Is it really necessary to develop a relationship with your customers (or users) or is the typical behavior of your kind of customers to stay anonymous? In the latter case, you might want to consider not requiring an account registration at all – even when the user is purchasing a product. Why should the user register? You need to clearly state what benefits the user will get from registering an account with your website as this step is a burden for the user. One way to do this is to directly communicate the benefits in written sentences such as “Track your order”, “Change your reservation at a later time”, or “Receive our newsletter” (Yes, this actually is a benefit to some people). Another way to communicate the benefits of registering an account is to block points of action. Examples of this are submitting a comment or content to the site. Asking too many (unnecessary) questions Knowing your users is important, but wanting to know them too well can hinder account registration. Even though your marketing department is eager to know the exact interests, phone number, or even size of yearly paycheck of your users, asking them this is not always a good idea. With spam e-mails being a common known phenomenon, the average internet user is reluctant to trust you with such data. In certain cases you may require personal information from users, to maintain trust, declare exactly why you need it. A simple “In case we need to contact you, please provide a phone number” will do. Making up a user name and thinking of a new password are big tasks for the user already. The fact that the user needs to think and make up their mind about these things means it has taken away the user’s focus from the task he or she had at hand.
    This article has been commented 5 times.
  avoid_when: [Anonymous usage is sufficient]
  related_patterns: [LazyRegistration, PasswordStrengthMeter, GoodDefaults, Wizard]
