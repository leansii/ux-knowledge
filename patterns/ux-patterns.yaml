- id: RateContent
  name: Rate Content
  problem: Without user ratings, there's no way to surface the best content or products.
  source_problem: >-
    The user wants to promote a specific piece of content in order to democratically help decide what
    content is of higher quality.
  when_to_use:
  - Product reviews, content quality assessment
  - Any marketplace or content platform
  solution: |
    Provide star rating (1-5) or thumbs up/down. Show average rating and count.
    Allow optional text review alongside rating.
    Display aggregate ratings prominently.
  rationale: >-
    The Rate Content pattern promotes community participation and can assist you in separating good quality
    content from bad quality content. This is especially useful when your website relies on user submitted
    content. Rating content is about handling risk from the user’s point of view. Will a user on eBay
    cheat me or is a book on amazon worthwhile my time and money?
  discussion: |-
    The main reason to use the Rate Content pattern is assist the user in managing risk. Examples of such risk are spending money on buying a product or from investing time on another user. When implementing a rating system, you need to consider a number of things in relation to what it should be used for and how it should be communicated: Who is doing the rating What is being rated What behavious are we trying to encourage or discourage? Who is doing the rating When reading reviews about an item and seeing how other users rate a given item a number of concerns are bound to be raised by the user: “Is the rating and review honest and authentic?”, “Are the users who rated a given item like me?”, and “Do the reviewers posses the relevant competence to review the product or service in question?”. Amazon and Netflix have solved this problem by letting people rate the ratings: was this review helpful for you? What is being rated Be clear when communicating what is being rated and make sure that the user knows exactly what he or she is rating. If what is being rated seems ambiguous, the value of the review for other users in turn diminishes. For instance, if a website collects good computer deals that can be rated by the website’s users, is it the trustworthiness of the seller, the products, or the price that is being rated? Consider making your rating system multi-dimensional, or simply be clear about what – exactly what – is being rated. What behavious are we trying to encourage or discourage? Like with the similar community driven patterns, several pitfalls can make or break the success of the Rate Content pattern. Are some users trying to promote or demote certain items? – perhaps their own or their competitors product – maybe their friends or foes. You might want to setup a number of measures to prevent users from misusing the system, such as limiting the maximum activity of a user, looking out for malicious activity, or promote trusted key users to count more than others Design your rating system so that you encourage the behavior you want. Making your rating system multi-dimensional by breaking up the full rating into sub-parts that by their title explain exactly what you want measured (rated), is one way of solving this problem.
    Sources On a scale from 1-5 at Boxes And Arrows by Alex Kirtland and Aaron Schiff. Vote To Promote design pattern at ui-patterns.com by Anders Toxboe.
    This article has been commented 3 times.
  avoid_when:
  - Content is not comparable or subjective rating would be harmful
  related_patterns: [reaction, testimonials, Social-proof]
  tags: [input, community, rating]
  source_url: https://ui-patterns.com/patterns/RateContent
  votes:
    up: 9
    down: 58
- id: pay-to-promote
  name: Pay to Promote
  problem: Users or businesses want their content to be seen by more people.
  source_problem: >-
    The user wants to pay to prioritize own content above the regular content feed in order to gain increased
    reach and traction.
  when_to_use:
  - Marketplaces, classifieds
  - Content platforms with organic + paid reach
  solution: |
    Offer paid promotion that boosts visibility (featured listing, top of results).
    Clearly label promoted content to maintain trust.
    Ensure organic content still has a path to visibility.
  discussion: >-
    The Pay to Promote pattern is part of the native advertisement concept, which blends regular content
    with paid content. The two look the same with the only difference of the paid kind having a “Sponsored”
    label or “Advertisement” label.
  avoid_when:
  - It would undermine trust in content quality
  related_patterns: [PricingTable, VoteToPromote]
  tags: [input, commerce, promotion]
