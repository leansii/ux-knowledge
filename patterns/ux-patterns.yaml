    down: 8
- id: Competition
  name: Competition
  problem: Users need external motivation to perform better or engage more.
  source_problem: When sharing the same environment, we'll strive to attain things that cannot be shared
  when_to_use:
  - Fitness challenges, sales contests
  - Learning platforms, community engagement
  solution: |
    Create competitions with leaderboards, rankings, and prizes.
    Support both individual and team competitions.
    Make participation optional. Recognize multiple winners (categories).
  rationale: >-
    Competition is a great mechanism to provide incentives for self-improvement. Consider what people
    might be competing for within your system: attention or resources? Competition can be among individuals
    or groups, and goals can be opposing, shared, or even complementary. Competition motivates engagement
    in two ways: internally, by utilising our urge to understand and think, and externally by utilizing
    our need for social status.
  discussion: |-
    Be careful about recognizing one person too much at the expense of the group.
    Sources 1 Six Patterns for Persuasion in Online Social Networks PDF 2 Get mental notes: Competition 3 Competition at Wikipedia.org 4 Weiksner, Fogg, Liu (2008), Six Patterns for Persuasion in Online Social Networks, PERSUASIVE 2008: Persuasive Technology, pp 151-163 5 B.J. Fogg (2003), Persuasive Technology: Using Computers to Change What We Think and Do, Morgan Kaufmann Publishers, San Francisco 6 Competition at Learning Loop
  avoid_when:
  - Competition would discourage or alienate weaker participants
  - Collaboration would produce better outcomes
  related_patterns: [leaderboard, Achievements, Status, Levels]
  tags: [persuasion, social, motivation]
  source_url: https://ui-patterns.com/patterns/Competition
