- id: CollectibleAchievements
  name: Collectible Achievements
  problem: Users want tangible proof of their accomplishments within the platform.
  source_problem: >-
    Some users respond to opportunities of winning and collecting awards that in turn can be displayed
    to other community members in order to increase engagement.
  when_to_use:
  - Learning platforms, community forums
  - Any app where users build skills or contribute over time
  solution: |
    Award badges or trophies for specific accomplishments.
    Display them on user profiles. Create a collection page showing all possible achievements.
    Include rare achievements for extra motivation.
  rationale: >-
    Achievements reflect a user’s reputation in a community. They are “both a history of one’s actions
    within that community, and a value judgment about the worth of those actions”2. Collectible achievements
    gives the user a feeling of ownership and belonging. It gives the user an opportunity to build an
    online presence that can be shown and admired by fellow community members – thus providing a sense
    of status in the community. As the user collects achievements, he or she invests time in the community
    and builds up a history. This history with your site creates a barrier for the user to leaving, as
    what has been built up will be lost upon quitting. Translating the investment into visible collectible
    achievements helps the user to build and emotional bond the community that will reward you plentifully
    in traffic and loyalty.
  discussion: |-
    Quality To be awarded with an achievement the user must complete a series of tasks that defines the criteria of success. But how do you define a successful completion of a task? Enforce some notion of quality in what it takes to complete a task. In games it could be to earn 1000 credits within 20 seconds, or to have conducted a certain action in a specific number of locations. Award quality participation over repetitive activity1. Rather than rewarding for the 20th time a game has been played, reward for the 20th time a game has been won within one month. A well-designed reputation system links the services that you offer your users to a set of goals that you have for your community2. Are the achievements you are giving out rewarding the behavior you want – does it reward users for behaving like good citizens or just to keep activity going? Promoting poor quality activities will slowly kill your community8. When you design your “Collectible Achievements” and how they work, be careful that you design them in line with the mindset of your community. Is your community collaborate rather than competitive? Do you want to promote some behavior over other? Who in your community will be intrigued by your the achievements you offer and start collecting? Are you promoting the right behavior or could your achievements actually end up promoting anti-social behavior (or is that what you want?)? Will you possibly push parts of your community away (is that OK?)? The design of your achievement system is closely related to defining what is “good” and “bad” behavior in your community. By defining that an achievement is worth “10 points” and another is worth “20 points”, you have quantified and defined what is better behavior. If you neglect to reward certain behavior, that behavior is inherently defined as “bad”. Keep track of how your community reacts to the system of achievements you setup. Are they used and achieved in the manor you intended? A community needs constant nurturing and fixing – the specifications of each achievement are easy knobs to use to adjust and fix. Get people started To encourage people to try new and novel features you can reward users for their “first” achievements. For instance: “First video uploaded”, “First contributed document”, or “First review submitted”. Such achievements should however be worth less than more challenging goals. Is it mine forever? Can the achievement be taken away if your score goes down? Or do you want to keep it time specific? (For instance: Best seller in august 2009) In prospect theory, it is found that people have a tendency to strongly prefer avoiding losses to acquiring gains. They are loss aversive7. Having built up a lot of achievements in a community gives the user a history with that site and creates a barrier to leaving: too much have been built up. A sense of belonging have been emotionally attached to the achievements. Fraud In large systems where it is impossible to monitor the activities of all users, it can be a good idea to implement a “report abuse” feature, so that members of the community can rat each other out, if they feel that somebody is manipulating the system in a malicious way. Communities are all about feeling respected by fellow community members and the system as well. It’s about fairness. Unfortunately, fairness is a hard factor to build into a system built upon bits and bytes.
    Sources 1 Collectible Achievements fromt he Yahoo Design Pattern Libary. 2 Social Design Patterns for Reputation Systems: An Interview with Yahooâ€™s Bryce Glass by Joshua Porter. 3 Social Design Patterns for Reputation Systems: An Interview with Yahooâ€™s Bryce Glass by Joshua Porter. 4 Social Gaming Summit panel writeups by Jeremy Liew. 5 How to design a reputation system for your social media site or social game by Jeremy Liew. 6 Addicted to Achievements? from the GamerScoreBlog.com 7 Loss Aversion from wikipedia.org 8 I Love My Chicken Wire Mommy by Ben Brown 9 Designing Your Reputation System by Bryce Glass
  avoid_when:
  - Achievements would feel patronizing to the target audience
  related_patterns: [Achievements, leaderboard, Levels, reputation]
  tags: [social, reputation, gamification]
  source_url: https://ui-patterns.com/patterns/CollectibleAchievements
  votes:
    up: 3
    down: 64
- id: ActivityStream
  name: Activity Stream
  problem: Users want to stay updated on what people in their network are doing.
  source_problem: The user wants to get an overview of recent actions in a system that are interesting
    from his or her perspective.
  when_to_use:
  - Social networks, team collaboration tools
  - Any app with user-generated activity
  solution: |
    Show a chronological or algorithmic feed of actions.
    Include actor, action, object, and timestamp. Allow filtering by type.
    Support infinite scroll for browsing.
  rationale: >-
    Activity streams allow for engagement. They expose users to the possible actions that can be taken
    on a site. At a glance, users can see what other people are doing and start experimenting themselves.
    In this sense, activity streams is an alternate form of navigation and discovery. Activity streams
    are real-time, and thus put a focus on what is going on right now: They have timely relevance. They
    allow users to stay in touch across the web in an open and emergent fashion. As activity streams consists
    of many small bits of information. Bits of information that can be filtered, searched, and automated.
    They are a combination of quantitative small stories with qualitative attributes. However, the stories
    can be qualitative in nature like updating a status in facebook and the attributes can be quantitative
    such as the number of likes. Content that has value to the user can be produced by combining smaller
    bits of information, which in isolation does not have value. Similarly, the large quantities of data
    can be used to predict what is more important for one user based on his or her past behavior.
  discussion: |-
    Avoiding negatives It seems as though most social services using activity streams have avoided allowing negative actions. On facebook, for instance, you can “Like” an activity, but not “Dislike” it. When you become friends with a new person, your activity stream is updated with a story, but not when you remove a friend. Keeping it relevant One of the biggest issues when designing activity streams is to figure out what is relevant to the user. Activity streams are built upon large quantities of data which allows you to display a vast amount of different activities. The challenge lies in finding the threshold of relevancy. A good activity stream is custom-built for the culture of its web site. The perfect activity stream centers in on what is relevant to the user, and filters everything away. On an abstract level, it subtracts relevant conversations from everything that happens in a noisy room. Activity streams attract momentary action Activities in the stream are transitory, bringing a sense of immediacy to social media, as new activities bump current activities out of view in a relatively short amount of time. New activities attract momentary attention, and thus also call for immediate action. The problem is however that we do not always have time for immediate action, and by the time we do have time for action, the activity has slipped away to make room for new real-time updates. Activities in the activity stream are geared towards the present moment and the recent past 3. Should activity streams be made searchable, permalinked, or catalogued in order to make them timeless, or can we do with the fact that the current state of the system represents the sum of all activities in the stream? Make it easy to scan Each activity type varies in design as they each describe different kinds of content. Make sure that different activity types have a similar look, so that it is easy for the eye to scan them. When we judge if something is relevant to us, the actor plays a big role. We are most likely more interested in reading about our closest friend than our mother in law. This is why most activity streams have a separate column for only thumbnail avatars depicting an activity’s main actor.
    Sources 1 Activity feed at the Social Media Design Pattern Libary 2 Activity Streams presentation by Chris Messina. 3 Activity Streams, Ephemeral Data and the Short List Pattern by Corvus Consulting. 4 Activity stream scanning affordances by Steve Kuhn. 5 Activity stream standardized format
    This article has been commented 2 times.
  avoid_when:
  - Privacy concerns make activity sharing inappropriate
  related_patterns: [follow, notifications, ContinuousScrolling]
  tags: [social, feed, engagement]
  source_url: https://ui-patterns.com/patterns/ActivityStream
  votes:
    up: 6
    down: 69
- id: auto-sharing
  name: Auto-Sharing
  problem: Manually sharing every action to social platforms is tedious.
  source_problem: The user wants to easily share their activity with their social networks.
  when_to_use:
  - Fitness achievements, music listening
  - Any activity users want to broadcast
  solution: |
    Offer opt-in automatic sharing to connected social accounts.
    Let users control what gets shared and where.
    Always allow disabling. Never share without explicit consent.
  rationale: >-
    Auto-sharing help users engage with their friends and family in everyday activities like listening
    to a song or reading an article on an external website. Furthermore, auto-sharing is a great way to
    build awareness and engagement within the application itself. For interactions like uploading a photo
    to Carousel or a video to Vimeo, this pattern makes it even easier for users by eliminating an extra
    step in the process which they are most likely going to take.
  avoid_when:
  - Activity is private or sensitive by default
  related_patterns: [ActivityStream, invite-friends, Self-expression]
  tags: [social, sharing, automation]
  source_url: https://ui-patterns.com/patterns/auto-sharing
  votes:
    up: 31
    down: 44
- id: direct-messaging
  name: Direct Messaging
  problem: Users need to communicate privately within the platform.
  source_problem: The user wants to interact privately with other individuals or groups from within the
    system
  when_to_use: ['Social networks, marketplaces', 'Team tools, dating apps']
  solution: |
    Provide inbox with conversations. Support text, images, and file attachments.
    Show read/delivered status. Push notifications for new messages.
    Allow blocking and reporting.
  rationale: >-
    Chat as an interface is as old as the command line. Combining chatbots with the social interactions
    of direct and group messaging, chat as an interface can comprehend use cases as varied as paying your
    gas bill, deploying code, or building intimate social relations..
  avoid_when:
  - Communication should be public (forums, Q&A)
  related_patterns: [friend-list, notifications, friend]
  tags: [social, messaging, communication]
