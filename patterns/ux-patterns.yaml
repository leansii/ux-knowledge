    up: 54
    down: 23
- id: temptation-bundling
  name: Temptation Bundling
  problem: Users avoid beneficial but unpleasant tasks.
  source_problem: Engaging in hard tasks is more likely when coupled with something tempting
  when_to_use:
  - Exercise apps, learning platforms
  - Task management, compliance training
  solution: |
    Pair the undesirable task with something enjoyable.
    "Complete this module to unlock a bonus episode."
    Make the reward only available when doing the target task.
  rationale: |-
    Bundle something users enjoy with something they dread to push to take action. When struggling to find enough internal motivation to tackle something you hate, an extrinsic reward can be the needed push to stop avoiding the task. Let users do the right thing and reward them for it.
    Sources Although the research body is large in regards to understanding situational factors that motivate people to pursue their aspirations, few studies have investigated naturally arising points in time when people feel particularly motivated to tackle their goals. Besides Dai, Milkman, and Riis, who coined the Fresh Start Effect, BJ Fogg addresses the concept of motivational waves. 1 Milkman, K. L., et. al. (2014). Holding the Hunger Games Hostage at the Gym: An Evaluation of Temptation Bundling, Management Science 2 Use “Temptation Bundling” to Achieve Your Goals by Taylor Martin 3 How to Stop Procrastinating and Boost Your Willpower by Using “Temptation Bundling” by James Clear 4 Kirgios, et. al. (2020). Teaching temptation bundling to boost exercise: A field experiment. Organizational Behavior and Human Decision Processes, Volume 161, p20-35 5 Temptation Bundling at Learning Loop
  avoid_when:
  - The pairing feels forced or unnatural
  related_patterns: [Variable-rewards, Achievements, Unlock-features]
  tags: [persuasion, cognition, motivation]
  source_url: https://ui-patterns.com/patterns/temptation-bundling
  votes:
    up: 2
    down: 3
- id: cashless-effect
  name: Cashless Effect
  problem: Digital payments don't trigger the same pain of spending as physical cash.
  source_problem: We spend more when no cash is involved in a transaction
  when_to_use:
  - In-app purchases, subscription pricing
  - E-commerce checkout optimization
  solution: |
    Offer stored payment methods, one-click purchase, virtual currencies.
    Reduce friction at the point of payment.
    But also: provide spending summaries to help users stay informed.
  rationale: |-
    The more effortless a sale is, the less conscious effort it requires and the more revenue it will generate. Simplicity pays off. We are more aware of the exchange of value that occurs, when we pay with cash as it is visible and tangible and similarly lose it when we pay by credit card. The Cashless Effect disregards purchase size and influences both a $1 sale and a $1000 sale.
    Sources The cashless effect was first studied by Elizabeth Hirschman, a marketing and economics researcher, in 1979. She was interested in HOW people spend money rather than WHY and found a difference in spending between those who paid with cash and those who paid with a credit card or store issued card. 1 The Cashless Effect, explained at Decision Lab 2 Cashless Effect at Coglode 3 Hirschman, E. C. (1979). Differences in Consumer Purchase Behavior by Credit Card Payment System. Journal of Consumer Research, 6(1), 58-66. 4 Feinberg, R. (n.d.). Credit Cards as Spending Facilitating Stimuli: A conditioning interpretation. Journal of Consumer Research, 13(1), 348-356. 5 Soman (2003) The Effect of Payment Transparency on Consumption: Quasi-Experiments from the Field. Marketing Letters 6 The Cashless Effect | Behavioural Science in Banking at Moneythor 7 The Cashless Effect at Learning Loop
  avoid_when:
  - Users should be making more deliberate spending decisions
  related_patterns: [ShoppingCart, Coupon, present-bias]
  tags: [persuasion, cognition, spending]
  source_url: https://ui-patterns.com/patterns/cashless-effect
  votes:
    up: 4
    down: 6
- id: inaction-inertia-effect
  name: Inaction Inertia Effect
  problem: Users who miss one opportunity become less likely to act on the next, similar one.
  source_problem: We are less likely to buy having previously missed a more attractive offer
  when_to_use: [Re-engagement campaigns, Expired offer follow-ups]
  solution: |
    After a missed opportunity, offer a different framing rather than the same offer.
    "Here's something new" rather than "Last chance at the deal you missed."
    Avoid reminding users of what they missed.
  rationale: |-
    When missing an appealing offer, a less attractive but still desirable deal is likely to be forfeited. As the difference between the first and second offer grows, so does the prominence of the effect. The effect can be explained by regret, as missing is seen as a loss, and as a devaluation of the later offer, as the first offer seems to serve as an anchor against the current one.
    Sources The Inaction Inertia Effect has been examined closely by decision theory within the field of behavioral economics. 1 Zeelenberg, M., Nijstad, B. A., van Putten, M., & van Dijk, E. (2006). Inaction inertia, regret, and valuation: A closer look. Organizational Behavior and Human Decision Processes, 101(1), 89–104 2 van Putten, M et al (2013). Inaction inertia, European Review of Social Psychology, 24(1), 123–159 3 Liu, H.-H. and Chou, H.-Y. (2021), Effects of comparability of promotions on inaction inertia, Marketing Intelligence & Planning, Vol. 39 No. 1, pp. 125-139. 4 Inaction Inertia Effect at Learning Loop
  avoid_when:
  - The same offer is genuinely still available
  related_patterns: [fresh-start-effect, framing, Scarcity]
  tags: [persuasion, cognition, decision]
  source_url: https://ui-patterns.com/patterns/inaction-inertia-effect
  votes:
    up: 1
    down: 0
- id: choice-closure
  name: Choice Closure
  problem: Users who keep second-guessing a decision experience less satisfaction.
  source_problem: We are more satisfied with decisions when we engage in physical acts of closure
  when_to_use:
  - Post-purchase confirmation
  - After completing a selection process
  solution: |
    Provide clear confirmation that the choice is made. "Great choice!"
    Remove or reduce visibility of alternatives after selection.
    Reinforce the decision with positive feedback.
  rationale: |-
    We perceive a decision to be more final when we engage in specific physical acts metaphorically associated with the concept of closure – such as closing a menu after selecting food. Create distinguishable separate experiences for closure such as having billing separate from browsing, or having customers collect and seal their product in-store. This can in turn help both increase satisfaction.
    Sources The idea os Choice Closure orignates from research around Conceptual Metaphors, suggesting that we grasp abstract concepts through physical experiences (George Lakoff and Mark Johnson) and inspired by psychological closure describing the feeling of concluding life experiences (Arie Kruglanski). 1 Gu, Botti & Faro (2013). Turning the Page: The Impact of Choice Closure on Satisfaction. Journal of Consumer Research, Vol. 40, No. 2 2 Lakoff & Johnson (1980), Metaphors We Live By, Chicago and London: University of Chicago Press. 3 Choice Closure: An Intervention to Increase Customer’s Satisfaction after a Purchase 4 Choice Closure at Learning Loop
  avoid_when:
  - Users genuinely need to compare alternatives after selecting
  related_patterns: [Commitment-consistency, Praise, Need-for-closure]
  tags: [persuasion, cognition, satisfaction]
  source_url: https://ui-patterns.com/patterns/choice-closure
  votes:
    up: 4
    down: 4
- id: Limited-choice
  name: Limited Choice
  problem: Too many options cause decision paralysis and lower satisfaction with the final choice.
  source_problem: We are more likely to make a decision when there are fewer options to choose from
  when_to_use:
  - Product offerings, plan selection
  - Menu design, feature sets
  solution: |
    Limit options to 3-5 choices. Curate the best options.
    If more options exist, use progressive disclosure or recommendations.
    Highlight the recommended or most popular choice.
  rationale: |-
    Making a decision becomes overwhelming when we aare faced with many options due to the many potential outcomes and risks that may result from making the wrong choice. Having too many approximately equally good options is mentally draining. Although larger choice sets can be initially appealing, smaller choice sets lead to increased satisfaction and reduced regret.
    Sources One of the central contributions of cognitive psychology has been to explore limitations in the human capacity to store and process information. Ou ability to pursue multiple intentional goals at any one time is thought to be restricted by a limited budget of strategic processing capacity This pattern talks to the core foundation of cognitive psychology: we have a limited processing capacity. 1 Hertwig & Todd (2003). More Is Not Always Better: The Benefits of Cognitive Limits, Thinking: Psychological Perspectives on Reasoning, Judgment and Decision Making, Chapter 11, John Wiley & Sons 2 Iyengar & Lepper (2000). When choice is demotivating: Can one desire too much of a good thing?, Journal of Personality and Social Psychology. 79 (6): 995–1006 3 The Psychology of Choice by Liraz Margalit 4 Limited Choice at Learning Loop
  avoid_when:
  - Users are experts who need full selection
  related_patterns: [GoodDefaults, Reduction, PricingTable]
