- id: zeigarnik-effect
  name: Zeigarnik Effect
  problem: Completed tasks are quickly forgotten, but incomplete ones linger in memory.
  source_problem: We remember uncompleted or interrupted tasks better than completed ones
  when_to_use:
  - Progress indicators that show incomplete status
  - Onboarding checklists, profile completion
  solution: |
    Show users what's incomplete to keep them engaged.
    "You're 60% done — just 3 more steps!" The open loop drives return visits.
    Combine with notifications about unfinished tasks.
  rationale: |-
    The Zeigarnik effect suggests that when we suspend our work on a task to perform unrelated activities, we will remember the details of the first task better than people who complete it without a break.
    Sources Bluma Wulfovna Zeigarnik was a Soviet psychologist discovered the Zeigarnik effect and contributed to the establishment of experimental psychopathology as a separate discipline in the Soviet Union in the post-World War II period. In Gestalt psychology, the Zeigarnik effect has been used to demonstrate the general presence of Gestalt phenomena. 1 Zeigarnik, B (1927) Über das Behalten von erledigten und unerledigten Handlungen, Psychologische Forschung 2 Koffka, Kurt (1935). Principles of Gestalt Psychology. London: Kegan Paul, Trench, Trubner & Co. p. 334ff 3 Zeigarnik Effect on Wikipedia 4 The Zeigarnik Effect: Why it is so hard to leave things incomplete. by Abhishek Chakraborty 5 The Zeigarnik Effect at Learning Loop
  avoid_when:
