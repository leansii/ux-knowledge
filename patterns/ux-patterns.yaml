- id: modal-windows
  name: Modal Windows
  problem: A subtask needs user attention without losing the context of the parent page.
  source_problem: The user needs to take an action or cancel the overlay until he can continue interacting
    with the original page
  when_to_use:
  - Confirmations, alerts, quick data entry
  - Content preview, login prompts
  solution: |
    Overlay a focused dialog on top of a dimmed background.
    Include a clear close button and Escape key to dismiss.
    Keep modals focused on a single task. Don't stack modals.
  rationale: >-
    Although effective in focusing attention, introducing multiple modes comes with the risk of introducing
    mode errors where the user forgets the state of the interface and tries to perform actions appropriate
    to a different mode.
  discussion: |-
    Modals have been considered a UI anti-pattern. The main reason lies in the definition of a modal window: A window that prevents the user from interacting with your application until she closes the window1. Modal windows interrupt users and force them into doing a specific action. Arguably, in most cases, there is no need to force users into specific actions. As a result, modal windows introduce unnecessary pain points for your users. The alternative is modeless interfaces. Interfaces that allow users to change their mind at any point. Interfaces that do not force users into a specific set of actions. Also, modals do not work well on mobile devices as they take up screen space and introduce additional user interface elements.
    Sources 1 Modal WIndow at Wikipedia.org 2 Design patterns for replacing modal windows by L. Mathis
  avoid_when:
  - Content is long or complex (use a new page instead)
  - Mobile — modals are harder to interact with on small screens
  related_patterns: [Tunnelling, ProgressiveDisclosure]
  tags: [navigation, overlay, focus]
  source_url: https://ui-patterns.com/patterns/modal-windows
  votes:
    up: 6
    down: 244
- id: notifications
  name: Notifications
  problem: Users miss important events, updates, or actions that require their attention.
  source_problem: The user wants to be informed about important updates and messages
  when_to_use:
