- id: SortByColumn
  name: Sort by Column
  problem: Users need to reorder data to find highest, lowest, newest, or alphabetically first items.
  source_problem: The user needs to be able to sort the data in a table according to the values of a column.
  when_to_use:
  - Any data table with comparable values
  solution: |
    Make column headers clickable to sort. Show sort direction arrow.
    Toggle between ascending/descending on repeated clicks.
    Default to the most useful sort order.
  rationale: |-
    The pattern provides an easy way to organize and compare data in a table. Furthermore, the pattern is also well known from desktop applications dealing with rows of data.
