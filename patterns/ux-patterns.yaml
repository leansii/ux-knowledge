    up: 2
    down: 68
- id: PricingTable
  name: Pricing Table
  problem: Users need to compare plans or packages to choose the right one.
  source_problem: The user needs to get an overview of what pricing plans are offered and how they differ
  when_to_use:
  - SaaS pricing pages
  - Service tiers, subscription plans
  solution: |
    Show plans side by side with features in rows. Highlight the recommended plan.
    Use checkmarks for included features. Show price prominently.
    Include a clear CTA for each plan.
  rationale: >-
    Converting interested visitors into paying customers is your biggest aim. Use pricing tables to illustrate
    what your product is capable of in full bloom and at the same time to lure them in.
  discussion: |-
    There are several factors you can tweak to increase conversion. The following are techniques and patterns observed in use. Apply hooks Hooks are what defines the differences between the plans offered – the factors that will trigger the user to need an upgrade or force them from downgrading. Hooks [for website plans] are most often defined by of these 4 parameters: Features More expensive plans offer features not available in cheaper plans. Resources used Maximum levels in different categories (e.g. file storage used, number of posts, amount of projects) can be defined to push the user into upgrading as these parameters grow as the user continuously uses the system. Unlike the traffic parameter listed below, these are options, which the user can do something about: Uploaded files can be deleted to lower used file storage and old posts can be deleted to make room for new posts. Resources consumed Where Resources used is defined in absolute values, Resources consumed is different as it is defined by absolute values per time unit. For instance by number of posts by users or user visits (hits) per month. Resources consumed can also be defined as traffic. The user cannot do much about the traffic his service experiences as this is defined by the popularity of the service the user has bought (for instance a blog, a webcounter, or a forum). Traffic is defined by the usage of the user’s visitors. Defining plans with this parameter can be tricky, as you need an alternative to fall back on, if the user does not wish to upgrade to the plan his traffic demands. Services with plans involving this parameter often have ad-supported versions to make up for users that do not wish to upgrade. The user is everything: we do not want to loose him or her. Number of services A fourth parameter is the number of services allowed. For instance the amount of projects, blogs, or forums offered to each account. Highlight why users should pay for your product If price is the main parameter you’re competing on, highlight it. Make the price big. If not, soften the pricing and put more focus on the benefits and the features. If your case is the latter, chances are that your users will spend the least amount of money they can get away with – at least to start with. First one free Most subscription services at ASPs have free plans. Can you give something away, which gets people interested or even addicted, so they come back and possibly pay for more? In more humane terms: offer a way for people to play around with your product or use it in order for them to decide if the full fledged product is worth buying. Order plans by descending price If you order your plans by the cheapest plan first, chances are that users will stop looking at the benefits of the more expensive plans as they’ve reached their preferred pricing level. Because we read from left to right, users won’t be able to ignore your high-end plan if you place them in order of descending price – the most expensive in the left and the cheapest on the right. Users are more likely to ignore higher pricing plans and only consider cheaper ones if you list the cheapest plan to the left. Add decoys Can you add “decoy” choices, making the others (which you want people to pick) look better in comparison? Add a decoy to remove focus from your actual highest pricing plan. The Goldilocks effect: We are aversive toward extremes So you don’t need actual decoys – still, you should consider the fact that we are aversive toward extremes. [Provide] a premium as well as a budget option alongside a regularly priced product to make the latter seem more appealing3. If you are selling a small and a large plan, you might want to add a middle plan in order to push people usually buying the cheapest into buying a more expensive plan. This method is a way of exploiting our psychological biases and manipulating us into choosing the option that yields greater profit – often placed centrally within the pricing range. Let people know what they’re missing Fade out or strike-through things not available on lower plans to give users a feeling of not having a full product – in order to play on our inept urge for closure and completeness. Showcase differences with extremes Quantify features into extremes to let differences between plans seem extreme. “Unlimited users” next to “10 users” might appear as an extreme difference, but might not be that big a deal if the average user count per account is around 10-15.
    Sources 1 7 Useful Design Strategies for a Successful Pricing Table at uxmovement.com 2 Decoys by Dan Lockton at Design with Intent 3 Persuasive purchase behaviour â€“ Understanding the power of the Goldilocks Effect by Paul Seys form shortboredsurfer.com
    This article has been commented 2 times.
  avoid_when:
  - Single pricing option with no tiers
  related_patterns: [Anchoring, decoy-effect, framing]
  tags: [commerce, pricing, comparison]
  source_url: https://ui-patterns.com/patterns/PricingTable
  votes:
    up: 18
    down: 65
- id: ProductPage
  name: Product Page
  problem: Users need comprehensive information to make a confident purchase decision.
  source_problem: The user need to know details about a product in order to make a purchase decision or
    satisfy a need for support.
  when_to_use:
  - E-commerce, marketplace listings
  - Any item that requires evaluation before action
  solution: |
    Show high-quality images with zoom. Include title, price, description, specs.
    Add reviews/ratings, availability, shipping info.
    Clear add-to-cart CTA above the fold.
  rationale: >-
    Converting interested visitors into paying customers is your biggest aim. Design your product pages
    with the purpose of persuading users to buy one or more of the products you are selling.
  discussion: |-
    There are several factors you can tweak to increase conversion. The following are techniques and patterns observed in use: Use quality product photos. Photos serve two functions: (1) to set the tone (the web shop knows what it’s doing and it’s a quality place to shop) and (2) customers should be able to see products from every angle and get a feeling of how the quality “feels”. Use video. Video can help make up for not being able to “try the product on” and give the user a feel of how the product performs, sounds, looks in function, etc.. One of the things that made ASOS (As Seen On Screen) big was the ability to see catwalk videos of most products. User reviews. Allow users to post reviews of products in order to assist customers in their decision process. User contributed product reviews can provide valuable information on which users can base their purchase decisions on. They are especially popular among retailers and travel companies. User reviews help provide social proof of the product. Expert opinions. Expert opinions about the product can help persuade the user into buying that exact product. However, there is a considerable possibility that the user will feel like it’s a paid sales pitch. Use expert opinions with caution – they most often work with product gurus or when the opinion was published in an independent and credible publication. Present related products. Amazon’s popular “Users who bought this also bought” function is the most known. Other web shops rely on building up relations between products manually or simply fall back to listing products from the same category. Reinforce customer trust. Use trust indicators like badges of secure payment gateways that everybody knows. Brands like PayPal or VeriSign convey a sense of security and put most doubts about data theft and security to rest. Credit card icons also provide a great a sense of comfort. A credit card form without credit card icons feels wrong. Other trust indicators are the brand names (and their logos) you sell, money back guarantees, industry standards or ratings. Prioritize important information and avoid hide-and-seek. Don’t make it hard for people to find what they’re looking for. There is no salesperson to answer questions online, so don’t make it hard for people to find the answer themselves.
    Sources 1 Product Page design pattern at welie.com by Martin van Welie 2 10 tips on ‘product page’ design in time for Christmas’ at econsultancy.com 3 Design for trust by Anders Toxboe on UI-patterns.com 4 What people see before they buy from cxpartners.co.uk
    This article has been commented 3 times.
  avoid_when:
  - Product is low-cost impulse buy that doesn't need detailed info
  related_patterns: [Gallery, ImageZoom, RateContent, ShoppingCart]
  tags: [commerce, product, detail]
  source_url: https://ui-patterns.com/patterns/ProductPage
  votes:
    up: 38
    down: 306
- id: ShoppingCart
  name: Shopping Cart
  problem: Users want to collect multiple items before committing to a purchase.
  source_problem: The online shopping experience needs to be realized through a real world analogy.
  when_to_use:
  - Any e-commerce site
  - Digital stores, subscription add-ons
  solution: |
    Persistent cart icon with item count badge. Allow adding/removing items.
    Show itemized list with quantities, prices, and total.
    Clear path to checkout. Save cart across sessions.
  rationale: |-
    The shopping cart is a well known metaphor for shopping online. The metaphor provides the user with the idea, that putting items in the shopping cart does not necessarily mean that he or she is buying those items, as they can be removed before checking out of the store. The shopping cart pattern allows the user to collect a number of items first in order to pay for them all at a later time. The checkout metaphor goes well with the shopping cart as it resembles the process at a real super market.
    This article has been commented 3 times.
  avoid_when:
  - Only single-item purchases are possible
  related_patterns: [ProductPage, Coupon, Wizard]
  tags: [commerce, checkout, collection]
  source_url: https://ui-patterns.com/patterns/ShoppingCart
  votes:
