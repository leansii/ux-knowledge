- id: ForgivingFormat
  name: Forgiving Format
  problem: Users enter data in varied formats (with/without dashes, spaces, country codes) and get rejected.
  source_problem: The user needs to quickly enter data into the system, which then in turn interprets
    the user's input.
  when_to_use:
  - Phone numbers, dates, postal codes
  - Any field where multiple input formats are valid
  solution: |
    Accept multiple formats and normalize them internally.
    Parse "March 5" and "3/5" and "2025-03-05" as the same date.
    Show the normalized format after input so users see what was understood.
  rationale: |-
    Using the forgiving format pattern saves space and decreases the barrier for the user to interact with the system. Depending on how widely defined the input topic is, it can be increasingly hard for the backend program to interpret the input field. The success of this pattern has much to do with how information requested – how the user is prompted.
    This article has been commented 2 times.
  avoid_when:
  - Ambiguity between formats could cause errors (3/5 — March 5 or May 3?)
  related_patterns: [StructuredFormat, InputFeedback]
  tags: [input, tolerance, validation]
  source_url: https://ui-patterns.com/patterns/ForgivingFormat
  votes:
    up: 40
    down: 96
- id: InputPrompt
  name: Input Prompt
  problem: An empty input field gives no indication of what the user should enter.
  source_problem: The user needs to enter data into the system
  when_to_use:
  - Search fields, comment boxes
  - Any field where the expected input isn't obvious from the label alone
  solution: |
    Use placeholder text to show an example or hint ("e.g., Search by name or email").
    The prompt disappears when the user starts typing.
    Don't use placeholders as the only label — they disappear.
  rationale: |-
    When a user fills out a form it is most often with the purpose of filling it out as quickly as possible to get on with the service offered. This is why the user often just scans through form fields and labels without giving the labels much of a glance. By using input prompts, immediate attention is drawn to what the user needs to fill in. The user can’t miss it. Although you must beware of removing labels entirely, as the input prompt is removed once focus has been set to the text field. Input prompt is often used for small forms that are key to the core functionality of a site as inserting the label inside the text field itself helps save space. For more elaborate forms, there is often more than enough room available to explain each input field.
    This article has been commented 3 times.
  avoid_when:
  - The field label already makes the expected input clear
  related_patterns: [GoodDefaults, InlineHelpBox]
  tags: [input, guidance, placeholder]
  source_url: https://ui-patterns.com/patterns/InputPrompt
  votes:
    up: 20
    down: 139
- id: undo
  name: Undo
  problem: Users make mistakes or change their mind but feel afraid to experiment without a safety net.
  source_problem: The user wants to revert a mistaken input
  when_to_use:
  - Any destructive or significant action
  - Content editing, item deletion, bulk operations
  solution: |
    Provide Ctrl+Z/Cmd+Z for editing. Show "Undo" toast/snackbar after actions.
    For deletions, use soft delete with time window to undo.
    Support multi-level undo where possible.
  rationale: >-
    Users aren’t perfect – they tend to make mistakes. Promote safe exploration and playfulness by providing
    confidence that mistakes aren’t permanent. Multi-level undo lets users incrementally construct and
    explore work paths quickly and easily. The more costly it is to lose data, the more important it is
    to provide the opportunity to undo.
  discussion: |-
    A great side effect of utilizing the Undo pattern, is that it provides users with more confidence and more willingness to try new and different things. By promoting trial and error, users are able to learn and master your application more quickly.
    Sources 1 Undo Design Pattern at Quince 2 Undo Design Pattern at Patternry.com 3 Multi-level Undo Design Pattern by Jenifer Tidwell 4 Goodbye Back Button by Michael Zuschlag 5 The importance of Undo by Paul Boag 6 Never Use a Warning When you Mean Undo by Aza Raskin
  avoid_when:
  - The action has already been communicated externally (sent email)
  related_patterns: [autosave, drag-and-drop]
  tags: [input, error-recovery, safety]
  source_url: https://ui-patterns.com/patterns/undo
  votes:
    up: 50
    down: 66
- id: GoodDefaults
  name: Good Defaults
  problem: Users abandon forms that require too many decisions before they can proceed.
  source_problem: The user needs to enter data into the system, where some input values are most likely
    to match default values.
  when_to_use:
  - Settings, configuration forms
  - Any form where common choices are predictable
  solution: |
    Pre-fill fields with the most common or recommended values.
    Base defaults on user context (locale, device, past behavior).
    Let users change defaults easily but make the common path effortless.
  rationale: |-
    By providing default values in often complex forms with many choices, you save the user from the hassle of selecting all the relevant choices. Filling out a long form can sometimes be enough reason for the user to go somewhere else, where the process is easier. The default values might not be right, but at least you provided the user with an example that he can change with as much effort as he would have put in if there was no example.
    This article has been commented 2 times.
  avoid_when:
  - There's no clearly "common" choice and wrong defaults cause problems
  related_patterns: [settings, ForgivingFormat, FillInTheBlanks]
  tags: [input, efficiency, forms]
  source_url: https://ui-patterns.com/patterns/GoodDefaults
  votes:
    up: 1
    down: 97
- id: Wizard
  name: Wizard
  problem: A complex task with many inputs overwhelms users when presented all at once.
  source_problem: The user wants to achieve a single goal which can be broken down into dependable sub-tasks.
  when_to_use:
  - Multi-step registration or setup flows
  - Complex configurations (e.g., deployment, integrations)
  solution: |
    Break the process into sequential steps, one screen per step.
    Show progress and allow navigation between completed steps.
    Validate each step before allowing progression.
  rationale: >-
    By splitting up a complex task into a sequence of chunks, you can effectively simplify the task. Each
    chunk represents a separate mental space, easier to deal with alone than as a whole. Contrary to the
    Steps Left pattern, the steps needed to perform a goal can vary depending on the information inputted
    in earlier stages. By separating complex tasks needed to achieve a goal into several steps, the process
    of inputting data can take several different directions depending on what input is entered. The complex
    task of inputting large amounts of dependable data can be adjusted and streamlined to fit the decisions
    of a user throughout a process. In the context of decisions the user makes in each step, unnecessary
    steps can be cut out and important steps can enter into the focus. In a system with many variables,
    a user can reach their goals by manipulating these variables in different ways. The Wizard pattern
    can be used to group such variables into separate goals. This will convert the task of completing
    a complex goal from multiple disparate actions into a coherent process. When users are forced to follow
    a set of pre-defined steps they are less likely to miss important aspects of a process and will thus
    commit fewer errors. Minimum of training Wizards are often made for the untrained user. For this reason,
    make sure your wizard can be completed without training. A rationale behind using a wizard is to avoid
    training for rare or intimidating tasks – not to develop expertise5.
  avoid_when:
  - The task has fewer than 3 logical steps
  - Users need to see all options simultaneously to make decisions
  related_patterns: [StepsLeft, CompletenessMeter, ProgressiveDisclosure]
  tags: [input, process, step-by-step]
  source_url: https://ui-patterns.com/patterns/Wizard
