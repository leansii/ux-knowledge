- id: Kairos
  name: Kairos
  problem: Messages delivered at the wrong time are ignored or cause annoyance.
  source_problem: Communicate to users in situations that are the opportune moments for change
  when_to_use:
  - Push notifications, upgrade prompts
  - Feature suggestions, tips
  solution: |
    Deliver messages at the moment of maximum receptivity.
    Suggest upgrade after user hits a limit. Show tips when user struggles.
    After a success, suggest sharing. Timing is everything.
  rationale: |-
    Kairos is ancient greek for “the right, critical, or opportune moment” for action. It is the passing instant when an opening appears, which must be driven through with fource if success is to be achieved. Relevance, recent events, and who the audience is plays a role in determining the right moment to act. Map them ot. Kairos represents situations of change. Situations of change are potentially valuable because they represent moments where users are open and receptive to making a deal or changing a behavior. By striking at the exact right time, the chances of successfully being effective in delivering your message an in turn create sales, change behavior, or in other way influence users’ decisions are much larger than striking at any other time. Utilizing Kairos is a step away from broadcasting your message to everybody all the time toward tailoring your message to the individual at the right time. The same message is relevant to different people at different opportune moments.
    Sources In ancient greek rhetorics, Aristotle defined Kairos as the time and space context in which the proof of an argument should be delivered to the audience for optimal persuasion. 1 Kairos at wikipedia.org 2 E. C. White, Kaironomia p. 13 3 Lundberg, et. al. (2008). The essential guide to rhetoric (2nd ed.). Macmillan Learning. p. 15. 4 Jebb, Richard C. (trans.) (1909). The Rhetoric of Aristotle. Cambridge: University Press. 5 Kairos persuasive technique at Learning Loop
  avoid_when:
  - You can't reliably detect the right moment
  related_patterns: [Trigger, notifications, Tailoring]
  tags: [persuasion, feedback, timing]
  source_url: https://ui-patterns.com/patterns/Kairos
