- id: curiosity
  name: Curiosity
  problem: Users need a reason to explore deeper into the product or content.
  source_problem: We crave more when teased with a small bit of interesting information
  when_to_use: ['Content teasers, previews', 'Feature discovery, onboarding']
  solution: |
    Create information gaps that users want to fill. "See what's inside."
    Show partial content that intrigues. Use mystery rewards.
    Reveal information progressively.
  rationale: |-
    Reveal just a tiny bit to arouse interest and create a knwledge gap. As humans, we are driven to seek the information missing to closes the knowledge gap. Tease users with a fragment of the whole picture and let them take action to reveal more. You can delay filling in the missing pieces for quite a long time, but be aware of the point where you start introducing too much discomfort.
    Sources Academic research on Curiosity has undergone 2 waves of intense activity. The first in the 1960s focused mainly on curiosity’s psychological underpinnings – a drive-based approach producing an unpleasant sensation (usually labeled arousal). The second in the 1970s and 1980s tried to measure curiosity across varius dimensions without producing a reliable and valid curiosity scale, but honing in on a useful definition. 1 Loewenstein, G. (1994). The psychology of curiosity: A review and reinterpretation. Psychological Bulletin, 116(1), 75–98 2 Jirout, J. J. (2020). Supporting Early Scientific Thinking Through Curiosity. Frontiers in psychology. 3 The Curiosity Effect at Learning Loop
  avoid_when:
  - Clickbait that disappoints when the answer is revealed
  related_patterns: [ProgressiveDisclosure, Paywall, Intentional-gaps]
  tags: [persuasion, cognition, engagement]
  source_url: https://ui-patterns.com/patterns/curiosity
