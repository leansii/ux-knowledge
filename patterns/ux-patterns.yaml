- id: Appropriate-challenge
  name: Appropriate Challenge
  problem: Tasks that are too easy are boring; too hard causes frustration and dropout.
  source_problem: The user needs appropriate challenges to remain engaged
  when_to_use:
  - Learning platforms, games
  - Progressive skill-building features
  solution: |
    Match difficulty to user skill level. Start easy, increase gradually.
    Provide hints when users struggle. Allow difficulty adjustment.
    The sweet spot is "challenging but achievable."
  rationale: |-
    Users are most engaged (in flow) when the difficulty of a challenge is matched with their skill level and is neither too hard or too easy. A too hard challenge will leave users stressed and full of anxiety. A too easy challenge will bore them. As a user’s skill level rises, a hard challenge becomes easy. Keep users in flow by ensuring a careful balance between the difficulty curve and the learning curve. Consider the context of your users and design appropriate challenges and experiences which suit it. That is, design for changes over time. This is a radical break from the the standard usability approach, where everything is concentrated around making things as easy as possible. By designing for changes over time, you also concentrate on making things harder (more advanced) to do as users progress, to suit their growing skill level. We’re in flow when we experience a task so positively that we do not allow ourselves to be diverted by distractions that don’t support the challenges and goals we are pursuing. To keep users in flow we need to give them appropriate challenges. If a challenge is too hard, the user is going to feel stress and anxiety. If the challenge is too easy, the user is going to feel bored. Both boredom and anxiety tend to lead to disengagement from the activity that was previously rewarding. To design for appropriate challenges is to keep a careful balance between producing neither anxiety nor boredom, to keep users in the flow channel. When you think about appropriate challenges in your design, you are most often designing for a sequence of events that progressively require an increased skill level. In video games, the events are often represented by levels; in e-learning, by lessons within courses. To complete a challenge, it is necessary that the requisite learning takes place.
    Sources Appropriate challenges is a concept from flow theory coined by coined by positive psyhologist Mihaly Csikszentmihalyi. According to the flow theory, we can acheive a mental state of flow in which we are fully immersed and involved in a feeling of energized focus and enjoyment doing appropriate challenges resulting in a transformation in our sense of time. 1 The Art of Game Design, Jesse Schell 2 Flow: The Psychology of Optimal Experience by Mihaly Csikszentmihalyi (2008) 3 Design for emotion and flow by Trevor van Gorp 4 Csikszentmihalyi, M. (2000). Beyond boredom and anxiety. Jossey-Bass. 5 Flow state at Wikipedia.org 6 The Psychology and Theory Behind Flow by Kori D. Miller 7 Appropriate Challenges at Learning Loop
  avoid_when:
  - The task difficulty is inherently fixed
  related_patterns: [shaping, Levels, Feedback-loops]
  tags: [gamification, design, difficulty]
  source_url: https://ui-patterns.com/patterns/Appropriate-challenge
