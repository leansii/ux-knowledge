- id: TipAFriend
  name: Tip a Friend
  problem: Satisfied users don't have an easy way to recommend the product to others.
  source_problem: The user wants to share something of interest with a peer.
  when_to_use:
  - After a positive experience (completed purchase, achievement)
  - Content that is inherently shareable
  solution: |
    Show share buttons at key moments of delight.
    Pre-fill a message the user can customize. Support email, social, and link sharing.
    Offer incentives for successful referrals.
  rationale: |-
    The Tip A Friend pattern is a function that facilitates the user’s need to easily spread the word about content. It can be useful if the information of interest is formatted in a way, that makes it hard to copy-paste into an understandable mail. The website can then help format the mail by setting up the info in a nice and readable format. The usefulness of this pattern when just letting the user send a blank mail with a link to the content in question, can be debated. The users need for this kind of functionality is often not justified.
    This article has been commented 8 times.
  avoid_when:
  - The moment isn't a natural sharing opportunity
  related_patterns: [invite-friends, Social-proof, Reciprocation]
  tags: [social, growth, word-of-mouth]
  source_url: https://ui-patterns.com/patterns/TipAFriend
