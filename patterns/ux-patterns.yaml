- id: cards
  name: Cards
  problem: Heterogeneous content items need a consistent, scannable visual container.
  source_problem: The user needs to browse content of varying types and length
  when_to_use:
  - Dashboards, product catalogs, social feeds
  - Any collection of items with image + text
  solution: |
    Use a rectangular container with image, title, and key metadata.
    Consistent card size in a grid layout. Include clear call-to-action.
    Cards should be clickable to see full content.
  rationale: >-
    Browsing is a large part of interaction, and users want to be able to quickly scan large portions
    of content and dive deep into their interests. Users can experience difficulty browsing text-heavy
    sites as displaying extra details for each item can clutter the screen and prevent efficient scanning.
    Cards are great for showcasing aggregated elements whose size or supported actions vary. Each card
    serves as an entry point to more detailed information, so it shouldn’t be overloaded with extraneous
    information or actions. They are dismissible, swipeable, sortable, and filterable. Cards allow you
    to present a heavy dose of content in a small and digestible manner: they divide all available content
    into meaningful sections, present a summary and link to additional details. A single card is a container
    that displays various parts of related information, from which users can get even more information.
    Why use cards? Cards help chunk data into content that is more easily aids scanned. Furthermore, cards
    are: Intuitive. Cards look similar to real-world tangible cards as they appear in user interfaces.
    They seem familiar to users. Before cards became popular elements in mobile and web apps, they were
    all around in real life: business cards, baseball cards, sticky notes. Cards represent a helpful visual
    metaphor that allow our brains to intuitively connect a card with the piece of content it represents
    – just like in real life. Easy to digest. Cards don’t take up much space and forces the designer to
    prioritise its content and form. In turn, each card becomes digestible pieces of content that are
    easily accessed and scanned. Cards make it easier for users to find the content that they are interested
    in – in turn this empowers them to engage in any way they want. Cards are attractive. Card-based design
    often relies heavily on visuals (especially, images); any copy is usually secondary to the visual
    in terms of the information architecture. The emphasis on using images can help make card-based design
    more attractive to users than the same content not arranged in cards. Advantageous for responsive
    design. Cards are almost infinitely manipulatable: the rectangular shape resizes smoothly to fit the
    horizontal and vertical orientations of different screens (easily scale up or down), which means users
    get a consistent experience across all devices. Shareable. Cards can encourage users to share content
    on social media, as it allows users to easily share only specific chunk of content vs a whole page.
  discussion: |-
    As with any design technique, a card-style interface is not a silver bullet for perfect usability. When to use cards However, there are some cases where cards are especially applicable: Browsing over search. Cards are better suited when users browse for information than when they search. Similar items. Cards work best for collections of heterogeneous items (when not all the content is of the same basic type). This is usually the case when you have: A stream of events. For example, Facebook uses cards to present a quick overview of recent events in their news feed. Facebook’s news feed is an endless stream, whereas cards are individual. The point of cards here is disaggregation: users are able to take a single event from the stream and share it. A discovery-based interface. Cards allow relevant content to naturally reveal itself, making possible for users to dive deep into their interests. Take a look at Dribbble, an online creative community which showcases creative work. Card-based design is a very suitable way for presenting such type of content. A workflow tool and when you can present a single task in a flow as a card. Cards can be easily categorized for a list of tasks. The Trello task management app does a great job of using a card-style interface to create a dashboard for users, where each card represents a separate task. A dashboard application*. Dashboards usually display a variety of content types simultaneously on the same page. In such situations, the card metaphor can help create more obvious differences between items where each card can accommodate different role. When you shouldn’t use cards There are also cases, where it’s better to opt for an alternative solution to cards: When the content you want to present is already grouped into very homogenous items such as: A list of similar products. The use of cards will be interfer with searching for specific items or compare different items. A standard list view is more relevant for such a case as a list view provide better scannability and requires less space. Gallery of images. The use of cards can distract the user and prevent easy scannability. A standard grid view can be more relevant when it allows the human eye can to scan the grid and its items more easily. Strict order. When you have a strict order in which you want users to scan the content. Card layouts typically deemphasize ranking of content as they don’t provide obvious information about the order in which content should be viewed on a page. As a result, there’s little hierarchy in the visual information presented. Cards can make all content look similar, which can make it hard (or even impossible) for users to easily discern the ranking importance of content. The problem of visual overload The most common pitfall of card-based design is the danger of visual overload. As cards are often used for sites which contain loads of information, they can end up producing a cluttered feel (especially on a large viewports), making it harder to parse the layout visually. How to improve design and interaction with cards There are a few things that can improve card design. Follow a rule “one card, one concept”. A card can contain several different elements, but they all should be about a single subject. This allow users to select the part of content they want to consume, share, or interact with. Use whitespace generously. Cards are often represented by highly coherent individual content that are small blocks of “mini design” of their own. This is why it is essential to give each individual card room to be seen, read and understood. Add plenty of whitespace around each block to provide users time and peace to visually reset as they look from one card to the next. Limit the content length. A card should contain only essential information and offer a linked entry point to further details, rather than the full details themselves. As designers try to put too much content into a card, the card can end up becoming too wide or too long and in turn lose its original connection to the card metaphor as it doesn’t look like a card anymore. Make card visually pleasing and simple at the same time. The image is the king of the card design: you need a great image to draw users to each individual card. Opt for simple and basic typefaces (such as sans-serif with normal weight for card body copy), as basic typography maximises readability and helps browsing. Create content hierarchy. Hierarchy within cards help direct the attention of users to the most important information. Place primary content at the top of the card and use typography to emphasize primary content. Use dividers to separate content areas that need more distinct visual separation. Make the entire card clickable, not just certain portions. This larger touch zone substantially improves usability on both touchscreen devices and mouse-based devices (Fitts’s Law states that this makes user interaction more likely). Take advantage of animation and movement. Use visual feedback and hints to assist users to better understand how to interact with user interface. For example, you can use an animated effect on cards when the cursor hovers over them, which signifies to the user that the card can be clicked. Cards design and visual signifiers Modern digital cards aren’t pure skeuomorphic concept, but quite often, using consistent metaphors and principles borrowed from physics help users make sense of interfaces and interpret visual hierarchies in content. In the case of cards there are couple of things you can do: Use rounded corners to visually resemble a real-world tangible card in shape. Add a slight drop shadow to show depth and indicate that the entire card is clickable.
    Sources 1 Why Cards are the future of the web by Paul Adams 2 Cards – Components from the Google Material Design design spec 3 Play Your Cards Right: Exploring the Cards Trend in Web Design at awwwards.com 5 Designing card-based user interfaces by Nick Babich 6 Best practices for cards by Nick Babich 7 Cards: UI-Component Definition by Page Laubheimer 8 The Complete Guide to an Effective Card-Style Interface Design by Carrie Cousins 9 Twitter, canvases and cards by Benedict Evans
  avoid_when:
  - Content is purely textual with no visual element
  - Dense data that's better as a table
  related_patterns: [AdaptableView, Thumbnail, ArticleList]
  tags: [navigation, content, layout]
  source_url: https://ui-patterns.com/patterns/cards
  votes:
    up: 4
    down: 381
- id: Carousel
  name: Carousel
  problem: Multiple featured items need to share limited horizontal space.
  source_problem: The user needs to browse through a set of items and possibly select one of them
  when_to_use:
  - Hero banners, featured products
  - Image galleries in constrained space
  solution: |
    Show one or a few items at a time with left/right navigation arrows.
    Include dots or indicators showing position and total count.
    Allow swiping on touch devices. Don't auto-advance too quickly.
  rationale: |-
    A carousel optimizes screen space by displaying only a subset of images from a collection of images in a cyclic view. The navigational controls on a carousel suggests additional content that is not currently visible, this encourages the user to continue exploring. The carousel pattern can in this way be used as an extra incentive for the user to browse through all items of the list, as we as humans do not feel comfortable by not being aware of the “full picture”. As the carousel is circular, the start of the list will be shown after the user has reached the end. This behavior encourages the user to continue browsing through the list.
    This article has been commented 3 times.
  avoid_when:
  - Critical content that all users must see (most users don't advance past first slide)
  - When space allows showing all items at once
  related_patterns: [Slideshow, Gallery, cards]
  tags: [navigation, content, slideshow]
  source_url: https://ui-patterns.com/patterns/Carousel
  votes:
    up: 17
    down: 580
- id: ProgressiveDisclosure
  name: Progressive Disclosure
  problem: Showing all options and information at once overwhelms users.
  source_problem: >-
    The user wants to focus on the task at hand with as few distractions as possible while still being
    able to dig deeper in details if necessary
  when_to_use:
  - Complex forms with optional advanced fields
  - Settings pages, documentation
  solution: |
    Show essential content first. Hide details behind "Show more", "Advanced", or expandable sections.
    Reveal complexity gradually as users need it.
  rationale: |-
    Maintain the focus and attention of users by reducing clutter, confusion, and cognitive workload. Ramp up the experience, moving from simple to complex, from abstract to specific. Progressive Disclosure defers advanced or rarely used features to a secondary screen, reducing cognitive load on the current task at hand. This will help making your application easier to learn and less error-prone due to fewer distractions. By showing only the information or features relevant to the user’s current activity and delaying other information until it is requested, the user can focus on the main task at hand. By hiding more complex or infrequently used, the interface is de-cluttered; by revealing them only as they are needed, you help users perform a complex, multi-step process on a single page2. You want to show only essential information in the first step, but still invite to take the next. When a user completes a step, reveal information needed for the next step, keeping all previous steps visible. By keeping previous steps visible, you allow users to change what has been entered. Like in a Wizard, data entered in the current step can affect the behavior of the next.
    Sources 1 Progressive Disclosure at Wikipedia.org 2 10 UI Design Patterns you should be paying attention to by Janko Jovanovic 3 Progressive Disclosure by Jakob Nielsen
  avoid_when:
  - All information is equally important
  - Hiding content would cause users to miss critical options
  related_patterns: [AccordionMenu, Wizard, settings]
  tags: [navigation, content, simplification]
  source_url: https://ui-patterns.com/patterns/ProgressiveDisclosure
  votes:
    up: 63
    down: 92
- id: ContinuousScrolling
  name: Continuous Scrolling
  problem: Pagination interrupts the browsing flow for content users consume sequentially.
  source_problem: >-
    The user needs to view a subset of data that is not easily displayed on a single page Content needs
    to be presented to users as a subset of a much larger seemingly endless set, in a way that will aid
    them in consuming content without effort.
  when_to_use:
  - Social feeds, image galleries
  - Content discovery where browsing is the goal
  solution: |
    Load more content automatically as the user scrolls near the bottom.
    Show a loading indicator. Provide a way to jump back to top.
    Ensure back button returns to the same scroll position.
  rationale: |-
    Eliminate the need for clicking “next page” by creating the effect of an infinitely scrolling page by constantly loading in new content as the user scrolls to the bottom of a page. Though great for the user experience, this pattern introduces bookmarking issues. The problem with using pagination for browsing between subsets of data is that the user is pulled from the world of content to the world of navigation, as the user is required to click to the next page. The user is then no longer thinking about what they are reading, but about how to get more to read. This breaks the user’s train of thought and forces them to stop reading. Using pagination creates a natural pause that lets the user reevaluate if he or she wants to keep going on or leave the site, which they a lot of the time do. It can be argued that Continuous Scrolling can be frustrating for the user, as there is no natural pause. The user will ask himself: When am I done reading?
    This article has been commented 18 times.
  avoid_when:
  - Users need to reach the footer
  - Users need to bookmark or share a specific page of results
  related_patterns: [Pagination, pull-to-refresh, ArticleList]
  tags: [navigation, content, infinite-scroll]
  source_url: https://ui-patterns.com/patterns/ContinuousScrolling
  votes:
    up: 35
