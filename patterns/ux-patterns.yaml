- id: set-completion
  name: Set Completion
  problem: Users feel compelled to complete a collection once they've started it.
  source_problem: We desire collecting all pieces of a set more the closer it is to being complete
  when_to_use:
  - Achievement systems, profile completion
  - Course modules, collection features
  solution: |
    Show what's been collected and what's missing. Use visual progress.
    "You've earned 7 of 10 badges." Make the remaining items visible and achievable.
  rationale: |-
    People are irrationally but effectively motivated by the idea of completing a set, even if it means working harder or spending more money—with no additional reward other than the satisfaction of completion and the relief of avoiding an incomplete set. Even without other reward than the completion in itself, logically grouping items or tasks together as part of a “set” motivates people to reach perceived completion points. Logically grouping tasks into sets and keeping sets manageable in size allows for achievable goals and small successes. Consider how you can have multiple levels of sets and what kind of things or information suggests logically grouped sets and set completion. This principle of completion also applies to other things left incomplete such as puzzles, pictures, or sentences.
    Sources Our desire to collect for a reward has been long examined in the economic literature. However, the natural desire to collect without financial gain was first examined in the social psychology literature from the 1980s and up. 1 Carey, C. (2008). Modeling collecting behavior: The role of set completion. Journal of Economic Psychology, 29(3), 336–347. 2 People Have an Irrational Need to Complete ‘Sets’ of Things by Carmen Nobel 3 Barasz, K., John, L. K., Keenan, E. A., & Norton, M. I. (2017). Pseudo-set framing. Journal of Experimental Psychology: General, 146(10), 1460–1477
  avoid_when:
  - The set is too large to realistically complete
  related_patterns: [CompletenessMeter, Completion, CollectibleAchievements]
  tags: [persuasion, cognition, motivation]
  source_url: https://ui-patterns.com/patterns/set-completion
