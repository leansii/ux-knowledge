- id: inline-hints
  name: Inline Hints
  problem: Users need contextual tips but a full tour would be too intrusive.
  source_problem: The user wants to learn about new or unfamiliar interface features in an unobtrusive
    way
  when_to_use:
  - Subtle feature discovery
  - Tips that are relevant only when the user reaches a specific area
  solution: |
    Show small, non-intrusive hints near relevant elements.
    Use info icons, subtle banners, or pulsing dots.
    Dismissible and don't repeat once dismissed.
  rationale: |-
    By having inline hints take the shape of normal, everyday content, designers hope that they will be more easily readable and relevant than other forms of instruction.
    Sources 1 Patterns for new user experiences by Krystal Higgins
  avoid_when:
  - Too many hints would clutter the interface
  related_patterns: [InlineHelpBox, coachmarks, BlankSlate]
  tags: [onboarding, guidance, contextual]
  source_url: https://ui-patterns.com/patterns/inline-hints
  votes:
    up: 2
    down: 28
- id: Tour
  name: Tour
  problem: Users arriving at a complex app need a comprehensive overview before diving in.
  source_problem: >-
    The user wants to learn the products and services you offer in order to make a decision to join a
    service or buy a product.
  when_to_use:
  - Enterprise software with many features
  - Apps with unconventional interaction models
  solution: |
    Offer an optional tour on first visit. Cover main areas and key actions.
    Use a combination of modal overlays and highlighted elements.
    Let users restart the tour from help menu.
  rationale: |-
    A Walkthrough of your product or service helps inform users about: What your product can do If your product is what they’ve been looking for If your product will help users accomplish their tasks Whether or not they should join your service or pay for your product Purchasing a product or service can be costly and users will need a significant amount of persuasion and encouragement before buying in. A Walkthrough allows users to get a glimpse of your product without having to sign up.
    Sources 1 Guided tour design pattern at welie.com by Martin van Welie 2 Submit now – Designing persuasive web sites, New Riders, 2003
    This article has been commented 1 time.
  avoid_when:
  - Users come with strong intent and a tour would delay them
  related_patterns: [Guided-tour, coachmarks, BlankSlate]
  tags: [onboarding, guidance, overview]
  source_url: https://ui-patterns.com/patterns/Tour
  votes:
    up: 17
    down: 127
- id: BlankSlate
  name: Blank Slate
  problem: Empty states (no data yet) confuse new users and miss an opportunity to guide them.
  source_problem: >-
    The user wants to get started using the application but needs guidance in the form of an example of
    how the application will look, feel and behave when in full function and filled with data.
  when_to_use:
  - First-time empty dashboards, lists, or feeds
  - After clearing all items
  solution: |
    Replace empty states with helpful content: illustration, explanation, and a primary CTA.
    "No projects yet. Create your first project to get started."
    Include sample data option if applicable.
  rationale: >-
    The blank slate is generally the first screen the user is presented with when they start something
    new in an application. It can the screen they are directed to after creating an account or the first
    screen they see when using part of an application they haven’t used before. The blank slate tells
    the user what the page they are on will look like, once it has eventually been filled with content.
    Creating a blank slate sets the user’s expectations for your service. New users are often intimidated
    by empty screens with little or no guidance. Guiding users with a prepopulated starting state is the
    best way to establish trust and gain understanding. Make sure the first impression the user gets of
    your web application is positive. Let them know why they should stick around.
  avoid_when:
  - Empty state is temporary and data will appear shortly
  related_patterns: [Guided-tour, inline-hints, GoodDefaults]
  tags: [onboarding, guidance, empty-state]
  source_url: https://ui-patterns.com/patterns/BlankSlate
  votes:
    up: 11
    down: 79
- id: LazyRegistration
  name: Lazy Registration
  problem: Forcing users to register before they see value causes most to leave.
  source_problem: The user wants to immediately use you and try your website without conducting a formal
    registration beforehand
  when_to_use:
  - Any product where core value can be experienced without an account
  - E-commerce (allow browsing and adding to cart before signup)
  solution: |
    Let users explore and use the product first. Only require registration when needed
    (to save, purchase, or interact). Transfer any work done before registration to the new account.
  rationale: >-
    Deliver value before prompting for conversion. Shopping carts are a classic pattern that plays on
    Lazy Registration: users can browse and choose products, but only have to register when they proceed
    to check out.x The Lazy Registration pattern allow users to use your system and take action before
    or without registrering. The idea is to let users interact enough with your system so that the actual
    registration is just another small step in the larger process. It’s a small step – not an obligation.
    The classic Shopping Cart pattern is a good example of Lazy Registration: users can browse and choose
    products and only have to register when they proceed to check out. For this pattern to work, you need
    to provide the users with an incentive to give you the registration data you are looking for. You
    need to provide a worthwhile service to your users for them to give you their data back in return.
    You want to use classic Carrot and stick motivation – and just as important: communicate the benefit
    you are providing. If the registration data you are looking for with the user is sensitive, you must
    be able to assure your users that their data will be safe and secure.
  discussion: |-
    Questions to ask when planning your Lazy Registration Consider how you can avoid sign up forms in favor of a more gradual engagement. If you choose to use the Lazy Registration pattern, make sure that you focus on showing off how you deliver value: how potential customers can use your service and why they should care. Auto-generated accounts are great, but if you choose to use them, then make sure to design a clear way for users to access their accounts. Chances are that people will either ignore or not see your account creation mails – and might be uncertain if they even have an account or not. 1
    Sources 1 Sign up forms must die by Luke Wroblewski
    This article has been commented 16 times.
  avoid_when:
  - Personalization is required from the start
  - Security requires authentication before any access
  related_patterns: [AccountRegistration, Paywall, GoodDefaults]
  tags: [onboarding, registration, conversion]
  source_url: https://ui-patterns.com/patterns/LazyRegistration
  votes:
    up: 23
    down: 76
- id: Paywall
  name: Paywall
  problem: Premium content needs to be gated while showing enough to convince users to pay.
  source_problem: The user needs to pay to get access to a restricted area on a website.
  when_to_use:
  - Content subscriptions (news, courses, tools)
  - Freemium models
  solution: |
    Show a preview (headline, first paragraph, blurred content).
    Clear messaging about what's behind the paywall and its value.
    Multiple payment options. Easy upgrade path.
  rationale: >-
    Paywalls are used as an alternative income source for online media websites, where banner advertising
    has been the tradition. As users move their habits from print to online, media companies find it harder
    to base their business on advertising revenue only. Paywalls has been widely introduced to make up
    for the lost revenue.
  avoid_when:
  - Content should be freely accessible
  - Preview doesn't convey enough value to convert
  related_patterns: [LazyRegistration, PricingTable, framing]
