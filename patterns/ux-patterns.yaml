- id: Limited-duration
  name: Limited Duration
  problem: Without time pressure, users postpone decisions indefinitely.
  source_problem: Use time limitations to push users to take action
  when_to_use:
  - Sales, promotions, special offers
  - Early-bird pricing, flash sales
  solution: |
    Show a countdown timer or expiration date. "Sale ends in 2h 15m."
    Be honest about the deadline. After expiration, actually remove the offer.
  rationale: |-
    We hate to loose the freedoms we already have. As opportunities become less available we tend to desire them significantly more. We put more value into the freedom of choice, which is why we react to time-based scarcity by making quick and sometimes uninformed decisions. We react against lost freedom of choice by wanting and trying to possess scarce items more than before.
    Sources 1 Cialdini, R. (1993), Influence: Science and practice (3rd edn), New York: HarperCollins
  avoid_when:
  - The deadline is fake and users will discover it
  - Pressure would harm the user's decision quality
  related_patterns: [Scarcity, Loss-aversion, appointment-dynamic]
