- id: FatFooter
  name: Fat Footer
  problem: Users who scroll to the bottom of a page need navigation options and useful links.
  source_problem: >-
    Users need a mechanism that will enable them to quickly access specific sections of a site or application
    bypassing the navigational structure.
  when_to_use:
  - Marketing sites, content-heavy sites
  - Sites with many sections not all visible in main nav
  solution: |
    Include organized links to key sections, about, contact, legal, social media.
    Group links into columns by category. Include newsletter signup or search.
  rationale: >-
    Keep visitors on your site for longer: end one experience by starting a new one. Provide easy and
    natural ways for users to continue their journey. By adding a shortcut to the most frequently used
    pages and functions, the path can be shortened and confusion can be decreased. The hierarchical structure
    of a website can at times impede the path to specific page or function of a website. By adding a shortcut
    to the most frequently used pages and functions, the path can be shortened: the number of clicks can
    be lessened and the confusion decreased.
  discussion: |-
    A fat footer isn’t right for every site or for every company. Consider asking these when creating a footer: What does my user expect to see here? What is the next logical step in the user journey? What questions are my secondary or tertiary users still asking at the bottom of the site? How can I continue the experience beyond the content on this page?1
    Sources 1 Fat footer round-up at UX Booth.
    This article has been commented 7 times.
  avoid_when:
  - Single-page applications where footer isn't reachable
  related_patterns: [HomeLink, categorization]
  tags: [navigation, footer, discovery]
  source_url: https://ui-patterns.com/patterns/FatFooter
  votes:
