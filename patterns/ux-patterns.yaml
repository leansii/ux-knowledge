- id: Conceptual-metaphor
  name: Conceptual Metaphor
  problem: Abstract concepts are hard for users to understand without familiar reference points.
  source_problem: We understand a new idea or concept by linking it to another
  when_to_use:
  - Explaining new features or concepts
  - Icons, terminology, onboarding
  solution: |
    Map abstract concepts to real-world metaphors users already understand.
    Desktop, folders, trash can, shopping cart, bookmarks.
    Ensure the metaphor doesn't break when extended too far.
  rationale: |-
    Letting users grasp an idea by association can help ease understanding, influence how it is perceived, and adjust how we think and act. Explain difficult concepts by making analogies. Letting users grasp an idea by association can help ease understanding, influence how it is perceived, and adjust how we think and act. Although time and culture sensitive, conceptual metaphors have the power to create a sense of familiarity, trigger emotions, draw attention, and motivate action.
    Sources In the modern day, the concept of Conceptual Metaphors have been examined widely by various fields of academic research ranging from semiotics in the 1860s by Charles Sanders Peirce to cognitive linguistics by George Lakoff and Mark Johnson in the 1980 and 1990s to being expanded in the fields of psychology and cognitive science by Raymond W. Gibbs, Jr. 1 Lakoff, George & Mark Johnson (1980) Metaphors We Live By. Chicago: University of Chicago Press 2 https://www.getfeedback.com/resources/ux/how-metaphors-can-improve-your-user-experience 3 Conceptual Metaphor at Wikipedia.org 4 Conceptual Metaphor at Learning Loop
  avoid_when:
  - The metaphor is misleading about how the feature actually works
  related_patterns: [Pattern-recognition, picture-superiority-effect, Storytelling]
