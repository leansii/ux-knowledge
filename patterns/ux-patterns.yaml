- id: Autocomplete
  name: Autocomplete
  problem: Users make typos, don't know exact terms, or type slowly when searching.
  source_problem: The user needs recognition aided search when performing search tasks that are difficult
    to remember or easily mistyped.
  when_to_use:
  - Search bars, address fields
  - Any input with a known set of possible values
  solution: |
    Show suggestions as the user types, updating with each keystroke.
    Highlight the matching portion. Support keyboard navigation of suggestions.
    Show recently searched terms or popular queries.
  rationale: >-
    The Autocomplete pattern allows faster input, reduces the number of keystrokes needed, prevents typing
    errors, and provides feedback on the validity of what is being entered. It also allows designers to
    include longer lists for users to choose from without taking up extra screen real estate. Autocompletion
    and search suggestions save the user keystrokes by matching a user’s query with potential matches
    that are displayed as the query is being typed. It reduces the number of keystrokes and thus allows
    for faster data input. Tiresome, long, and complicated queries such as email addresses or airport
    names, can be found and selected with only a few keystrokes. Additional formatting of a search suggestion
    can help remove ambiguity. If I am searching for an airport in London, extra formatting can tell me
    whether I am selecting Heathrow or Standsted airports. Autocompletion provides a feedback loop that
    continually lets the user narrow in on the correct choice. The cognitive burden of remembering an
    exact text-phrase is made easier, as the user can use the autocomplete pattern to only type in details
    that he or she remembers. If a user is searching for an email that he can only remember the domain
    name of, he or she can simply enter the domain name where-after all emails with that domain name is
    presented for selection. The autocomplete pattern relies on the principle of recognition over recall.
    Instead of having to recall a full and exact text query, the user can start typing in parts of the
    query he or she recalls, and in turn rely on recognition to select the best match.
  discussion: |-
    When matching on large sets of data, it is critical for the matches presented to be close to what the user is looking for. Google solves this problem by ranking matches by the amount of times each query has been searched for. Apple solves the problem in Spotlight (a desktop application for searching items on the computer) by ranking matching items by the amount of times an item has been selected when that exact query was entered.
    Sources 1 Autocomplete design pattern at Yahoo Design Pattern Library. 2 Autocomplete design pattern by Martijn van Welie.
    This article has been commented 2 times.
  avoid_when:
  - The possible value space is too large for meaningful suggestions
  related_patterns: [LiveFilter, InputPrompt]
  tags: [data, search, suggestions]
  source_url: https://ui-patterns.com/patterns/Autocomplete
  votes:
    up: 41
    down: 75
- id: LiveFilter
  name: Live Filter
  problem: Users want instant feedback as they narrow down a set of results.
  source_problem: The users needs to conduct a search using contextual filters that narrow the search
    results.
  when_to_use:
  - Filtering lists, catalogs, or directories
  - Settings search, command palettes
  solution: |
    Update visible results in real-time as the user types or adjusts filters.
    No submit button needed. Show result count. Debounce for performance.
  rationale: |-
    With a search, you start off with nothing and potentially end up with nothing. Counter to this approach is filtering, where we present everything available, and then encourage the user to progressively remove what they do not need1. – Pete Forde Using the live filter pattern moves the search from a monologue to a conversation. The user can progressively remove what they don’t need step by step and receive feedback immediately. When you weigh your decision to use this filter, consider whether the pattern complicates or simplifies search. If it does anything else than simplify finding the correct search result, choose another solution.
    Sources 1 Live Filter by Pete Forde
    This article has been commented 15 times.
  avoid_when:
  - Filtering requires expensive server queries
  related_patterns: [Autocomplete, TableFilter, SortByColumn]
  tags: [data, search, real-time]
  source_url: https://ui-patterns.com/patterns/LiveFilter
