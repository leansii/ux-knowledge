- id: Roleplaying
  name: Roleplaying
  problem: Users engage more deeply when they adopt a persona or role.
  source_problem: People act according to their persona
  when_to_use:
  - Games, learning simulations
  - Community forums with roles (mentor, expert)
  solution: |
    Assign or let users choose roles with specific behaviors and privileges.
    "As a mentor, you can..." Roles create identity and responsibility.
  rationale: |-
    How we act depends on the social norms and constructs of a context we are in. Role-playing allows us to understand situations not familiar to us by stepping in the shoes of others. Arguments perceived as self-originated may be more readily accepted than ones perceived as having originated externally.
    Sources Role-playing is a central method in self-persuasion theory developed by psychologist Carl Hovland in the 1940s and 1950s. In this theory, the receiver takes an active role in persuading him- or herself to change attitudes and behaviors with no direct attempt to convince from anyone or anything. Hovland argued that our decision making is determined by factors within us like our personality, self-esteem, education, or interest. 1 Self-persuasion at Wikipedia.org 2 Hovland, C. I., et. al. (1953) Communication and persuasion; psychological studies of opinion change, New Haven, Yale University Press 3 Mallard, Jessica. “Engaging Students In Social Judgment Theory.” Communication Teacher 24.4 (2010): 197-202. 4 Role Playing behavioral technique at Learning Loop
  avoid_when:
  - Roles would feel forced or childish for the audience
  related_patterns: [Self-expression, Status, Powers]
  tags: [persuasion, social, identity]
  source_url: https://ui-patterns.com/patterns/Roleplaying
  votes:
    up: 5
    down: 17
- id: Self-expression
  name: Self-Expression
  problem: Users want to showcase their individuality within the platform.
  source_problem: We seek opportunities to express our personality, feelings, or ideas
  when_to_use:
  - Profile customization, avatar creation
  - User-generated content, status updates
  solution: |
    Allow customizable profiles: avatars, bios, themes, display names.
    Support user-generated content creation and sharing.
    Provide unique display options (badges, borders, colors).
  rationale: |-
    As humans we are social beings who will always use personal expression to make sense of the world and provide meaning. Allowing users to customize a product makes it unique and personal to the individual, effectively increasing its perceived and symbolic value to both the creator and to others.
    Sources In Western cultures, self-expression of the individual is regarded as one of the most highly-regarded values in society as opposed to the more collectivistic values of other cultures. Regardless, self expression is how we learn about the mind, why it is baked into the roots of social psychology and self-determination theory. 1 Six Patterns for Persuasion in Online Social Networks 2 Grey, A., Individuality, conformity and collective identity. International Forum of Psychoanalysis, 9–12 (1993) 3 Ryan, R. M.; Deci, E. L. (2000). Self-determination theory and the facilitation of intrinsic motivation, social development, and well-being. American Psychologist. 55 (1): 68–78. 4 Grey, A. (1993). Individuality, conformity and collective identity. International Forum of Psychoanalysis, New York, USA, 9–12 5 Self-Expression design pattern at Learning Loop 6 Self-Determination Theory by Anders Toxboe at Learning Loop
