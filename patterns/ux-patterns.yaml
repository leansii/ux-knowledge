- id: follow
  name: Follow
  problem: Users want to subscribe to another user's content without requiring mutual agreement.
  source_problem: The user wants to track and keep up to date with activity on topics or themes, not just
    people
  when_to_use:
  - Content platforms, news, creator-audience relationships
  - Any platform where relationships are asymmetric
  solution: |
    One-click follow button. Show follower/following counts.
    Feed shows content from followed users.
    Allow unfollowing easily.
  rationale: >-
    Users can gain access to a lot of varied content by “following” the activities and recommendations
    of other users and this pattern allows them to do so without having to worry about how many of their
    actual friends are using the application. Content shared with followers on sites like Google+ and
    Pinterest makes the content curation community possible and users can choose to follow topics, events,
    themes or even people to get fresh content built by and around the channel being followed. For the
    same reason friend lists will become an increasingly important UI design pattern, so will the Follow
    pattern.
  discussion: >-
    Contrary to the Friend design pattern, users do not have to worry about how many of their friends
    are using the same service or if their friends share the same taste.
  avoid_when:
  - Relationships should be mutual (use friend pattern)
  related_patterns: [friend, ActivityStream, friend-list]
  tags: [social, connections, subscription]
  source_url: https://ui-patterns.com/patterns/follow
