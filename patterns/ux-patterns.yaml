- id: delay-discounting
  name: Delay Discounting
  problem: Users devalue rewards the further away they are, making long-term engagement hard.
  source_problem: We tend to choose smaller immediate rewards over larger, later rewards
  when_to_use:
  - Subscription benefits, loyalty programs
  - Savings or investment features
  solution: |
    Break long-term rewards into closer milestones.
    Show progress toward the next milestone, not just the final goal.
    Visualize the reward to make it feel more tangible.
  rationale: |-
    We have a preference for rewards that arrive sooner rather than later and discount the value of the later reward by increase in delay. Consider offering the convenience of now over offering a marginally cheaper alternative later – customers will have a tendency to choose a premium service that prioritises faster delivery.
    Sources Hyperbolic discounting and delay discounting are cornerstones of behavioral economics and is actively being studies in neuro-economics. 1 Thaler, R. H. (1981). Some Empirical Evidence on Dynamic Inconsistency. Economics Letters. 8 (3): 201–207. 2 Hardman (2009). Judgment and decision making: psychological perspectives. Wiley-Blackwell. 3 Delay Discounting at Learning Loop
  avoid_when:
  - Short-term thinking would be harmful to the user
  related_patterns: [present-bias, Levels, CompletenessMeter]
