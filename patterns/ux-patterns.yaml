- id: investment-loops
  name: Investment Loops
  problem: Users leave because they haven't built enough value to feel committed.
  source_problem: Let users invest their effort in setting themselves up for a future reward
  when_to_use:
  - Social platforms, productivity tools
  - Any product where user-generated data increases value
  solution: |
    Design actions that store value: adding contacts, creating content, customizing settings.
    Each investment makes the product more valuable and harder to leave.
    Show users their accumulated value.
  rationale: |-
    Setting up cycles of recurring triggers, actions, and investments will possibly set users up for coming back for more.
    Sources In his bestselling book, Nir Eyal proposed a model for implementing addictive habit loops into tech products where users set invest their time and effort into a product and if designed the right way, set themselves up for recurring rewards that trigger them to return for more. His model is inspired by BJ Fogg’s Behavior Model. 1 Fogg, BJ (2009). A behavior model for persuasive design, Persuasive ’09: Proceedings of the 4th International Conference on Persuasive Technology. Pages 1–7 2 Eyal & Hoover (2014). Hooked: How to build habit-forming products. Penguin Canada. 3 Making the Hook Model actionable by Anders Toxboe
  avoid_when:
