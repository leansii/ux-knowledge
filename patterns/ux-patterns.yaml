- id: VoteToPromote
  name: Vote to Promote
  problem: Platform needs a democratic way to surface the best content.
  source_problem: >-
    The user wants to promote a specific piece of content in order to democratically help decide what
    content is more popular.
  when_to_use:
  - Forums, Q&A sites, news aggregators
  - Feature request boards
  solution: |
    Let users upvote/downvote content. Rank items by vote score.
    Show vote count. Optionally weight votes by user reputation.
  rationale: >-
    The Vote To Promote pattern promotes community participation and can potentially help pick up and
    promote the newest and hottest content around. By using your community to judge what is more popular,
    you avoid the need to hire paid professional reviewers.
  discussion: |-
    Using the Vote To Promote pattern on your website brings the user to the center of your site. It is used to implement a democratic control over the content of your website with the following pros and cons. Is democratic control the best mechanism for promotion if all users do not share the same opinion among each other Is democratic control the best mechanism for promotion if all users do not share the same opinion as your site or product Is democratic control the best mechanism for promotion if all users do not possess what you believe is good taste. Each user votes from their perspective of what defines good quality: their opinion is subjective. This raises the question whether the numeric number of votes on each item can really be compared and if the item with the most positive votes really is the item with the highest quality. This dilemma raises the question whether some users should have more authority than others: if some users’ votes should count more than other users’ votes. This might be necessary if you want your site to retain the definition of quality that you like. Popular content is not necessarily the same as quality content. Consider a number of measures to prevent users from misusing the system: Limit user’s activity. Limit the number of votes a user can cast for a given time-period. Watch for malicious activity against specific users. A user might get in a malicious mood and start demoting another user’s content. Limit the number of times a user can demote another user’s content. Some votes count more than others. Consider giving votes from users to their friends less value than to strangers. Some content is more important than others. Consider promoting original content rather than citing content. Wisdom of crowds When the amount of content submitted each second is larger than what your staff can handle, you will have to rely on what is referred to as the “wisdom of crowds” to decide what is good content and what is not (spam, untrue stories, “lame stuff”, bad categorizations, etc.). This could possibly work, if each user evaluated the quality of an item of content isolated from what other users have already voted. However, it is not always the case that voting is done in isolation. Instead, crowd members communicate and affect each other’s qualitative judgment towards the lowest common denominator of opinion. The reason for this is the mix up of using measurable values when judging quality. The crowd has no wisdom: it will always be affected by the lowest common denominator of what others have voted.
    This article has been commented 2 times.
  avoid_when:
  - Small community where voting would be meaningless
  - Content curation should be editorial, not democratic
  related_patterns: [RateContent, reaction, leaderboard]
  tags: [input, community, curation]
  source_url: https://ui-patterns.com/patterns/VoteToPromote
  votes:
    up: 3
    down: 50
- id: Wiki
