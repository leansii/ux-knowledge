- id: Serial-positioning-effect
  name: Serial Positioning Effect
  problem: In a list, users remember the first and last items best, forgetting the middle.
  source_problem: We have a tendency to recall the first and the last items in a series best
  when_to_use: ['Menu ordering, feature lists', Navigation item arrangement]
  solution: |
    Place the most important items at the beginning and end of lists.
    Put the most popular or profitable option first. End with a strong CTA.
    The middle is for less critical items.
  rationale: >-
    When recalling items from a list, items at the beginning and the end are better recalled than the
    items in the middle. Our ability to better recall items at the beginning of a list is called the primacy
    effect, whereas our ability to recall items at the end of a list is called a recency effect. Primacy
    effect: Initial items on a list are stored in long-term memory more efficiently than items later in
    the list. The longer the time items are presented, the stronger the primacy effect is, as people then
    have more time to store the initial items in long-term memory. Recency effect: The last few items
    are still in working memory and are readily available. The strength of the recency effect is unaffected
    by the rate of presentation, but is greatly affected by the passage of time and presentation of additional
    information. The recency effect further disappears when people think about other matters for thirty
    seconds after the last item in the list is presented.
  discussion: |-
    Presenting long lists of information to users, significantly strains our limited resources and restricted memory systems – especially short-term memory, where only three or four items or chunks of information can be maintained at one time. Our ability to recall previously presented items is also severely impacted by events between initial processing and later recall.
    Sources The Serial Positioning Effect coined by Hermann Ebbinghaus in 1913 and later explored in experimental psychology. 1 Serial Position Effect at Wikipedia 2 Serial Position Effect: How to Create Better User Interfaces at Interactin-design.org 3 A two-process account of long-term serial position effects at APA PsychNet 4 Two storage mechanisms in free recall at ScienceDirect 5 Ebbinghaus, Hermann (1913). On memory: A contribution to experimental psychology. New York: Teachers College. 6 Murdock, Bennet (1962). Serial Position Effect of Free Recall. Journal of Experimental Psychology. 64 (5): 482–488 7 The “Serial Positioning Effect:”https://learningloop.io/plays/psychology/serial-positioning-effect at Learning Loop
  avoid_when:
  - List order is determined by other factors (alphabetical, chronological)
  related_patterns: [Peakend-rule, Limited-choice, NavigationTabs]
  tags: [persuasion, comprehension, layout]
  source_url: https://ui-patterns.com/patterns/Serial-positioning-effect
