- id: NavigationTabs
  name: Navigation Tabs
  problem: Users need to move between major sections of an application quickly.
  source_problem: >-
    Content needs to be separated into sections and accessed using a flat navigation structure that gives
    a clear indication of current location.
  when_to_use:
  - 3-7 top-level sections of a website or app
  - Sections are of equal importance
  solution: |
    Place tabs horizontally at the top of the content area.
    Highlight the active tab. Tabs should have short, clear labels.
    Content changes immediately on tab click without page reload.
  rationale: |-
    The Navigation tabs pattern is an extension of the desktop metaphor in which physical objects are represented as GUI elements. Navigation tabs are derived from the idea of folders in a file-cabinet and are thus familiar to the end user Navigation tabs provide a clear visual indication of what content can be found on a website and places the current location in context by highlighting it.
    This article has been commented 3 times.
  avoid_when:
  - More than 7 sections (use a menu instead)
  - Sections are hierarchically nested
  related_patterns: [ModuleTabs, Breadcrumbs]
  tags: [navigation, tabs, structure]
  source_url: https://ui-patterns.com/patterns/NavigationTabs
  votes:
    up: 21
    down: 1211
- id: ModuleTabs
  name: Module Tabs
  problem: A page section contains related but different views of the same data.
  source_problem: >-
    Content needs to be separated into sections and accessed via a single content area using a flat navigation
    structure that does not refresh the page when selected.
  when_to_use:
  - Product page with description/specs/reviews tabs
  - Dashboard widget with different time ranges
  solution: |
    Place tabs within the content module they control.
    Visual style should be distinct from navigation tabs.
    Content below tabs changes; surrounding page stays the same.
  rationale: |-
    The Navigation tabs pattern is an extension of the desktop metaphor in which physical objects are represented as GUI elements. Navigation tabs are derived from the idea of folders in a file-cabinet and are thus familiar to the end user Module Tabs provide an easy way to show large amounts of similar structured data parted by categories Tabs create a context for content, when a tab is selected the relevant content is loaded inside the content area.
    This article has been commented 3 times.
  avoid_when:
  - Users need to see multiple views simultaneously
  related_patterns: [NavigationTabs, AdaptableView]
  tags: [navigation, tabs, content]
  source_url: https://ui-patterns.com/patterns/ModuleTabs
  votes:
