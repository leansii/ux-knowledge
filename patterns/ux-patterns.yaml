- id: Statusquo-bias
  name: Status Quo Bias
  problem: Users prefer their current state and resist changes, even beneficial ones.
  source_problem: We tend to accept the default option instead of comparing the actual benefit to the
    actual cost
  when_to_use: [Default settings and opt-outs, Subscription renewals]
  solution: |
    Make the desired option the default. Frame changes as enhancements to current state,
    not replacements. Provide easy rollback to reduce perceived risk of change.
  rationale: >-
    When we are uncertain of what to do or feel overwhelmed by the number of options to choose from, we
    tend to stick with our previous choices or choices that has been made for us – even if the alternatives
    might be better. As making decisions grows increasingly more complex, the harder it becomes to use
    our emotional heuristics to shortcut decision making to approximate rational thinking. Simply stating
    what options are more popular is often enough to influence a decision that sticks. Simply pre-filling
    a form with default options is often enough to make people choose them. Alternative options that seem
    too cumbersome to comprehend will make people stick with the status quo. As making decisions grows
    increasingly more complex, we have a harder time using our emotional heuristics to shortcut decision
    making to approximate rational thinking. Instead we tend to accept the default option instead of comparing
    the actual benefit [gain] to the actual cost [loss]1.
  discussion: |-
    Once we have acquired a gain, we change the way we evaluate what has been acquired as our reference point is now new. This is the root of the status quo bias. If the status quo serves as a reference point, the features you loose might be valued more when they are given up than when they were being acquired3. Adding to the status quo bias is that surprising fact that people tend to still accept the easiest way out even when the decision is important and the stakes are large – and even when they are told the default decision is not optimal1. More choice is not always better. Complexity delays choice, further increasing the fraction of consumers, who will adopt the default options 2. Lots of choices will grab our attention, but too many will overwhelm us to the point where we likely won’t choose (or buy) at all 4.
    Sources Samuelson and Zeckhauser were among the first to exaamine the Status-Quo Framing and affected decision-making by experimenting with clearly making one option the default choice in one group and not distinguishing in the other. Kahneman, Thaler, and Knetsch later created experiments that could produce the effect reliably. 1 Daniel Kahneman, Jack L. Knetsch, and Richard H. Thaler (1991), Anomalies: Endowment Effect, Loss Aversion, and Status Quo Bias. 2 Ted O’Donoghue and Matthew Rabin (2004), Incentives and Self-Control 3 Eric J. Johnson, John Hershey, Jacqueline Meszaros and Howard Kunreuther (1993), Framing, probability distortions, and insurance decisions" 4 Susan M. Weinschenk (2009), Neuro Web Design, New Riders 5 Status Quo Bias, explained at Decision Lab 6 Status Quo Bias at Wikipedia.org 7 Samuelson, W.; Zeckhauser, R. (1988). “Status quo bias in decision making”. Journal of Risk and Uncertainty. 1: 7–59. 8 Status-Quo Bias at Learning Loop
  avoid_when:
  - Exploiting inertia to trap users in unwanted states
  related_patterns: [GoodDefaults, Loss-aversion, Endowment-effect]
  tags: [persuasion, cognition, bias]
  source_url: https://ui-patterns.com/patterns/Statusquo-bias
