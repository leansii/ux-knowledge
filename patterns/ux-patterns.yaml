- id: StructuredFormat
  name: Structured Format
  problem: Users must enter data in a specific format (phone numbers, dates, credit cards) but often get
    it wrong.
  source_problem: The user needs to quickly enter data into the system but the format of the data must
    adhere to a predefined structure.
  when_to_use:
  - Phone number, credit card, or ID number fields
  - Any field requiring a strict pattern
  solution: |
    Split the input into segments that match the expected format.
    Auto-format as the user types (e.g., adding dashes to phone numbers).
    Use input masks to guide entry.
  rationale: >-
    Set clear expectations by ordering input fields in a Structured Format: clue users as to what kind
    of input is being requested. By chunking large input fields into smaller bits, data entry errors can
    be decreased dramatically. It is easier to transcribe or memorize a long number when it is broken
    up into chunks. Where the Structured Format is well suited for predictable input, the Forgiving Format
    is well suited for open-ended input. Using a structured format in an input field saves time for the
    user, when they are required to fill out the same input field repeatedly as a part of a frequent task.
    The structured data pattern aids the user through streamlined and controlled inputs, which in turn
    speeds up data capturing tasks and reduces the garbage in, garbage out problem.
  avoid_when:
  - The format varies by locale and you can't detect it
  related_patterns: [ForgivingFormat, InputFeedback]
  tags: [input, validation, forms]
  source_url: https://ui-patterns.com/patterns/StructuredFormat
  votes:
    up: 72
    down: 164
- id: Captcha
  name: Captcha
  problem: Bots submit forms, create fake accounts, or abuse services meant for humans.
  source_problem: The application needs to verify that the data submitted originates from an actual human
    and not a robot.
  when_to_use:
  - Registration forms targeted by bots
  - Public-facing forms without authentication
  solution: |
    Present a challenge that humans can solve easily but bots cannot.
    Prefer invisible or low-friction solutions (e.g., reCAPTCHA v3).
    Provide audio alternatives for visual captchas.
  rationale: |-
    Captchas are short for ‘Completely Automated Public Turing test to tell Computers and Humans Apart’. The whole idea behind Captchas is to distinguish humans from computers letting the user perform an action a computer can’t. A captcha is a simple Turing test. There is a fine line between making a captcha unrecognizable for OCR scanners and still readable for human beings. Readability for the human has to come first. Other problems with implementing captchas to protect your website include a lock-out from visually impaired users as they can’t use voice software to speak what the captcha reads. Other forms of protection from malicious spammers are asking questions like “what is 2 + 3” or “what is two plus three” or using voice captchas,
    This article has been commented 6 times.
  avoid_when:
  - Users are already authenticated
  - Rate limiting is sufficient
  related_patterns: [AccountRegistration, LazyRegistration]
  tags: [input, security, forms]
  source_url: https://ui-patterns.com/patterns/Captcha
  votes:
    up: 6
    down: 194
- id: rule-builder
  name: Rule Builder
  problem: Users need to define complex conditional logic (filters, automations, access rules) without
    writing code.
  source_problem: The user needs to, often repeatedly, conduct a search query based on a custom set of
    rules
  when_to_use:
  - Email filter rules
  - Automation triggers (if X then Y)
  - Dynamic form logic
  solution: |
    Provide a visual interface with condition rows: field + operator + value.
    Support AND/OR grouping. Allow adding/removing conditions.
    Show a human-readable summary of the rule.
  rationale: >-
    A rule builder allows a user to specify unique conditions to discover and group items across one or
    more datasets. The results returned by an active rule can be dynamic in nature as its related datasets
    change over time. An active rule can trigger a set of actions to be performed when the conditions,
    criteria and values of the rule are met. Rules sets can be grouped into discrete units and linked
    together with condition logic to create highly complex rule conditions.
  discussion: |-
    Pattern authors Richard Barrett Anders Toxboe
    Sources 1 UI design for rule builder by Two Rivers Consulting 2 Interesting StackExchange discussion
  avoid_when:
  - Logic is simple enough for a single toggle or checkbox
  related_patterns: [FillInTheBlanks, GoodDefaults]
  tags: [input, advanced, configuration]
  source_url: https://ui-patterns.com/patterns/rule-builder
  votes:
    up: 5
    down: 97
- id: keyboard-shortcuts
  name: Keyboard Shortcuts
  problem: Frequent actions are slow when users must navigate menus or click through UI every time.
  source_problem: The user wants to perform repetitive tasks faster
  when_to_use:
  - Productivity and professional tools
  - Actions performed dozens of times per session
  solution: |
    Assign memorable key combinations to frequent actions.
    Show shortcuts next to menu items. Provide a shortcut cheat sheet (? key).
    Follow platform conventions (Cmd+S, Ctrl+Z).
  rationale: >-
    Ease access to repetitive tasks by providing skilled users with keyboard shortcuts to their associated
    actions. Reduce the total time spent, the steps needed, and mental energy wasted to complete a task
    without making it harder on novice users. Keyboard shortcuts accelerate exposition of program function
    to users through keypresses rather than mouse clicks. This can greatly help speed up task completion
    time as the user does not need to switch modes from using they keyboard to the mouse; hands can stay
    on the keyboard1.
  discussion: |-
    Keyboard shortcut strategies Mnemonics Assist user recall memory by creating mnemonic associations with letters used in key combinations. However, as there are only so many keys available, a common strategy is to use the middle or end letter of a function rather than the initial letter. On Macs, O is used for “Open File” while L is used for “Open Location”. Speed Finally, placing keys of command pairs close to each other, even though there is no mnemonic association can make sense as well. C is often used for “Copy” while V is used for Paste.
    Sources 1 Keyboard Shortcuts at the Atlassian Design library.
  avoid_when:
  - Target audience is primarily mobile or touch-only
  - Application is simple with few repeated actions
  related_patterns: [ShortcutDropdown, undo]
  tags: [input, efficiency, power-users]
  source_url: https://ui-patterns.com/patterns/keyboard-shortcuts
  votes:
    up: 1
    down: 72
- id: InplaceEditor
  name: Inplace Editor
  problem: Navigating to a separate edit page creates friction for small content changes.
  source_problem: The user needs to quickly and easily edit a value on a page
  when_to_use:
  - Editing titles, labels, or short text
  - Content management where quick edits are frequent
  solution: |
    Click or double-click on content to transform it into an editable field.
    Show save/cancel controls. Support Enter to save, Escape to cancel.
    Indicate editability with hover effects or pencil icons.
  rationale: |-
    An in-place editor provides an easy way to let the user edit parts of a page without having to be redirected to an edit page. Instead, the user can just click around on a page and edit the elements he or she wishes to change – without reloading the page.
    This article has been commented 4 times.
  avoid_when:
  - Edits require complex validation or multi-field forms
  related_patterns: [autosave, WYSIWYG, undo]
  tags: [input, inline, editing]
  source_url: https://ui-patterns.com/patterns/InplaceEditor
  votes:
    up: 28
    down: 77
- id: morphing-controls
  name: Morphing Controls
  problem: Static UI elements waste space or lack context when they could adapt to the current interaction
    state.
  source_problem: The user wants to only be presented with controls available to the current mode
  when_to_use:
  - A button that becomes an input field when clicked
  - Controls that change function based on mode
  solution: |
    Transform UI elements smoothly between states (e.g., search icon → search bar).
    Animate the transition to maintain spatial continuity.
    Ensure each state is clearly distinguishable.
  avoid_when:
  - The transformation confuses users about available actions
  related_patterns: [expandable-input, InplaceEditor]
  tags: [input, adaptive, interaction]
  source_url: https://ui-patterns.com/patterns/morphing-controls
  votes:
    up: 107
    down: 101
- id: FillInTheBlanks
  name: Fill in the Blanks
  problem: Traditional form layouts feel intimidating for complex configurations.
  source_problem: The user needs to enter data into the system
  when_to_use:
  - Rule or query builders
  - Settings that can be expressed as a sentence
  solution: |
    Present the input as a natural language sentence with blanks to fill.
    Each blank is a dropdown or inline input. "Send [email] to [group] when [event] happens."
    This makes complex configurations feel simple and readable.
  rationale: |-
    We all know how to finish a sentence. By inserting input fields into a sentence of words, the user interface is made self-explanatory, possible misundestandings are minimized, and the context is understood more clearly. Sometimes, it can be hard to find a describing label for an input that does not alienate the user to the system. Consider the example in the bottom of the page from the Ruby On Rails wiki. Here, both the submit button (“Save”), the input field for the author name, as well as a back in history link are presented all in the same sentence. These three options could have easily been represented on separate lines with a separate label for each option. Instead, the three options are presented as a sentence, and thus put in context of each other. Furthermore, the example above uses the Input Prompt pattern to encourage users to fill out the text field. The “Fill in the blanks” makes the interface somewhat self-explanatory. Our semantic capabilities as human beings allow us to fill in the missing parts of a sentence.
    This article has been commented 1 time.
  avoid_when:
  - The logic is too complex for a single sentence
  related_patterns: [rule-builder, GoodDefaults]
  tags: [input, simplification, forms]
  source_url: https://ui-patterns.com/patterns/FillInTheBlanks
  votes:
    up: 35
    down: 120
- id: PasswordStrengthMeter
  name: Password Strength Meter
  problem: Users create weak, easily guessable passwords without realizing the risk.
  source_problem: You want to make sure your users' passwords are sufficiently strong in order to prevent
    malicious attacks.
  when_to_use: [Account registration, Password change flows]
  solution: |
    Show a visual meter (bar, color) that updates in real time as user types.
    Rate based on length, character variety, and common password lists.
    Provide specific tips to improve strength.
  rationale: |-
    By showing a password strength meter beside the password field, the user is forced to consider using a password with an appropriate strength. By putting a minimum level of password strength you can even use the password strength meter to force a heightened security to your website. Using a password strength indicator on the website, adds another level of security is added to the site. This not only makes the current users of the site feel more secure, but potential clients might use this as a requisite when deciding to conduct business with a company.
    This article has been commented 4 times.
  avoid_when:
  - Using passwordless authentication
  related_patterns: [InputFeedback, AccountRegistration]
  tags: [input, security, feedback]
  source_url: https://ui-patterns.com/patterns/PasswordStrengthMeter
  votes:
    up: 21
    down: 1048
- id: InputFeedback
  name: Input Feedback
  problem: Users submit forms only to discover errors, causing frustration and re-work.
  source_problem: The user has entered data into the system and expects to receive feedback on the result
    of that submission.
  when_to_use:
  - Any form with validation rules
  - Fields where format matters (email, URL, phone)
  solution: |
    Validate inline as the user types or on field blur.
    Show success (green check) or error (red message) next to the field.
    Provide specific, actionable error messages.
  rationale: >-
    As the user fills out a form on a web page, he or she is conducting the process of converting mental
    data structured in one way to a written form structured in another way. As all humans do not think
    alike, we are bound to enter the data in different ways as we try to convert our individually structured
    data to a shared structure defined by the system. Data entered in web forms is prone to contain errors,
    which we must be prepared for in our design. The user must be made aware of the fact that the data
    entered did not match the structure that we designed for. Using visually distinct feedback notices,
    the user will be made aware of such errors and how to correct them.
  discussion: |-
    It can be argued that you should focus more on preventing errors before the user submits his or her data than on providing a good error message after data has been submitted. Consider constraining input with select boxes. Consider the language of your error messages, as these may have an emotional impact on your users. What tone of voice is appropriate for your users? Provide clear feedback after every action Users will feel more confident and informed when they receive feedback from the system. Feedback includes notifications, dialog message boxes, colored or disabled buttons, loading animations, inline alerts, tooltips, hover effects and so on. Bridge the gap created between performing an action and evaluation of the system after an action.
    This article has been commented 5 times.
  avoid_when:
  - Validation requires server round-trip and would feel laggy
  related_patterns: [ForgivingFormat, PasswordStrengthMeter, LivePreview]
  tags: [input, validation, feedback]
  source_url: https://ui-patterns.com/patterns/InputFeedback
  votes:
    up: 3
    down: 153
- id: WYSIWYG
  name: WYSIWYG Editor
  problem: Users need to create formatted content but don't know HTML or markup languages.
  source_problem: >-
    The user wants to create content that contains rich media and formatted text but does not the knowledge
    or time to write HTML.
  when_to_use:
  - Blog posts, emails, documentation
  - Any rich text content creation
  solution: |
    Provide a toolbar with formatting options (bold, lists, headings, links).
    Show content exactly as it will appear. Support keyboard shortcuts for formatting.
    Keep the toolbar simple; hide advanced options behind "more" menu.
  rationale: |-
    WYSIWYG (What You See Is What You Get) was initially introduced in word processors such as WordPerfect and Microsoft Word. It was then a revolutionary way to write documents, where the editor on the screen mimicked the result in print. Recently, WYSIWYG editors were introduced to forms on the web. Previously, long text was inserted into <textarea/> fields, with no formatting options what-so-ever. WYSIWYG editors now allow the input to mimic what will be seen on screen.
    This article has been commented 6 times.
  avoid_when: [Plain text is sufficient, Target users prefer markdown]
  related_patterns: [LivePreview, InplaceEditor]
  tags: [input, editing, content]
  source_url: https://ui-patterns.com/patterns/WYSIWYG
  votes:
    up: 216
    down: 421
- id: autosave
  name: Autosave
  problem: Users lose work when they forget to save, their browser crashes, or connection drops.
  source_problem: The user wants to keep their data safe and saved while focusing on working without having
    to remember to do so.
  when_to_use:
  - Long-form content editing
  - Multi-step forms that take time to complete
  solution: |
    Save automatically at regular intervals and after each meaningful change.
    Show a subtle save status indicator ("Saved", "Saving...").
    Store drafts locally as fallback. Allow manual save too.
  rationale: >-
    Let users worry about creating great content rather than about loosing it. Removing the save button
    entirely can create fear, so consider keeping it around to make users feel safe. Leave an unobtrusive
    trace of conducted user actions and consider complementing with the Undo pattern.
  discussion: >-
    When implementing auto-save functionality, consider not removing the “Save” button. Users tend to
    panic, when there is no “Save and close” button. Even though the “Save” button does nothing or only
    closes the window, it provides confidence and reassurance in users that their data is safe. It’s an
    issue of trust. Did the system hear me? Am I sure that I am sure?
  avoid_when:
  - Changes should only be applied intentionally (e.g., publishing)
  related_patterns: [undo, LivePreview]
  tags: [input, persistence, forms]
  source_url: https://ui-patterns.com/patterns/autosave
  votes:
    up: 138
    down: 142
- id: CalendarPicker
  name: Calendar Picker
  problem: Typing dates leads to format confusion and errors.
  source_problem: The user wants to find or submit information based on a date or date range
  when_to_use:
  - Date selection for bookings, events, deadlines
  - Date range selection
  solution: |
    Show a visual calendar widget for date selection.
    Highlight today, selected date, and valid range.
    Allow keyboard input as alternative. Respect locale for date format.
  rationale: >-
    The calendar picker is a familiar graphical interface that is commonly understood among users. It
    helps the user easily choose a date or date range for use in submitting information or filtering data.
  discussion: |-
    International considerations In some countries it is typical to display a calendar with Sunday as the first day of the week, where in many European and Asian countries, Monday is typically depicted as the first day of the week. Some countries (E.g. Germany and Scandinavian countries) use week numbers for general planning purposes. In these countries, using the week number is almost as common as using the month name for describing a date range. Consider displaying the week number for each week row.
    This article has been commented 5 times.
  avoid_when:
  - Date is far in the past (birth year) — use dropdowns instead
  related_patterns: [EventCalendar, GoodDefaults]
  tags: [input, dates, picker]
  source_url: https://ui-patterns.com/patterns/CalendarPicker
  votes:
    up: 3
    down: 171
- id: LivePreview
  name: Live Preview
  problem: Users can't visualize the final result of their input until they submit.
  source_problem: The user wants to check how changes in form fields affect an end result as quickly as
    possible.
  when_to_use:
  - Template or theme customization
  - Content editors, email composers
  - Any configuration with visual output
  solution: |
    Show a real-time preview that updates as the user changes input.
    Place preview next to or below the input area.
    Make it clear which part of the preview corresponds to which input.
  rationale: |-
    Previews make it easier for users to decide whether or not to commit to a change and thus invite safe exploration and playful creativity. Show feedback immediately in live previews to further spark fun, play, and exploration. The result is increased interactivity. The user does not need to wait for page reload on a form submit to find out whether data was inputted correctly into the form. The feedback is immediate.
    This article has been commented 4 times.
  avoid_when:
  - Preview computation is too expensive for real-time updates
  related_patterns: [WYSIWYG, InputFeedback, Simulation]
  tags: [input, feedback, preview]
  source_url: https://ui-patterns.com/patterns/LivePreview
  votes:
    up: 15
    down: 88
- id: expandable-input
  name: Expandable Input
  problem: Fixed-size input fields are either too small for long content or waste space for short content.
  source_problem: The user wants to experience a main interface with as much screen real estate and with
    a minimum of distractions
  when_to_use:
  - Comment fields, text areas
  - Search bars that can handle complex queries
  solution: |
    Start with a compact input that grows as the user types.
    Expand vertically for textareas, horizontally for search bars.
    Set a reasonable maximum size to prevent layout breaking.
  rationale: >-
    Expandable inputs can help unclutter user interfaces by staying out of sight until needed. For multiple
    purpose user interfaces, it can be helpful to let optional actions, such as searching, posting, or
    commenting, attract a minimum of attention.
  avoid_when:
  - Input length is always predictable and short
  related_patterns: [morphing-controls, InputPrompt]
  tags: [input, adaptive, forms]
  source_url: https://ui-patterns.com/patterns/expandable-input
  votes:
    up: 305
    down: 328
- id: settings
  name: Settings
  problem: Users have different preferences and need to customize the application to work their way.
  source_problem: The user needs a central place to indicate preferences for how the application should
    behave
  when_to_use:
  - Any app with configurable behavior
  - Notification preferences, display options, privacy controls
  solution: |
    Group settings by category. Use appropriate controls (toggles, dropdowns, sliders).
    Provide sensible defaults. Show the effect of changes immediately when possible.
    Include search for apps with many settings.
  avoid_when:
  - The app is simple enough that one-size-fits-all works
  related_patterns: [GoodDefaults, ProgressiveDisclosure]
  tags: [input, configuration, personalization]
  source_url: https://ui-patterns.com/patterns/settings
  votes:
