    up: 5
    down: 5
- id: autonomy
  name: Autonomy
  problem: Users lose motivation when they feel forced into specific actions.
  source_problem: We strive to feel in control
  when_to_use:
  - Settings, preferences, content selection
  - Any interaction where user choice is possible
  solution: |
    Give users meaningful choices. "Choose your path." "Customize your experience."
    Even small choices increase ownership and motivation.
    Avoid language that feels controlling. Use "You can" not "You must."
  rationale: |-
    A perception of greater autonomy increases the feeling of certainty and reduces stress. We are intrinsically motivatetd to satisfy our need for autonomy and report a higher state of well-being when met. Give people the freedom to make choices that align with their priorities and values rather than forcing them through a predefined path.
    Sources In the 1980s, Edward L. Deci and Richard Ryan made the self-determination theory popular and accepted as a sound empirical theory with their seminal book on Self-Determination. Alongside Autonomy, Deci & Ryan also proposed “competence” and “relatedness” as intrinsic motivators. In the field of User Experience, Jacob Nielsen included Autonomy (User control and freedom) in his 10 usability heuristics for user interface design. 1 Self-Determination Theory: Users Want Autonomy, Relatedness, and Competency by Tanner Kohler at NNgroup.com 2 Self-Determination Theory at Wikipedia.org 3 Autonomy Bias at Learning Loop 4 Self-Determination Theory at Learning Loop
  avoid_when:
  - Too many choices cause decision fatigue
  related_patterns: [Illusion-of-control, settings, Self-expression]
  tags: [persuasion, social, empowerment]
  source_url: https://ui-patterns.com/patterns/autonomy
  votes:
    up: 2
    down: 3
- id: Status
  name: Status
  problem: Users want visible markers of their achievements and importance within a community.
  source_problem: We constantly look to how our actions improve or impair how others see us
  when_to_use:
  - Community platforms, loyalty programs
  - Premium tiers, professional networks
  solution: |
    Provide visible status indicators: badges, titles, colored usernames, special icons.
    Create a status hierarchy (Bronze → Silver → Gold → Platinum).
    Make status achievable through contribution, not just payment.
  rationale: |-
    We constantly assess our social or professional standing relative to others, seeing how interactions either enhance or diminish it
    Sources Status and our wish to conform to it is a foundational conncept of social psychology. We use status to help determine to which level we as an individual should conform. Individual variations among group members play a key role in the dynamic of how willing people will be to conform or oblige. 1 Bickman, Leonard (1974). The Social Power of a Uniform. Journal of Applied Social Psychology. 4 (1): 47–61 2 Baron & Branscombe (2012). Social Psychology. United States of America: Pearson Education, Inc. pp. 127–28 3 The Status behavioral design pattern at Learning Loop
  avoid_when:
  - Status hierarchy would create a toxic community dynamic
  related_patterns: [Levels, leaderboard, reputation, CollectibleAchievements]
  tags: [persuasion, social, hierarchy]
  source_url: https://ui-patterns.com/patterns/Status
