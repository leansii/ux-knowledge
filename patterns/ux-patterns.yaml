- id: AccordionMenu
  name: Accordion Menu
  problem: A deep menu hierarchy needs to fit in a constrained sidebar or mobile view.
  source_problem: >-
    User needs to navigate among a website's main sections while still being able to quickly browse to
    the subsection of another.
  when_to_use:
  - Documentation sites, settings panels
  - FAQs with expandable answers
  solution: |
    Show categories as expandable/collapsible sections.
    Only one section (or a few) open at a time.
    Indicate expand/collapse state with chevron or +/- icon.
  rationale: |-
    Accordion menus are often used as a website’s main navigation. In this way, it acts much like Navigation Tabs, as menu items are collapsed when a new panel is clicked. Where the Navigation Tabs are most often used horizontally, Accordion menus are most often used vertically. Accordion menus can however also function quite well as sub-navigation for a specific section of a website.
    This article has been commented 3 times.
  avoid_when:
