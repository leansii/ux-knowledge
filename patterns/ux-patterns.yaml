- id: fresh-start-effect
  name: Fresh Start Effect
  problem: Users want to start new behaviors but feel weighed down by past performance.
  source_problem: We are more likely to achieve goals set at the start of a new time period
  when_to_use:
  - New Year, Monday, first of the month
  - After a milestone or life event
  - Re-engagement campaigns
  solution: |
    Offer "fresh start" moments: reset streaks, new challenges, clean dashboard.
    Time campaigns around natural fresh starts (new year, new month).
    "Start fresh this week" messaging.
  rationale: |-
    Time based landmarks such as a new week, month, year, national holiday, school semesater, or an anniversary, marks the passage of a mental accounting period assigning past imperfections to the previous period. In turn, this motivates to big-picture thinking and aspirational behaviors for the coming period of time and can hellp overcome willpower problems that keeps us from achieving our goals.
    Sources Although the research body is large in regards to understanding situational factors that motivate people to pursue their aspirations, few studies have investigated naturally arising points in time when people feel particularly motivated to tackle their goals. Besides Dai, Milkman, and Riis, who coined the Fresh Start Effect, BJ Fogg addresses the concept of motivational waves. 1 Dai, Milkman & Riis (2013). The Fresh Start Effect: Temporal Landmarks That Motivate Aspirational Behaviour. The Wharton School Research Paper No.51 2 Norcross JC, et. al. (2002). Auld lang syne: Success predictors, change processes, and self-reported outcomes of New Year’s resolvers and nonresolvers. J. Clin. Psych. 58(4):397–405. 3 Use the fresh start effect to boost your motivation at memory.ai 4 Reaching goals with the science of the “fresh start effect” at Psychology Compass 5 Fresh Start Effect at Coglode.com 6 The Fresh Start Effect at Learning Loop
  avoid_when:
  - Erasing past progress would be demotivating
