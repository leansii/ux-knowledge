- id: Reduction
  name: Reduction
  problem: Complex tasks with many steps have high abandonment rates.
  source_problem: Reduce complex behavior to simple tasks, increasing the benefit/cost ratio and in turn
    influencing users to perform
  when_to_use:
  - Signup flows, checkout
  - Any task you want maximum completion on
  solution: |
    Remove every unnecessary step. Pre-fill what you can.
    Combine steps where possible. Eliminate optional fields.
    One-click actions beat multi-step flows.
  rationale: |-
    We prefer to use products and services that give us better return on the information we give them. As humans, we are cognitively lazy. We like to get the maximum benefit for minimum return. We prefer to use products and services that give us better return on the information we give it. Reduce otherwise complex activities to a few simple steps (or ideally a single step). By making a behavior easier to perform, the ratio between benefit and cost will increase and motivate people to engage in the behavior more frequently. Additionally, simplifying a behavior or activity may increase users’ self-efficacy (belief in own ability), to perform a specific behavior, which in turn can help develop more positive attitudes toward the behavior, get people to try harder to adopt the behavior, and perform it more frequently.
    Sources Having established the Captology Lab at Stanford (renamed to Behavior Design Lab), BJ Fogg was among the first to research persuasive technologies. Although somewhat ignored his book on Persuasion kicked off a new field of research and continues to grow in importance. Reduction was among the core persuasive strategies BJ Fogg discovered. 1 Amanda Shiga, Persuasion and Information Architecture 2 B. J. Fogg, Persuasive technology: using computers to change what we think and do, Morgan Kaufmann, 2003 3 Reduction persuasive technique at Learning Loop
  avoid_when:
  - Steps serve important purposes (legal, confirmation)
  related_patterns: [GoodDefaults, Tunnelling, Limited-choice]
  tags: [persuasion, attention, simplification]
  source_url: https://ui-patterns.com/patterns/Reduction
  votes:
    up: 45
