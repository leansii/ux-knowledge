- id: Need-for-closure
  name: Need for Closure
  problem: Users feel uncomfortable with incomplete tasks or open-ended situations.
  source_problem: We have a desire for definite cognitive closure as opposed to enduring ambiguity.
  when_to_use: ['Progress bars, task lists', Story-driven experiences]
  solution: |
    Show clear completion states. Use progress indicators.
    Provide satisfying endings to flows. "All done!" confirmation screens.
    Leverage the desire to close open loops.
  rationale: >-
    As humans, we strive toward satisfying our goals and all feel we have a need for fulfilling them.
    This need for not leaving things be, is a key motivator for acting on our dreams. It is important
    for us to perceive a movement towards closure. The tension arising out of the need for closure is
    called frustration, the closure is called satisfaction2. Once satisfaction has been reached, the imbalance
    is removed and thus disappears. The feeling of ambiguity or uncertainty motivate us to find answers.
    The perceived cost of lacking closure, such as missing deadlines, drives us forward toward action.
    This makes us freeze on early judgmental cues that in turn introduce biases in our thinking. We like
    closures to be permanent and will do much to keep them as such. Too much choice will lead to indecision
    and lower sales.
  discussion: |-
    In psychology, people are described as having either a high- or low need for closure. People with a high need for closure prefers order and predictability and is thus decisive and close minded. People with a low need for closure will emit more creative acts1. Either way, we all have a need to have an answer and to escape the feeling of doubt and uncertainty. When designing for people with a high need for closure, utilize the fact that these people are searching for an end and has an innate motivation to “finish up”. People with a high need for closure are likely to quickly grasp closure by relying on early cues, cognitive heuristics, or the first answer they come across. This creates a fine balance: people with a high need for closure can quickly loose all motivation if a solution is not provided or can be found in due time. People with a low need for closure can better deal with living in ambiguity for longer periods of time. They are more productive and their solutions are rated as more creative.
    Sources 1 Need for Closure at wikipedia.org 2 Barlow, A, Gestalt Therapy and Gestalt Psychology, The Gestalt Journal, Fall 1981 3 Design with the Principle of Cognitive Closure by Sepide Ghate 4 Kruglanski, A. W., & Fishman, S. (2009). The need for cognitive closure. In M. R. Leary & R. H. Hoyle (Eds.), Handbook of individual differences in social behavior (pp. 343–353). The Guilford Press. 5 The Need for Closure at Learning Loop
  avoid_when:
  - Open-endedness is a feature (creative tools, exploration)
  related_patterns: [zeigarnik-effect, Completion, set-completion]
  tags: [persuasion, cognition, completion]
  source_url: https://ui-patterns.com/patterns/Need-for-closure
