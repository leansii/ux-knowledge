- id: isolation-effect
  name: Isolation Effect (Von Restorff)
  problem: Everything looks the same and nothing stands out as important.
  source_problem: Items that stand out from their peers are more memorable
  when_to_use:
  - CTAs that need to stand out
  - Key features, recommended options
  solution: |
    Make the important element visually distinct: different color, size, or style.
    Only isolate one or two elements — if everything is highlighted, nothing is.
  rationale: >-
    Being different is more memorable. Being positively remembered makes you stand out from the crowd.
    Create meaningful and helpful contrasts between products. Use color, shape, position, and texture
    to accentuate contrast. We remember more positively, if we understand a meaningful rationale behind
    the accentuation. We remember things that stand out. This is the reason why CTA (Call-to-Action) buttons
    stand out and look different from the rest of the actions buttons on the same page.
  discussion: |-
    The Von Restorff effect was recognised by Hedwig von Restorff in 19331. She conducted a set of memory experiments around isolated and distinctive items, concluding that an isolated item, in a list of otherwise similar items, would be better remembered than an item in the same relative position in a list where all items were similar. Taylor & Fiske2 further indicated that attention is usually captured by salient, novel, surprising, or distinctive stimuli. These may be used to enhance the von Restorff effect.
    Sources The Isolation Effect was discovered by psychiatrist Hedwig von Restorff (1906–1962) and is also called the Von Restorff Effect. It predicts that an item that stands out is more likely to be remembered than other items. The unusual will be remembered. 1 Von Restorff Effect on Wikipedia 2 Salience, attention and attribution: Top of the head phenomena (1978), In L. Berkowitz (Ed.), Advances in experimental social psychology (Vol. 11. pp. 249-288). New York: Academic Press 3 The Von Restorff Effect ~ Making things stand-out from the background at Changing Minds 4 Von Restorff, H. (1933). Über die Wirkung von Bereichsbildung im Spurenfeld [On the effects of the formation of a structure in the trace field]. Psychologische Forschung, 18, 299–342. 5 Isolation Effect at Learning Loop
  avoid_when:
  - Multiple items are equally important
  related_patterns: [Anchoring, framing, cards]
  tags: [persuasion, attention, visual]
  source_url: https://ui-patterns.com/patterns/isolation-effect
  votes:
    up: 21
    down: 35
- id: picture-superiority-effect
  name: Picture Superiority Effect
  problem: Text-heavy content is harder to remember and less engaging.
  source_problem: We remember images much better than words
  when_to_use:
  - Landing pages, tutorials, onboarding
  - Data presentation, product descriptions
  solution: |
    Use images, icons, and illustrations alongside text.
    Replace text with visuals where possible.
    People remember 65% of visual information vs 10% of text after 3 days.
  rationale: |-
    Pictures are recognized and recalled more quickly and easily than both written and oral language. The best results for learning comes from combining both words and images, as words allow us to explain complex or abstract concepts and images to encode those concepts for more efficient retention and recall. Images help grab attention, enhance comprehension, and help users remember your message.
    Sources The well documented Picture Superiority Effect, is based on Allan Paivio’s dual-coding theory, claiming that the formation of mental images aids learning. According to Paivio, there are two ways a person could expand on learned material: verbal associations and visual imagery. Where verbal associations require “dual coding”, images can be more easily and can be retrieved from “symbolic” mode. 1 Hockley, W. E. (2008). The picture superiority effect in associative recognition. Memory & Cognition. 36 (7): 1351–1359 2 Nelson, Reed & Walling (1976). Pictorial superiority effect. Journal of Experimental Psychology: Human Learning & Memory, 2, 523-528. 3 Paivio, A. and Csapo, K. (1973). Picture Superiority in Free Recall: Imagery or Dual Coding? Cognitive Psychology, 5, 176-206. 4 Picture Superiority Effect on Wikipedia.org 5 The Picture Superiority Effect at Learning Loop
  avoid_when:
  - Images would be decoration without information value
