    up: 0
    down: 36
- id: AlternatingRowColors
  name: Alternating Row Colors
  problem: Dense table data is hard to read across long rows — eyes lose track of which row they're on.
  source_problem: The user needs to visually separate similar looking rows in a table apart, in order
    to match the values of each row.
  when_to_use:
  - Any data table with more than a few rows
  - Wide tables where eyes must track across many columns
  solution: |
    Alternate background color between even and odd rows (zebra striping).
    Use subtle color difference — not distracting. Also highlight row on hover.
  rationale: |-
    The purpose of the shading in every second row is only to provide an visual aid for the every users to follow a row from the left to the right and back again – without confusing one row with another. The purpose is not to drastically change the design of the table. A side effect of shading every second row with an alternating color is however that the table will stand out from the rest of the page. The shading in this way boxes in the table.
    This article has been commented 4 times.
  avoid_when:
  - Tables with very few rows
  - Row hover highlighting is sufficient
  related_patterns: [TableFilter, SortByColumn]
  tags: [data, tables, readability]
  source_url: https://ui-patterns.com/patterns/AlternatingRowColors
  votes:
    up: 2
    down: 111
- id: TableFilter
  name: Table Filter
  problem: Users need to narrow down a large table to find specific rows.
  source_problem: The user needs to categorical filter the data displayed in tables by the columns.
  when_to_use:
  - Data tables with more than ~20 rows
  - Admin panels, reports, logs
  solution: |
    Provide filter controls above or beside the table.
    Support filtering by column values, date ranges, status.
    Show active filters and allow clearing them. Update results immediately.
  rationale: |-
    Adding filters to your tables lets the user reduce the amount of items shown. Filters help narrow down search results, letting the user find more accurate results.
    This article has been commented 7 times.
  avoid_when:
  - Table is small enough to scan visually
  related_patterns: [LiveFilter, SortByColumn, Pagination]
