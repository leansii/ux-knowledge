- id: dashboard
  name: Dashboard
  problem: Users need to monitor multiple metrics and statuses without navigating to separate pages.
  source_problem: The user wants to digest data from mulitple sources at a glance
  when_to_use:
  - Admin panels, analytics, monitoring
  - Any role that requires a status overview
  solution: |
    Show key metrics as cards or widgets on a single page.
    Use charts, numbers, and status indicators. Allow customization of which widgets to show.
    Prioritize the most actionable information.
  rationale: |-
    Enable users to make instantaneous and informed decisions at a glance by letting them monitor the major functions of a system efficiently. Indicate what items require urgent attention at the top and move less critical statistics to the bottom. A good dashboard is simple, communicates well, has a minimum of distractions, tries not to confuse, and presents information visually so it is easily perceived.
    Sources 1 Four Cognitive Design Guidelines for Effective Information Dashboards by Shilpi Choudhury 2 Designing and Building Great Dashboards – 6 Golden Rules to Successful Dashboard Design by Nick Smith
  avoid_when:
  - Only one or two metrics matter
  related_patterns: [cards, self-monitoring, AdaptableView]
  tags: [data, overview, monitoring]
  source_url: https://ui-patterns.com/patterns/dashboard
