- id: flagging-and-reporting
  name: Flagging and Reporting
  problem: User-generated content platforms need a way for the community to identify harmful content.
  source_problem: The user wants to mark inappropriate content for moderation
  when_to_use:
  - Any platform with user-generated content
  - Comments, reviews, profiles
  solution: |
    Provide a "Report" or "Flag" option on every piece of content.
    Offer categorized reasons (spam, harassment, misinformation).
    Acknowledge the report and explain the review process.
  rationale: >-
    For sites based on user-generated content and user interaction, flagging and reporting is a vital
    design pattern. Let users help discover content necessary for administrators to review for removal
    or categorization. Users are most often happy to help with the overwhelming task of surveilling and
    managing user-generated content produced in a community.
