- id: Gallery
  name: Gallery
  problem: Users need to browse and view multiple images in an organized way.
  source_problem: The user needs to browse a collection of high quality images
  when_to_use:
  - Photo collections, product images
  - Portfolio sites, media libraries
  solution: |
    Show thumbnails in a grid. Click to open full-size in a lightbox.
    Support keyboard navigation between images.
    Show image count and current position.
  rationale: |-
    Galleries have been heavily used by media sites relying on banner impressions for a living to get as many pageviews out of the user as possible. A gallery with 20 images that shows in separate page views yields a much bigger returns in banner impressions than having an article with 20 images beneath each other. However, as the javascript galleries, where only part of the page is reloaded, becomes increasingly more popular, the days of the gallery with separate page loads seems more and more outdated. If you are still aiming for as many banner impressions as possible, consider having the banners change as well for every time the user browses to a new image.
    Sources 1 Slideshows In Web Design: When And How To Use Them by Matt Cronin at smashingmagazine.com
  avoid_when:
  - Only 1-2 images (just show them inline)
  related_patterns: [Thumbnail, Slideshow, ImageZoom]
  tags: [data, images, browsing]
  source_url: https://ui-patterns.com/patterns/Gallery
