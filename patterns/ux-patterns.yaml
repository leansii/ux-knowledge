- id: Powers
  name: Powers
  problem: Users want to feel special abilities or enhanced capabilities as they progress.
  source_problem: Give users a way to reach their goal more quickly than they could before
  when_to_use:
  - Games, community platforms (moderator powers)
  - Premium features unlocked by engagement
  solution: |
    Grant special abilities at milestones: edit others' posts, access exclusive areas, custom formatting.
    Make powers visible to others. Increase powers with continued engagement.
  rationale: |-
    Becoming more powerful is something that everyone desires in real life. Being giving special powers, no matter in what form, all have in common that they give you a way to reach your goal more quickly than you could before1. Provide temporary or permanent benefits or extra abilities to let users reach their goal faster.
    Sources Providing users with powers to reach existing goals faster or embrace new ones, is a common technique used in persuasive design and gamification to boost autonomy, mastery, and belonging: the tenets of self-determination theory in social psychology. 1 Jesse Schell, “The Art of Game Design – A Book of Lenses”, Carnegie Mellon University 2 Power-up at Wikipedia.org 3 Ryan, R. M.; Deci, E. L. (2000). Self-determination theory and the facilitation of intrinsic motivation, social development, and well-being. American Psychologist. 55 (1): 68–78. 4 Privileges at Learning Loop 5 Self-Determination Theory by Anders Toxboe at Learning Loop
  avoid_when:
  - Powers create unfair advantage that harms others
  related_patterns: [Unlock-features, Levels, Status]
  tags: [gamification, rewards, capability]
  source_url: https://ui-patterns.com/patterns/Powers
  votes:
    up: 1
    down: 8
- id: Unlock-features
  name: Unlock Features
  problem: Showing everything at once overwhelms new users and provides no growth incentive.
  source_problem: Utilize a user’s desire to explore by unlocking new features as a reward for specific
    behaviors
  when_to_use: [Feature-rich applications, 'Games, learning platforms']
  solution: |
    Start with core features. Unlock advanced features as users demonstrate readiness.
    Show locked features with "Unlock at Level X" or "Complete Y to access."
    This creates a sense of discovery and earned progression.
  rationale: >-
    As your users get accustomed to your product, their skill level rises and what was first a challenging
    task becomes tedious. To match the growing skill level of your users and avoid boredom as users evolve
    from novice to expert users, unlocking more advanced features is a common strategy. As users explore
    your website and start unlocking features, they invest time and effort into your website. The effects
    of Loss aversion and the Endowment effect will lock your users in to valuing your website more than
    before they signed up. The points and features you have earned are valued more when their value is
    judged as a loss than a gain. Points already earned are valued more than points to be earned. The
    status and history of having achieved a large set of features will lock in users to sticking with
    your site. Furthermore, the higher status you have in a community and the more power you have with
    the features you unlock, the more Social proof there is that you are to be trusted. This social proof
    has been utilized by google, who is known to have invited job candidates based on users stackoverflow.com
    accounts.
  discussion: |-
    There are several issues to be tackled in systems based on incentives for participation. Gaming the system There will always be users who will look for ways to exploit the system to their own personal or financial gain. This is why algorithms for self-regulation has been put in place in many systems. However, no matter how complex a system becomes in weeding out exploiters, there will always be some way to cheat the system. Point systems promote a situation that contradicts the core purpose behind it: instead of encouraging good behavior and helpfulness among its users, it entices some to behave in unscrupulous ways to get ahead of others2. Drowning out new users As a community gets older and its users earn more points, it gets increasingly harder for new users to reach the same status as long-time active users. The problem becomes apparent when contributions of old users are promoted and in turn awarded more points than a new user who might contribute even better quality content, but who lacks the power of the unlocked features of the old guard. Acclimation to rewards People have a tendency to get acclimated to rewards the more they receive them. What was rewarding an hour ago is no big deal now1. One way of overcoming this is to gradually increase the value of the rewards as the user progresses up the ladder. It works even though you as a user can clearly tell that a designer implemented it like that and why. Another way to keep people from getting acclimated to rewards is to make the rewards variable instead. Variable rewards are unpredictable and random. The element of a delightful surprise engage users for a longer time – even though the number of points given is the same on average. The end of the road What happens when all features are unlocked? Is the game then beaten? Or can you make your rewards variable ? Unlocking features should not be used as the one and only way to motivate users toward engagement and action, but more to get them started and to spark their enthusiasm. Design your end state so that the experience you have built will be enjoyable even with all features unlocked. If you insist on basing the motivation toward action on rewards, consider taking previously unlocked features away from users upon inactivity or misconduct. However, be aware that this might hurry the exit of an already fleeing user who might just have needed a positive reminder to be retained as an active user.
    Sources Unlocking capabilities is a persuasive technique that plays on several persuasive levers. First, it works as a reward, but also one that users would hate to lose (Endowment Effect). At the same time, it can be effectively used to adjust challenges to be appropriate to the learning journey of the users (Appropriate Challenges). Finally, unlocking new capabilities can provide a sense of autonomy and control as users can now do more. 1 Jesse Schell, “The Art of Game Design – A Book of Lenses”, Carnegie Mellon University 2 Karma as a Social Interaction Design Pattern in Websites by Jason Gross 3 How fun is your website? by Jason Gross 4 Gaming the system on Wikipedia.org 5 Csikszentmihalyi, M. (1990), Flow: The Psychology of Optimal Experience, Journal of Leisure Research, 24(1), pp. 93–94 6 Thaler, Richard (1980). “Toward a positive theory of consumer choice”. Journal of Economic Behavior & Organization. 1 (1): 39–60 7 Unlock Features design pattern at Learning Loop
  avoid_when:
  - Users need all features from the start to accomplish their task
  related_patterns: [Levels, Powers, ProgressiveDisclosure]
  tags: [gamification, rewards, progression]
  source_url: https://ui-patterns.com/patterns/Unlock-features
  votes:
    up: 1
    down: 24
- id: delighters
  name: Delighters
  problem: Routine interactions lack emotional moments that users remember and share.
  source_problem: We remember and respond favorably to new, unexpected, and playful pleasures
  when_to_use:
  - Milestone achievements, Easter eggs
  - Loading screens, empty states
  solution: |
    Add unexpected pleasant surprises: animations, sounds, humorous messages.
    Celebrate user achievements with confetti or special effects.
    Keep them rare enough to remain surprising.
  rationale: >-
    Novelty and surprise can transform something very normal and maybe even boring into a pleasant experience.
    It can overcome the habituation effect caused by people encountering many similar products every day
    and lead to increased product recall and recognition and word-of-mouth. Surprise is found to be positively
    related to satisfaction with a product.
  discussion: |-
    According to the Kano model1, delighters are not necessarily expressed in the requirements users are able to express themselves. They are, sometimes small, unexpected, surprises that bring a delightful and fun twist to the user experience. Sometimes they’re unconscious. Delighters are the happy surprise that can make a difference, and an important source of satisfaction. If delighters aren’t there, dissatisfaction and frustration won’t follow: they’re not expected. Usually in software development, delighters aren’t a priority, except if it is your product or company strategy. For instance the glass of champagne, when you arrive at the restaurant, the wifi on the plane or in your hotel room, or the mobile touch screen. In the Kano model, exciters depicted as the keys to Innovation2.
    Sources Theories of motivation, particularly of intrinsic motivation and self-determination, place novelty and surprise among the primary factors that arouse interest, motivate exploratory or avoidance behavior, and drive learning. 1 Using the Kano Model to Build Delightful UX by Jared Spool, 2013 2 The KANO model… so good for User Experience by Jean Claude Grosjean, 2009 3 Ludden, Schifferstein & Hekket (2008). Surprise as a design strategy. Delft University. Design Issues, 24 (2), 2008, p. 28-38 4 Deci, E., and Ryan, R. (1985). Intrinsic Motivation and Self-Determination in Human Behavior. New York, NY: Plenum Press. doi: 10.1007/978-1-4899-2271-7 5 Delighters at Learning Loop 6 Self-Determination Theory by Anders Toxboe at Learning Loop
  avoid_when:
  - Users are in a serious or urgent context
  related_patterns: [Peakend-rule, Variable-rewards, Praise]
  tags: [gamification, rewards, delight]
  source_url: https://ui-patterns.com/patterns/delighters
  votes:
    up: 9
    down: 8
- id: Achievements
  name: Achievements
  problem: Users want recognition and visible proof of their accomplishments.
  source_problem: We are engaged by activities in which meaningful achievements are recognized
  when_to_use:
  - Any platform with measurable user accomplishments
  - Learning, fitness, community participation
  solution: |
    Define specific, named achievements with clear criteria.
    Award badges or icons. Display on user profiles.
    Mix easy achievements (encouragement) with hard ones (aspiration).
  rationale: |-
    We are motivated by achievements of personal or social significance that represent appropriate challenges matching our gradually rising skill level as we go from one achievement to the other. Achievements help anchor what goals users should aspire to achieve and provide social proof what is obtainable for peers similar to us. In this way they allow for social comparison and can help increase our self-efficacy. Why do achievements work? There are several reasons why achievements work and ways in which they can help your product: Achievements anchor our expectations. When making decisions, we tend to rely, or anchor, heavily on the first information presented. This is called the anchoring effect. In this setting, achievements anchor what goals we should aspire to achieve. A too low goal might lead to ambitions not matching user capabilities and end in boredom where a too high and seemingly unobtainable goal will leave users stressed and full of anxiety. In this way, achievements can help communicate and anchor expectations about what are reasonable goals to aim for. Having goals increases self efficacy. Seeing proof of others who obtained trophies and other achievements communicates the idea that obtainment is possible2. It stirs our belief in our own efficacy – our ability to do something if we just try it. Of course, this requires that the goal seems appropriate to the skillset of your users and where they are in their learning journey. Completing goals are rewarding. Completing a goal is a reward in itself and is a key motivational factor to drive people toward action. Especially when users are close to completion or reaching their goal. Goals creates commitment. When goals are clearly articulated and broken down into tasks, it increases chances that users will reach them as the commitment is more clear1. Can you further get users to publicly commit to the mission of achieving a goal, the power of the commitment gets stronger. Achievements provide feedback. When a list of possible achievements are publicly accessible, achieving of each provide feedback on the users progress as to how much is left. Furthermore, achievements can communicate what is possible and what directions a user can take. *Achievements trigger social proof." Both in the sense of showcasing the credibility and merits of an individual user, but also what achievements or goals are more obtainable than others. Social proof is our tendency to assume the actions of others in new or unfamiliar situations. Achievements trigger social comparisons. We seek objective information about our performance. When that information, or a suitable context to evaluate it in, is not there, we will seek to compare ourselves to meaningful others3. Achievements, trophies, and badges earned by other users is a convenient way to do this kind of benchmarking; if I can see that similar peers earned an achievement, I am more motivated to try it.
    Sources The power of achivements has been examined by several branches of social psychology, including Leon Festinger’s social comparison theory, Mihaly Csikszentmihalyi theory of optimal experience and flow, and Albert Banudras theory on self-efficacy. 1 Ling, K., Beenen, G., Ludford, P., Wang, X., Chang, K., Li, X., et al. (2005). Using social psychology to motivate contributions to online communities. Journal of Computer-Mediated Communication, 10(4). 2 Bandura, A. (1993). Perceived self-efficacy in cognitive development and functioning. Educational Psychologist, 28(2), 117–148. 3 Festinger, L. (1954). A Theory of Social Comparison Processes. Human Relations, 7(2), 117–140. 4 Csikszentmihalyi, M. (1990), Flow: The Psychology of Optimal Experience, Journal of Leisure Research, 24(1), pp. 93–94 5 Why Do Achievements, Trophies, and Badges Work? by Jamie Madigan 6 Achievements at Learning Loop
  avoid_when:
  - Trivial achievements that devalue the system
  related_patterns: [CollectibleAchievements, Levels, Praise, leaderboard]
  tags: [gamification, rewards, recognition]
  source_url: https://ui-patterns.com/patterns/Achievements
  votes:
    up: 14
    down: 14
- id: Praise
  name: Praise
  problem: Users don't receive positive reinforcement for completing desired actions.
  source_problem: Use explicit statements, graphics, a sound effect, or similar indicator to reward a
    job well done.
  when_to_use:
  - After completing a task, achieving a milestone
  - Onboarding steps, form completion
  solution: |
    Show encouraging messages: "Great job!", "You're on a roll!"
    Use appropriate tone for the context. Pair with visual feedback.
    Vary the praise to prevent it feeling robotic.
  rationale: |-
    Guide your users toward your preferred behavior by praising it when it is conducted.
    Sources 1 Jesse Schell, “The Art of Game Design – A Book of Lenses”, Carnegie Mellon University
  avoid_when:
  - Praise would feel patronizing to the audience
  - Every minor action gets praise (dilutes meaning)
  related_patterns: [delighters, Achievements, Feedback-loops]
  tags: [gamification, rewards, feedback]
  source_url: https://ui-patterns.com/patterns/Praise
  votes:
    up: 0
