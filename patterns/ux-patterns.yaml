- id: ShortcutDropdown
  name: Shortcut Dropdown
  problem: Users repeatedly navigate to the same few items from a large collection.
  source_problem: The user needs to access a specific section or functionality of a website in a quick
    way regardless of hierarchy.
  when_to_use:
  - Project or workspace switchers
  - Recent or favorite item access
  solution: |
    Provide a dropdown with recently accessed or favorited items.
    Include a search/filter within the dropdown.
    Place in a persistent location (header, sidebar).
  rationale: |-
    The often hierarchical structure of a website can at times impede the path to specific functionality of a website. By adding a shortcut to the most frequently used functionality, the path can be shortened: the number of clicks can be lessened and the confusion decreased.
    This article has been commented 2 times.
