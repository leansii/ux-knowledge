- id: hedonic-adaptation
  name: Hedonic Adaptation
  problem: Users get used to rewards and features, requiring novelty to maintain the same level of excitement.
  source_problem: We return to a stable level of happiness despite major positive or negative events
  when_to_use: [Long-term engagement design, Reward system planning]
  solution: |
    Vary rewards over time. Introduce new features and content regularly.
    Create surprise moments. Escalate the scale or quality of rewards periodically.
  rationale: |-
    No matter how good or bad a new experience makes us feel, our feelings eventually revert back to normal, shifting adaption levels to the new baseline. Lottery winners are no happier than non-winners eighteen months later. Restricting pleasure increases the feeling of pleasure.
    Sources Social & positive psychologists, Philip Brickman and Donald Thomas Campbell, coined term Hedonic Treadmill in their 1971 seminal article, which refers to the concept of Hedonic Adaption. The concept of habituation to new circumstances is surprisingly consistant with Herzberg’s 1966 two-factor motivation-hygiene theory, although heavily debated and disregarded. 1 Brickman; Campbell (1971). Hedonic relativism and planning the good society. New York: Academic Press. pp. 287–302. in M. H. Apley, ed., Adaptation Level Theory: A Symposium, New York: Academic Press 2 Leif & Meyvis (2009). Enhancing the Television-Viewing Experience Through Commercial Interruptions, Journal of Consumer Research, Volume 36, Issue 2, Pages 160–172 3 Herzberg, F.I. (1966). Work and nature of man. New York: Thomas Y. Crowell. 4 Hedonic Treadmill at Wikipedia.org 5 Hedonic Adaptation at Coglode.com 6 Hedonic Adaptation at Learning Loop
  avoid_when:
  - Stability is more important than novelty
