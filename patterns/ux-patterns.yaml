- id: VerticalDropdownMenu
  name: Vertical Dropdown Menu
  problem: Many navigation items need to be organized but there isn't space to show them all.
  source_problem: The user needs to navigate among sections of a website, but space to show such navigation
    is limited.
  when_to_use:
  - Sidebar navigation with sub-items
  - Mobile navigation menus
  solution: |
    Show top-level items vertically. Expand sub-items on click or hover.
    Highlight current section. Support collapsing for space.
  rationale: |-
    Drop-down menus save space. This is the main reason for using them. Otherwise, drop-down menus are not regarded as a technique that increases usability, as they can often be difficult to use. Flyout menus allow for only showing top levels of the page’s hierarchy permanently, while still giving the option to show deeper levels on mouse over.
