    up: 1
    down: 6
- id: Social-proof
  name: Social Proof
  problem: Users are uncertain whether a product or action is the right choice.
  source_problem: We assume the actions of others in new or unfamiliar situations
  when_to_use:
  - Landing pages, product pages, signup flows
  - Any conversion-critical page
  solution: |
    Show numbers: "10,000+ users", "4.8 stars from 2,000 reviews."
    Display logos of well-known customers. Show real-time activity.
    "Sarah from NYC just purchased..."
  rationale: >-
    We have a common tendency to adopt the opinions and follow the behaviors of the majority to feel safer
    and to avoid conflict. Social Proof establishes the norm others follow through experts, celebrities,
    the crowd, friends, or similar users. Communicate Social Proof testimonials, expert quotations, related
    actions by friends, or statistics like number of views, followers, or comments to encourage desired
    behaviors. The actions of those around us are important when we decide what constitutes correct behavior.
    Whether it is to choose between two restaurants, to litter on the street, how fast to drive in a certain
    stretch on the highway, or which youtube video to watch first, we look to those around us to determine
    the correct answer. Assuming that those around us are behaving normally, we will make fewer mistakes
    by acting in accord with social evidence than contrary to it. Acting in accord with social evidence
    is a shortcut to correct behavior and an often good decision. Social proof is so effective as most
    of us would rather imitate that initiate. Independent thought requires expensive brain energy, why
    we often resort to short-cutting our thought processes where we can. Your audience will judge your
    propositions as being more true and acceptable if you succeed to establish your credibility. Especially
    if your product is new, it’s critical to establish credibility with potential customers Related studies
    In 1951, Salomon Asch5 set up an experiment to prove social proof. The setup: Entering a room together
    with a conferederate assumed to be other participants, 50 young adults were shown a depecting a target
    line next to three lines A, B, C and asked which was most similar in length to the target line. Although
    the answer was always obvious, the confederaates purposefully gave the wrong answer before the participant.
    The result: Over 12 trials, participants conformed at least once 75% of the time.
  discussion: |-
    This pattern is closely related to the bystander-effect, herd-mentality, and the band-wagon effect. Getting social proof right Even though social proof is one of the most effective means of persuasion, you do need to keep a couple of things in mind for it to be effective. Negative social proof can backfire. The message “Many past visitors have removed the petrified wood from the park, destroying the natural state of the Petrified Forest.” lead to park visitors stealing more, not less. Social proof works better with pictures. Testimonials is one of the most effective ways to use social proof. Furthermore, displaying faces alongside them increased trust even more – even when the photos were “nonsensical.” We are influenced more by people similar to us. We’re more likely to be influenced by people we know or like. The closer you can hit to home, the more effective your efforts will be. Being from the same town connects more than being from the same country. Liking the same band connects more than liking the same style of music. Authority rules. We’re more likely to act on information, if it’s communicated by an expert – or at least a credible and authoritative source. Authority in itself influences behavior through credibility, and is as such an extension of social proof.\ Keeping a balance: social proof boosters and killers Some situations strengthen the effect of social proof while others weaken it. Modifiers strengthening the power of social proof Identification of group with self People are more likely to conform to a group’s behavior if they perceive themselves belonging to the same or similar group than of they do not identify with the group. Modifiers weakening the power of social proof Special knowledge People are less likely to conform to a group’s behavior if they perceive themselves as better advised about a situation than the surrounding group. Identification with authority People are less likely to conform to a group’s behavior if they perceive themselves as a relevant authority figure in the situation. Perceived authority often happens when people have special training or knowledge that allows them to draw such conclusion.
    Sources 1 Stephen Anderson (2009), “Get Mental Notes”, http://getmentalnotes.com 2 Cialdini, R. (1993), Influence: Science and practice (3rd edn), New York: HarperCollins 3 “Social Proof”, Wikipedia.org, http://en.wikipedia.org/wiki/Social_proof 4 “Social Proof”, The Decision Lab, https://thedecisionlab.com/reference-guide/psychology/social-proof/ 5 Asch SE. Effects of group pressure upon the modification and distortion of judgments. In: Guetzkow H, ed., Groups, leadership and men; research in human relations. Pittsburgh PA: Carnegie Press; 1951. 6 Nonprobative photographs (or words) inflate truthiness by Newman EJ, Garry M, Bernstein DM, Kantner J, Lindsay DS. 7 Social Proof behavioral design pattern at Learning Loop
  avoid_when:
  - Numbers are too low to be impressive
  - Social proof is fabricated
  related_patterns: [testimonials, Authority, RateContent]
  tags: [persuasion, social, validation]
  source_url: https://ui-patterns.com/patterns/Social-proof
  votes:
    up: 1
    down: 16
- id: cognitive-dissonance
  name: Cognitive Dissonance
  problem: When users' actions don't align with their beliefs, they experience discomfort and seek to
    resolve it.
  source_problem: When we do something that is not in line with our beliefs, we change our beliefs
  when_to_use:
  - After micro-commitments (started a trial, liked a product)
  - Persuasion sequences
  solution: |
    Get small commitments first (free signup, follow, bookmark).
    Users who've committed small will align their beliefs to match.
    Then offer bigger commitments that align with the identity they've started to adopt.
  rationale: >-
    Our actions influence subsequent beliefs and attitudes – they aren’t the result of them. The presence
    of cognitive dissonance, of being psychologically uncomfortable, motivates us to resolve the conflict
    in order to reduce the dissonance. Provoke cognitive dissonance and let users resolve the conflict
    by taking action. The cognitive dissonance theory, counterintuitively, suggests that our actions can
    influence our subsequent beliefs and attitudes. As humans, we seek consistency among our attitudes,
    thoughts, and beliefs. Dissonance, or the state of discomfort, arises when there’s a conflict between
    these cognitions. This discomfort motivates us to resolve the conflict, either by reducing its importance,
    adding consonant cognitions, or changing the dissonant cognitions. Cognitive Dissonance is grounded
    in the principle that individuals have an inherent desire to ensure consistency between their beliefs,
    attitudes, and behaviors. When a discrepancy arises among these elements, it results in a state of
    tension or discomfort, pushing individuals to resolve this inconsistency to regain cognitive harmony.
  discussion: |-
    Any use of cognitive dissonance should be aligned with the genuine benefit of the user, not just business metrics. Ethically leveraging this pattern means prioritizing user well-being and long-term value over short-term gains. Cognitive dissonance, as a persuasive pattern, has the potential to be misused in ways that can manipulate users into actions that might not be in their best interests. Specifically, companies might exploit this psychological phenomenon to make users feel uncomfortable or inadequate about their current status, pushing them to make purchases or take actions that they wouldn’t have otherwise considered. For instance, a fitness app might overly emphasize a user’s lack of activity, making them feel guilty and pushing them towards buying a premium plan without considering if it genuinely suits their needs. Moreover, an excessive reliance on inducing cognitive dissonance can lead to users feeling overwhelmed, anxious, or demotivated. If a digital product continuously highlights the gap between a user’s self-perception and their actual behavior, it might result in decreased self-esteem or users disengaging from the platform entirely.
    Sources 1 William Lidwell (2003), “Universal Principles of Design” 2 Brehm, J. & Cohen, A. (1962). Explorations in Cognitive Dissonance. New York: Wiley. 3 Festinger, L. (1957). A Theory of Cognitive Dissonance. Stanford, CA: Stanford University Press. 4 Festinger, L. & Carlsmith, J.M. (1959). Cognitive Consquences of Forced Compliance. Journal of Abnormal and Social Psychology, 58, 203-210. [available at http://psychclassics.yorku.ca/Festinger] 5 Wickland, R. & Brehm, J. (1976). Perspectives on Cognitive Dissonance. NY: Halsted Press. 6 Cognitive Dissonance at Instructional Design 7 An Introduction to Cognitive Dissonance Theory and an Overview of Current Perspectives on the Theory by Eddie Harmon-Jones and Judson Mills 8 Aronson, E., & Mills, J. (1959). The effect of severity of initiation on liking for a group. Journal of Abnormal and Social Psychology, 59, 177-181. 9 Aronson, E., & Carlsmith, J. M. (1963). Effect of the severity of threat on the devaluation of forbidden behavior. Journal of Abnormal and Social Psychology, 66(6), 584-588. 10 Cooper, J., & Fazio, R. H. (1984). A new look at dissonance theory. Advances in experimental social psychology, 17, 229-266. 11 Stone, J., Aronson, E., Crain, A. L., Winslow, M. P., & Fried, C. B. (1994). Inducing hypocrisy as a means of encouraging young adults to use condoms. Personality and Social Psychology Bulletin, 20(1), 116-128. 12 Cognitive Dissonance at Learning Loop
  avoid_when:
  - Exploiting this to extract commitments users don't actually want
  related_patterns: [Commitment-consistency, Reciprocation, sunk-cost-effect]
  tags: [persuasion, social, consistency]
  source_url: https://ui-patterns.com/patterns/cognitive-dissonance
  votes:
    up: 3
    down: 5
- id: Positive-mimicry
  name: Positive Mimicry
  problem: Users adopt behaviors they see successful peers performing.
  source_problem: We learn by comparing our behavior with the actions of others
  when_to_use: ['Social features, leaderboards', 'User stories, case studies']
  solution: |
    Show what successful users are doing. "Top sellers do X."
    Feature user success stories. Make desired behaviors visible in the community.
  rationale: >-
    We often subconsciously and automatically imitate other people’s behavior. You smile when I smile.
    Mimic your customer’s terminologies, reuse search queries in your online dialogues, and showcase actual
    consumers buying or consuming your product. The main psychological principle behind Positive Mimicry
    is the inherent human need for social cohesion and acceptance. When we mimic or are mimicked by others,
    it creates a sense of belonging, validation, and mutual understanding, fostering positive feelings
    and smoother interactions. Mimicry often occurring outside our conscious awareness, influences our
    perceptions, feelings, and actions. Positive Mimicry is grounded in our evolutionary predisposition
    to adopt behaviors that have proven advantageous or rewarding for others in our environment. By mimicking
    such behaviors, individuals often hope to achieve similar positive outcomes or be perceived in a more
    favorable light. This principle operates both on a conscious and subconscious level, influencing a
    wide range of decisions and actions. While it can lead to constructive outcomes like learning and
    cooperation, it’s essential to recognize the boundaries and ensure it’s applied authentically and
    ethically.
  discussion: |-
    Positive mimicry plays a major role in psychotherapy as a tool to positively influence relationship to the client as well as a way to communicate empathy, to enhance similarity between interaction partners and increase their liking. When platforms excessively mirror a user’s behavior or preferences, they risk creating a narrowing echo chamber. Such environments might limit users’ exposure to diverse content or experiences, potentially hindering personal growth and inadvertently reinforcing existing biases. Moreover, the foundation of mimicry is built on understanding and replicating user behavior, which invariably involves the collection and analysis of user data. Without explicit and transparent data collection policies, this opens a Pandora’s box of privacy concerns, potentially leading to unauthorized use or even misuse of personal information. To ethically apply the principle positive mimicry, a few guiding principles are crucial: Transparency. Always be transparent about how user data is being used to create a mimicked experience. Providing clear, understandable information about data collection practices will foster trust. Limit data collection. Only collect the data that is necessary for the mimicking process. Avoid storing excessive amounts of personal data and regularly purge unnecessary information. Provide opt-out options. Allow users the choice to opt-out of certain mimicking features if they’re uncomfortable with the level of personalization or if they wish to explore content outside of their typical preferences. Avoid reinforcing negative behaviors. Positive mimicry can inadvertently reinforce harmful or negative behaviors if not carefully managed. For instance, if a user frequently visits unhealthy food recipes, a health app shouldn’t keep suggesting similar recipes without occasionally introducing healthier alternatives. Data sensitivity. Some data might be more sensitive than others. For instance, mirroring browsing habits related to medical conditions or personal challenges can be seen as invasive. Designers should be discerning about which behaviors are mirrored and ensure they don’t cross personal boundaries.
    Sources Positive mimicry plays a major role in psychotherapy as a tool to positively influence relationship to the client as well as a way to communicate empathy, to enhance similarity between interaction partners and increase their liking. 1 Hess, U., Philippot, P., & Blairy, S. (1999). Mimicry: Facts and fiction. In P. Philippot, R. S. Feldman, & E. J. Coats (Eds.), The social context of nonverbal behavior (pp. 213–241). Cambridge University Press 2 Agneta H. Fischer, Daniela Becker and Lotte Veenstra (2012), Emotional mimicry in social context: the case of disgust and pride, Department of Social Psychology, University of Amsterdam 3 Chartrand, T. L., & Bargh, J. A. (1999). The chameleon effect: The perception–behavior link and social interaction. Journal of Personality and Social Psychology, 76(6), 893–910. 4 Lakin, J. L., Jefferis, V. E., Cheng, C. M., & Chartrand, T. L. (2003). The chameleon effect as social glue: Evidence for the evolutionary significance of nonconscious mimicry. Journal of Nonverbal Behavior, 27(3), 145–162. 5 van Baaren, R. B., Holland, R. W., Kawakami, K., & Van Knippenberg, A. (2004). Mimicry and prosocial behavior. Psychological Science, 15(1), 71–74. 6 Positive Mimicry behavioral change technique at Learning Loop
  avoid_when:
  - Mimicry would lead to harmful behavior
  related_patterns: [Social-proof, leaderboard, testimonials]
  tags: [persuasion, social, imitation]
  source_url: https://ui-patterns.com/patterns/Positive-mimicry
  votes:
    up: 7
    down: 11
- id: Commitment-consistency
  name: Commitment and Consistency
  problem: Users are more likely to follow through on big asks if they've already made small commitments.
  source_problem: We want to appear consistent with our stated beliefs and prior actions and also value
    this quality in others
  when_to_use: ['Sales funnels, onboarding', 'Surveys, pledge campaigns']
  solution: |
    Start with small, easy commitments: "Do you agree this is important?" → sign up → buy.
    Each step builds on the previous commitment.
    Make commitments public for stronger effect.
  rationale: >-
    People like to be consistent with the things they have previously said or done. People generally want
    to be seen, as honoring their commitments consistently; as somebody who can be counted on, instead
    of somebody who flip flops, and is without self-control. Once we have publicly said out loud, that
    we use or like a product or that we are going to start doing something, we have a desire to act in
    a manner consistent with that behavior. If I state that I am going to start running 3 times a week,
    I have a desire to act consistently with that statement. People have an innate desire to be consistent
    with their words and actions. This desire is so strong that individuals will sometimes go to great
    lengths to maintain consistency, even when doing so may not be in their best interests. Why is this
    so? Cultural value. Consistency is often valued in societies. Inconsistent individuals can be viewed
    as unreliable or deceitful. Self-perception. Once we commit to something publicly, we tend to act
    in ways that are congruent with that commitment. This aligns with our self-image and how we want others
    to perceive us. Cognitive ease. Being consistent reduces the cognitive load. It’s simpler to continue
    in a set pattern than to evaluate every decision afresh.
  discussion: |-
    For commitments to be powerful, they need to be public, be actively followed up by an action, and voluntary. Every time we make a public commitment, we slowly change our attitudes toward that commitment. If we say, we use a product, but have actually only used it a couple of times, we have a tendency to change our behavior toward starting to use the product more, in order to act consistently with our public commitment. That in turn can lead to even more use of the product, which then might invoke another commitment. So it turns out to be this self-fulfilling cycle of larger and larger commitments. The key is to make people state their position, declare their intentions, or show a small gesture of support. Generally, people will act in a manner consistent with these small requests, even if later asked to make a much larger, but consistent, commitment. Getting just a small commitment from your potential customers, like getting them to sign up for your newsletter or liking your page on Facebook, will make them more likely to purchase from you, in the future. We will go a long way to avoid a strong dissonance, between our words and our actions. If we say we will do a thing, we feel we must, even if following through on our words, is actually irrational.
    Sources 1 11% conversion rate increase with a “Commitment Checkbox” at ConversionVodoo 2 Optimization at the Obama campaign: a/b testing by Kyle Rush 3 The Principle of Commitment and Behavioral Consistency by Therese Fessenden 4 Freedman, J.L., & Fraser, S.C. (1966). Compliance without pressure: The foot-in-the-door technique. Journal of Personality and Social Psychology, 4(2), 195-202. 5 Cialdini, R. B. (2001). Influence: Science and Practice. Allyn & Bacon. 6 Kiesler, C. A. (1971). The psychology of commitment. Academic Press. 7 Festinger, L. (1957). A theory of cognitive dissonance. Stanford University Press. 8 Thaler, R. H., & Sunstein, C. R. (2008). Nudge: Improving decisions about health, wealth, and happiness. Yale University Press. 9 The Commitment & Consistency influence technique at Learning Loop
  avoid_when:
  - Manipulating users into commitments they don't genuinely want
  related_patterns: [cognitive-dissonance, Reciprocation, sunk-cost-effect]
  tags: [persuasion, social, conversion]
  source_url: https://ui-patterns.com/patterns/Commitment-consistency
  votes:
    up: 8
    down: 9
- id: reputation
  name: Reputation
  problem: Without accountability, users may behave poorly in online communities.
  source_problem: We adjust our personal behavior to reflect positively on how peers or the public perceive
    us
  when_to_use:
  - Forums, marketplaces, review sites
  - Any platform with user interactions
  solution: |
    Show user reputation scores based on community feedback.
    Tie privileges to reputation level. Make reputation visible on profiles.
    Allow building reputation through positive contributions.
  rationale: >-
    Allow users to build reputation by contributing content, sharing information, connecting people, and
    performing activities that are in line with the purpose of your community. Consider ways to draw in
    data from external social identities built up on other sites. Reputation is a powerful determinant
    in influencing decisions and behaviors. It acts as a heuristic or shortcut for individuals when making
    choices, especially in situations with limited information or time. A strong reputation can instill
    trust, reduce perceived risks, and enhance the perceived value of a product or service. Conversely,
    a negative reputation can deter potential users or customers. Given its influential nature, reputation
    management has become a focal point for businesses and individuals alike.
  discussion: |-
    When users perceive an entity as reputable, they are more likely to trust and engage with it. However, this power can be misused in several ways: Fabricated testimonials and reviews. One of the most straightforward ways to artificially boost reputation is by creating fake reviews or testimonials. This not only misleads users but also undermines genuine feedback mechanisms. Selective display of positive feedback. By cherry-picking and only showcasing the most positive reviews or feedback, companies can present a skewed representation of their reputation, leaving out potentially crucial negative feedback. Exploitation of Halo Effect. If a company has built a strong reputation in one domain, it might be tempted to exploit this to gain undue advantage in another domain, even if their expertise doesn’t extend there. Reputation laundering. Some platforms might amplify the voices of entities with questionable histories, allowing them to “clean” their image without addressing the root causes of their tarnished reputations. While leveraging a good reputation in one domain is beneficial, it’s essential to ensure that claims in new domains are backed by genuine expertise and not just the halo of the existing reputation. Make users aware of the mechanisms behind reputation-building on your platform. An informed user can better discern the genuineness of the reputation being presented.
    Sources 1 Jebb, Richard C. (trans.) (1909). The Rhetoric of Aristotle. Cambridge: University Press. 2 Manzoor, et. al. (2020), Influence via Ethos: On the Persuasive Power of Reputation in Deliberation Online, Cornell Universitiy, arXiv:2006.00707 3 “Ethos, Pathos, Logos: 3 Pillars of Public Speaking and Persuasion ":https://virtualspeech.com/blog/ethos-pathos-logos-public-speaking-persuasion by Gini Bequiri 4 Designing your reputation system – a presentation by Bryce Glass from Yahoo on the competitive spectrum. 5 MacInnes, I., Li, Y., & Yurcik, W. (2005). Reputation and Dispute in eBay Transactions. International Journal of Electronic Commerce, 10, 27-54. 6 B. Jiao, R., Przepiorka, W., & Buskens, V. (2021). Reputation effects in peer-to-peer online markets: A meta-analysis∗. Social science research, 95, 102522. 7 Standifird, S. S. (2001). Reputation and e-commerce: eBay auctions and the asymmetrical impact of positive and negative ratings. Journal of Management, 27, 279-295. 8 Cialdini, R. B. (2001). Influence: Science and practice (4th ed.). Boston: Allyn & Bacon. Tversky, A., & Kahneman, D. (1974). Judgment under uncertainty: Heuristics and biases. Science, 185(4157), 1124-1131. 9 Kahneman, D., & Tversky, A. (1979). Prospect theory: An analysis of decision under risk. Econometrica, 47(2), 263-292. 10 Reputation at Learning Loop
  avoid_when:
  - Reputation system can be easily gamed
  related_patterns: [leaderboard, CollectibleAchievements, Authority, Social-proof]
  tags: [persuasion, social, accountability]
  source_url: https://ui-patterns.com/patterns/reputation
  votes:
    up: 13
    down: 7
- id: halo-effect
  name: Halo Effect
  problem: One positive trait influences perception of everything else about a product or person.
  source_problem: We let impressions created in one area influence opinions in another area
  when_to_use:
  - First impressions, landing pages
  - Product quality perception, brand building
  solution: |
    Invest in the first thing users see — it colors everything else.
    Beautiful design, fast load time, polished onboarding.
    Associate with respected brands or people.
  rationale: >-
    We tend to like (or dislike) everything about a person – including things we have not observed. We
    strive toward maintaining a simple and coherent view of the world and suppress ambiguity. We interpret
    things in a way that makes them coherent with the context. The halo (positive) and horn (negative)
    effects increases the weight of first impressions – sometimes to the point that subsequent information
    is mostly wasted. Consumers are willing to pay more money for a brand they already know and trust.
    Subsequent new products by a brand will benefit from the brand’s halo effect.
  discussion: |-
    The halo effect was originally identified in 1907 by the American psychologist Frederick L. Wells (1884-1964), but only officially recognized and coined as a term by psychologist Edward Thorndike in 1920. Thorndike originally coined the term referring only to people; however, its use has been greatly expanded especially in the area of brand marketing. The opposite of the halo effect is the horn effect, named for the horns of the devil. When consumers have an unfavorable experience, they correlate that negative experience with everything associated with a brand.
    Sources 1 Thorndike, E.L. (1920). “A constant error in psychological ratings”. Journal of Applied Psychology. 4 (1): 25–29. doi:10.1037/h0071663 2 Halo effect by Mitchell Grant 3 The Halo Effect, explained 4 The Halo Effect in Consumer Perception: Why Small Details Can Make a Big Difference by Itamar Shatz 5 Halo Effect at Learning Loop
  avoid_when:
  - Quality doesn't back up the first impression
  related_patterns: [Value-attribution, Authority, Liking]
  tags: [persuasion, social, perception]
