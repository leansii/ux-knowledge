- id: ImageZoom
  name: Image Zoom
  problem: Users need to see fine details in an image that aren't visible at normal size.
  source_problem: The user wants to zoom in on an image to view the details in a higher image resolution.
  when_to_use:
  - Product images (fabric texture, fine print)
  - Maps, diagrams, artwork
  solution: |
    Hover to show a magnified area. Or click to open a zoomable full-screen view.
    Support pinch-to-zoom on touch devices.
    Indicate zoom is available (magnifying glass cursor).
  rationale: |-
    Allowing the user to zoom in on an image permits exploration of the image’s details. Depending on the zoom factor, showing the entire high resolution image from the beginning will not provide the user with an overview of the entire image thus removing the context of the details viewed. By providing a zoom functionality, a user can zoom into just one area of the image that he or she is interested in. In this way, the user is not bothered by the other details.
    This article has been commented 1 time.
  avoid_when:
  - Images don't contain meaningful detail at higher resolution
  related_patterns: [Gallery, Thumbnail]
