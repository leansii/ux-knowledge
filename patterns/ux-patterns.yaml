- id: Coupon
  name: Coupon
  problem: Users need incentives to complete a purchase or try a product.
  source_problem: You want to attract users to purchase products using an incentive.
  when_to_use: [E-commerce checkout, First-time user promotions, Re-engagement campaigns]
  solution: |
    Provide a coupon code field at checkout. Auto-apply if user arrived via promo link.
    Show the discount amount clearly. Display savings on order summary.
  rationale: |-
    Using coupons codes to attract customers to buy a merchants product builds on the customer’s assumption that the offer is short lived, why action must be taken soon in order not to loose the psychological gain created by receiving the coupon code. As losses are mentally valued with greater weight than gains, the customer will be aversive towards losing the gain given and act on it while time is. Check out the Value Function as proposed by Tversky and Kahneman, 1991: Loss Aversion in Riskless Choice. Another benefit of Coupon codes its traceability. Marketeers can branch out different codes to find out which campaign generated the most leads.
    Sources 1 14 Ways to Use Offers, Coupons, Discounts and Deals to Drive Revenue and Customer Loyalty at the Shopify blog.
    This article has been commented 2 times.
  avoid_when:
  - Coupons would devalue the brand
  - Margins don't support discounting
  related_patterns: [ShoppingCart, Scarcity, Limited-duration]
  tags: [commerce, pricing, incentive]
  source_url: https://ui-patterns.com/patterns/Coupon
