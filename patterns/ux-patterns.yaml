- id: Loss-aversion
  name: Loss Aversion
  problem: Users are more motivated by avoiding losses than achieving equivalent gains.
  source_problem: Our fear of losing motivates us more than the prospect of gaining something of equal
    value
  when_to_use: [Trial expiration warnings, Feature removal notifications, Cart abandonment recovery]
  solution: |
    Frame messages around what users will lose, not what they'll gain.
    "Don't lose your saved progress" > "Sign up to save progress."
    Show what will be lost if they don't act.
  rationale: >-
    The displeasure of losses makes us go to greater lengths to avoid them rather than take risks to obtain
    gains. Frame gains and losses to make some options seem more desirable than others. What is lost by
    leaving your service? Offer perceived value that can potentially be lost on closing an account. When
    the outcomes of a decision are uncertain, emotions play a role in guiding it. Emotions are the tools
    we use to simplify the world into heuristics, or general rules of thumb, as they allow our brains
    to take shortcuts and approximate rational thinking. Fear and anxiety detect risky choices, why we
    need emotions to make rational decisions. In some cases however, our emotions guide us beyond what
    is rational. One such situation is our divergent assessment of risk regarding respectively gains and
    losses. Kahneman and Tversky found that we are risk aversive in decisions regarding gains and risk
    seeking in decisions regarding losses; we have a tendency to strongly prefer avoiding losses to acquiring
    gains. This means that our willingness to make a decision does not have anything to do with how much
    we already have (i.e. our state of wealth), but rather if we are to gain or loose. So even if we have
    a million dollars in our bank account, we will still be as aversive towards loosing $20 as we would
    if we had no money. Example: Discounts and trial periods Preferring avoiding losses to acquiring gains
    is why discounts and trial periods work. We buy a product with a discount in fear of loosing the opportunity
    to buy the product at an as low price again. Furthermore, we are more likely to engage in free trial
    periods than paying up front, as we tell ourselves that a free product does not cost us anything.
    The truth however is that we pay with our time and effort in getting used and accustomed to the product
    so that when the trial period is over the cost of continuing is framed as a loss instead of a gain;
    we will loose all the time and effort invested in the product if we don’t continue.
  discussion: "This phenomenon is referred to as sunk cost dilemma in economics. Sunk costs are costs\
    \ that have already been incurred and cannot be recovered. For this reason, we shall keep from letting\
    \ sunk costs influence a decision, as doing so would not be rationally assessing a decision exclusively\
    \ on its own merits. In a rational world, costs already incurred have nothing to do with money to\
    \ be spent in the future. Sunk costs greatly affect our decisions, as we as humans are inherently\
    \ loss aversive. Being risk and loss aversive is letting sunk costs matter. We do not like â€œwastingâ€\x9D\
    \ resources. Example: Lazy registration The Lazy Registration pattern utilizes loss aversion in that\
    \ it lets the user invest time and effort into a product so that when time has come to quit, the user\
    \ is aversive towards loosing what has been built. The time and effort spent is sunk cost – but as\
    \ we feel awkward about letting it go to waste, we register for an account in order to be able to\
    \ save our work. The assessed value of registering for an account become larger than the cost of giving\
    \ away private information and opening yet another account once time and effort has been put into\
    \ the product, as it is now is valued as a loss and not a gain. Background Amos Tversky and Daniel\
    \ Kahneman first identified Loss aversion in 1979, but more notably described in 1992 when the two\
    \ researchers outlined that people react differently to negative and positive changes. More specifically,\
    \ that losses are twice as powerful compared to their equivalent gains, a foundational concept of\
    \ prospect theory. Prospect theory describes how individuals choose between options and how they estimate\
    \ the perceived likelihood of different options.\nSources 1 Choices, Values, and Frames edited by\
    \ Daniel Kahneman & Amos Tversky, Cambridge University Press, 2000 2 Mental Accounting Matters, Richard\
    \ H. Thaler, 1999 from Choices, Values, and Frames edited by Daniel Kahneman & Amos Tversky, Cambridge\
    \ University Press, 2000 3 Understanding persuasion 4 Why do we buy insurance? 5 Loss Aversion at\
    \ Learning Loop"
  avoid_when:
  - Creating undue anxiety or dark patterns
  related_patterns: [Scarcity, framing, Endowment-effect, sunk-cost-effect]
  tags: [persuasion, cognition, motivation]
  source_url: https://ui-patterns.com/patterns/Loss-aversion
  votes:
    up: 12
    down: 77
- id: sunk-cost-effect
  name: Sunk Cost Effect
  problem: Users are more likely to continue when they've already invested time or money.
  source_problem: We are hesitant to pull out of something we have put effort into
  when_to_use:
  - Showing accumulated progress or history
  - Subscription retention
  solution: |
    Remind users of their existing investment: "You've completed 80% of the course."
    Show accumulated achievements, saved data, or streak history.
    Make the cost of leaving feel real.
  rationale: |-
    Why are we likely to continue with an investment even if it would be rational to give it up? One explanation is our loss aversion. The fact that the impact of losses feels much worse to us than the impact of gains – we are much more likely to avoid losses than seek out wins. In this perspective, we might feel that our past investment will be ‘lost’ if we don’t follow through on the decision to continue investing. In this way we end up making a decision based on fear of loosing what we have already spent rather than consider the actual benefits that would be gained if we did not continue our commitment and proceeded with an alternative option.
    Sources Richard Thaler first introduced the Sunk Cost Fallacy, suggesting that when we pay for the right to use a product we will increaase the rate with which we will use it. Hal Arkes and Catherine Blumer expanded the concept beyond money, defining the fallacy as our tendency to continue an endeavor once aan investment in money, effort, or time has been made. 1 Thaler, R. (1980). Toward a positive theory of consumer choice. Journal of Economic Behavior & Organization 1(1): 39–60. 2 Arkes, Hal R., and Catherine Blumer (1985). The psychology of sunk cost, Organizational Behavior and Human Decision Processes, Vol. 35, No. 5, December 1985, 124-140. 3 The sunk cost fallacy explained at Decision Lab 4 Sunk Cost Bias: 7 Ways to Use It to Boost Your Conversions 5 Sunk cost at Wikipedia.org 6 Sunk Cost Effect at Coglode 7 The Sunk Cost Effect at Learning Loop
  avoid_when:
  - Trapping users who genuinely want to leave
  related_patterns: [Loss-aversion, CompletenessMeter, investment-loops]
  tags: [persuasion, cognition, retention]
  source_url: https://ui-patterns.com/patterns/sunk-cost-effect
  votes:
    up: 7
    down: 5
- id: Endowment-effect
  name: Endowment Effect
  problem: Users value things more once they feel ownership over them.
  source_problem: We place greater value on objects we own over objects we do not, especially if sentimental
    value has been placed in them
  when_to_use:
  - Free trials that give full access
  - '"Your" dashboard, "Your" playlist'
  solution: |
    Use possessive language ("your workspace", "your collection").
    Give users something to lose (full trial access vs. limited).
    Let users customize and invest in their space before asking to pay.
  rationale: "When we get something, we adjust to our level of ownership, which then becomes the baseline\
    \ by which we judge future gains and losses. Possession feels like ownership: consider giving away\
    \ free trials or make users invest time in your service. In a university study, students were parted\
    \ into two equally sized groups. One group was given mugs (“seller”) and the other (“chooser”) nothing.\
    \ When asked, the sellers in average wanted $7.00 for the mug, whereas the choosers were only willing\
    \ to pay $3.50. The mug was evaluated as a gain by the choosers and as a loss by the sellers. As users\
    \ sign up, start build their account, and making it theirs, the endowment effect comes into play.\
    \ Amazon does it well by letting its users make wish lists, make gift organizers, rate and recommend\
    \ products, make lists, award users with â€œ#1 reviewerâ€\x9D badges, and more. As users interact\
    \ with Amazon and gain ownership over the Amazon website, the endowment effect makes them place higher\
    \ value on conducting transactions on amazon.com vs barnesandnoble.com. Another successful website\
    \ to use the endowment effect to retain users is the online radio station: last.fm. When users listen\
    \ to music at last.fm, they can choose to “love” what they hear and thereby indicate to last.fm that\
    \ they are interested in hearing something similar again. Last.fm remembers what music you love and\
    \ constructs a metric of your music taste that it uses to deliver music that caters to your preference.\
    \ The website has managed to let the user take ownership in the site with the music profile build\
    \ up with consistent use. The has resulted in many preferring to listen to music over the Internet\
    \ via last.fm than over their iPod or through the CD collection."
  discussion: |-
    The difference between our Willingness to Pay and our Willingness to Accept was first noted in the 1960s, although the term Endowment Effect was coined by Richard Thaler in 1980 in reference to how we as humans tend to under-weigh the opportunity costs and inertia as things we own (endow) become more highly valued than goods we do not.
    Sources 1 Thaler, Richard (1980). “Toward a positive theory of consumer choice”. Journal of Economic Behavior & Organization. 1 (1): 39–60 2 Coombs, C.H.; Bezembinder, T.G.; Goode, F.M. (1967). “Testing expectation theories of decision making without measuring utility or subjective probability”. Journal of Mathematical Psychology. 4 (1): 72–103 3 Kahneman, Knetsch & Thaler (2009). Experimental Tests of the Endowment Effect and the Coase Theorem. 4 The Endowment Effect at Learning Loop
  avoid_when:
  - Users haven't had enough time to feel ownership
  related_patterns: [Loss-aversion, ikea-effect, Statusquo-bias]
  tags: [persuasion, cognition, ownership]
  source_url: https://ui-patterns.com/patterns/Endowment-effect
  votes:
    up: 30
    down: 11
- id: Negativity-bias
  name: Negativity Bias
  problem: Negative experiences have disproportionate impact — one bad moment outweighs many good ones.
  source_problem: >-
    We have a tendency to pay more attention and give more weight to negative than positive experiences
    or other kinds of information.
  when_to_use: [Error handling and recovery, Customer support interactions]
  solution: |
    Prioritize eliminating negative experiences over adding positive ones.
    Handle errors gracefully. Apologize and compensate for failures.
    Ensure the worst-case experience is still acceptable.
  rationale: >-
    We pay more attention and give more weight to negative feedback than positive. As we’ve seen with
    loss aversion, we work much harder to avoid losing $100 than we will work to gain the same amount
    – and painful experiences (loss) are much more memorable than pleasurable ones (gain). But whereas
    loss aversion refers to negative values, the negativity bias refers to negative information1. Customers
    buy less as a reaction to bad news, but not more as a reaction to good news. When of equal intensity,
    things of a more negative nature (unpleasant thoughts, emotions, or social interactions) have a greater
    effect on a person’s psychological state than neutral or positive things. As humans, we give priority
    to bad news why only few bad moments can ruin a perfect reputation.
  discussion: |-
    The negativity bias is also the reason political smear campaigns outpull positive ones. Nastiness just makes a bigger impact on our brains. Your brain is simply built with a greater sensitivity to unpleasant news2.
    Sources The Negativity Bias has been researched and end explained by several branches of academia, including research on social judgements and impression formation, behavioral economics and loss aversion, and social comparison theory. 1 Negativity bias at wikipedia.org 2 Our brain’s negative bias at psychologytoday.com 3 Why is the news always so depressing? The Negativity Bias, explained. at The Decision Lab 4 Baumeister, Bratslavsky, Finkenauer & Vohs (2001). Bad is stronger than good. Review of General Psychology. 5 (4): 323–370. 5 Rozin, Paul; Royzman, Edward B. (2001). Negativity bias, negativity dominance, and contagion. Personality and Social Psychology Review. 5 (4): 296–320 6 Festinger, Schacter & Back (1950). Social pressures in informal groups: A study of a housing community. Palo Alto, CA: Stanford University Press. 7 Negativity Bias at Learning Loop
  avoid_when:
  - Over-investing in edge cases at the expense of the core experience
  related_patterns: [Peakend-rule, undo, InputFeedback]
  tags: [persuasion, cognition, risk]
  source_url: https://ui-patterns.com/patterns/Negativity-bias
  votes:
    up: 38
    down: 30
- id: Illusion-of-control
  name: Illusion of Control
  problem: Users are more engaged and satisfied when they feel they influence outcomes.
  source_problem: We have a tendency to believe that outcomes can be controlled, or at least influenced,
    when they clearly cannot.
  when_to_use:
  - Customization options, even if cosmetic
  - Selection processes where any choice works
  solution: |
    Give users choices and controls, even when the outcome is similar.
    Let them feel they're driving the experience.
    Choosing your own avatar, picking a theme, selecting notification preferences.
  rationale: |-
    As humans, we have a desire to believe that we are in control and thus have a tendency to believe that outcomes can be controlled, or at least influenced, when they clearly cannot. We believe in the illusion that we can control factors outside our reach; that actions we take to influence them are directly linked to how things turn out. If we tell ourselves that we are not being loved as we are not good enough, we believe we can get the love we want by striving for being good enough. We tell ourselves that things will turn out for the better if we live a good life and worship our god(s). We tell ourselves that somebody is not attracted to us because we are overweight, have weird teeth, or have too little breasts, why manipulating these factors will change the opinion of others. We tell ourselves that we are in control over facebook’s privacy settings although they are too confusing to let us actually be in control. We tell ourselves that the reason we did not get a certain job was because we are not smart enough why we study harder. The illusion of control can act as a motivational factor for conducting certain behavior that is either unsafe or that we believe will bring us closer to a goal. Optimistic self-appraisals of our capabilities that are not completely apart from what is possible can be advantageous. On the other side can judgments far fetched from the truth turn out to be self-limiting. The illusion of control gives us a sense of power and in turn happiness. When we believe we are in control, we do not have to rationally analyze facts in order to make a decision. The illusion of control drives us forward and can help escalate commitment. Illusory beliefs about control help us strive for reaching goals, but are not contributing to sound rational decision-making. Instead they can cause insensitivity to feedback, hinder learning, and make us more risk seeking as subjective risk is reduced by the illusion of control1.
    Sources 1 Illusion of control at wikipedia.org.
  avoid_when:
  - The illusion would be deceptive about important outcomes
  related_patterns: [autonomy, settings, Self-expression]
  tags: [persuasion, cognition, engagement]
  source_url: https://ui-patterns.com/patterns/Illusion-of-control
