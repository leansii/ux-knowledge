- id: Storytelling
  name: Storytelling
  problem: Users disengage from purely functional interfaces without emotional connection.
  source_problem: Use the narrative qualities of storytelling to let the user engage in a perspective
  when_to_use:
  - Onboarding, marketing, brand building
  - Learning experiences, games
  solution: |
    Frame the user's journey as a story with a beginning, challenges, and resolution.
    Use characters, narrative arcs, and emotional hooks.
    Make the user the protagonist.
  rationale: >-
    Our understanding of the world is shaped by the stories we’re told. Consequently, we filter our decisions
    through stories, whether they are real or imagined. Stories can be explicit and simple narratives
    or implied in the words you use. The most powerful stories are well-crafted visions that give significance
    to mundane tasks. Stories excite. The most powerful stories are well-crafted visions that give significance
    to mundane tasks.
  discussion: |-
    Some of the best theory on what constitutes a good story telling was laid down in 335 BC by Aristotle. Aristotle’s Poetics In Poetics (335 BC), Aristotle outlined 6 elements of drama that he believed a good story should include: Plot: What are users trying to achieve or overcome? The plot, or mythos, as Aristote called it, is concerned around about a person’s change in fortune (either from good to bad, or from bad to good), and is usually about overcoming some kind of obstacle or challenge. In relation to design the story plot is how we frame the struggles of our users and how we try to improve aspects of their lives. Consider what your users (character(s)) are doing? What are they trying to accomplish? Character: Who are your users? Character, or Ethos in old greek, is concerned around who your users are. Not just demographically, but who they are as people. What are their needs and desires? What are their traits, their personalities? What are their backgrounds, needs, aspirations, and emotions? How can users build up character, show off their merits, and stand as somebody to trust. Or how can users gain an empathic understanding of you and your product? Go beyond demographic data and appearances – for a fully fleshed out character, use insights into their needs, motivations, and emotions. Theme: How are obstacles reflected? The theme (called “Dianoia” by Aristotle) defines the overarching obstacle that needs to be crossed or the end goal of a journey. The theme helps connect the different elements of your product into a coherent narrative and universe. It will keep users engage and focused and help them understand the purpose of each element or feature of your product and how to interact through affordances. Language: In what tone do users interact? The dialogue or diction (called “lexis” by Aristotle) sets the tone. The tone with which you communicate with users has much to say in how they act and communicate either back or to peers. Consider whether your tone of voice should be formal or informal, serious or humoristic, superior or condescending, or elaborate or to the point? How much text is appropriate? What do you not say? Is anything implied in your copywriting? Melody and chorus: Is your user experience pleasant and predictable? Use design patterns to remove friction and avoid forcing users use cognitive energy on processing your user interface. Using design patterns, your experience will feel familiar and well known and act as the basic underlying melody of your experience. The chorus is reoccurring element that unites the plot. It should feel familiar and by that provide pleasure. The chorus should be an integral part of the whole, and share in the action. The chorus helps stir emotion and motivate us to find a solution Spectacle: If not in place, something will feel wrong If the play has “beautiful” costumes and “bad” acting and “bad” story, there is “something wrong” with it. Even though that “beauty” may save the play it is “not a nice thing”. The spectacle (opsis) should be appropriate. The decor and how the experience is presented should match the setting users expect from the narrative. You should of course make your design outstanding so users will remember it, but equally important is that the experience and context matches it. This however, doesn’t mean that you should rid your experience from delight. Consider whether plot twists and unexpected behavior should be part of your storyline. Can you create a “spectacle” that users will remember, and possible generate discussions and ideas.
    Sources Storytelling is the original method of passing knowledge down generations, and remains a compelling method for richly communicating knowledge. The most seminal work on storytelling is Poetics by Aristotle, however Joseph Campbell added to the theory in the 1960s, influencing film makers like Stanley Kubrick and George Lucas. 1 Aristotle (335 BC), Poetics, The Basic Works of Aristotle. Ed. Richard McKeon Modern Library, Translation by Ingrid Bywater in 2001, pp. 1453–87 2 Joseph Campbell (1949), The Hero with a Thousand Faces, Pantheon Books 3 Mark Twain (1897), How to Tell a Story and Other Essays 4 Aristotle on Storytelling 5 Poetics on Wikipedia.org 6 Design Patterns for data driven storytelling 7 Storytelling at Learning Loop
  avoid_when:
  - Users want efficiency, not entertainment
  related_patterns: [Roleplaying, Guided-tour, Conceptual-metaphor]
  tags: [gamification, design, narrative]
  source_url: https://ui-patterns.com/patterns/Storytelling
  votes:
    up: 38
    down: 56
- id: Intentional-gaps
  name: Intentional Gaps
  problem: Continuous access leads to saturation and declining engagement over time.
  source_problem: Create intentional gaps that users can't help but try to fill
  when_to_use:
  - Content drip (one lesson per day)
  - Game energy systems
  solution: |
    Create natural breaks that make users anticipate the next interaction.
    Release content on a schedule. Use "come back tomorrow" mechanics.
    Build anticipation through previews of what's next.
  rationale: |-
    The feeling of seeing something out of order or incomplete creates a feeling of stress that we want to alleviate. This in turn motivates us to either remove or reduce the discomfort by filling in the missing gaps or fixing what is wrong. The more obvious and easy it is for users to complete the intentional gap, the more likely users are to engage.
    Sources Creating deliberate intentional gaps is a common technique used in persuasive design. Its effect can be explained by several schools, including cognitive dissonance (urge to alleviate the discomfort of dissonance), the Zeigarnik Effect (we remember better that which is unfinished or incomplete), and Self-actualization theory (our drive to complete ourselves). 1 Festinger, L. (1957), A Theoory of Cognitive Dissonance, Peterson & Company. 2 Zeigarnik, B (1927), Über das Behalten von erledigten und unerledigten Handlungen, Psychologische Forschung 3 Intentional Gaps at Learning Loop
  avoid_when:
  - Users need immediate access to complete time-sensitive tasks
  related_patterns: [periodic-events, appointment-dynamic, hedonic-adaptation]
  tags: [gamification, design, retention]
  source_url: https://ui-patterns.com/patterns/Intentional-gaps
