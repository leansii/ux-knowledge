- id: appointment-dynamic
  name: Appointment Dynamic
  problem: Users don't have a reason to return at specific times.
  source_problem: Force users to return at a set time to take a specific action and claim a reward
  when_to_use:
  - Daily deals, daily challenges
  - Check-in rewards, limited-time events
  solution: |
    Offer rewards available only at specific times or intervals.
    "Daily bonus available!" with a countdown to next availability.
    Create habits through consistent scheduling.
  rationale: |-
    The appointment dynamic provides reason and immediacy for the user to come back. Making the action required- and the window to take the action explicit can help create a sense of urgency as it becomes clear when the reward will be harvested or missed. Appointment dynamics are often tied to reward schedules that motivate frequent action.
    Sources The Appointment Dynamic concept is not rooted in academic research but discovered in the commercial space as a persuasive recipe combining multiple persuasive ingredients into one powerful mixture. Seth Priebatsch proposed the recipe in his “SCVNGR Secret Game Mechanics Playdeck”. 1 SCVNGR’s Secret Game Mechanics Playdeck at TechCrunch 2 Selecting Persuasive Strategies and Game Design Elements for Encouraging Energy Saving Behavior 3 Welcome to the Decade of Games by Seth Priebatsch at Havard Business Review 4 Use Game Mechanics to Build Customer Loyalty 5 Gamification Mechanic Monday: appointment dynamics
  avoid_when:
  - Time-gating creates frustration rather than anticipation
  related_patterns: [periodic-events, Intentional-gaps, Limited-duration]
  tags: [gamification, rewards, retention]
  source_url: https://ui-patterns.com/patterns/appointment-dynamic
  votes:
    up: 3
    down: 1
- id: Prolonged-play
  name: Prolonged Play
  problem: Users have short sessions and don't engage deeply enough.
  source_problem: Reward users by prolonging their game time to allow for higher scores and measures of
    success
  when_to_use:
  - Streaming services, games
  - Content platforms where longer sessions = more value
  solution: |
    Reward longer sessions: "Watch 3 episodes for a bonus."
    Auto-play next content. Show streaks for continuous activity.
    Make it easy to continue (remove friction between items).
  rationale: |-
    For products based on resources, such as time, storage, and seats, topping up those resources can be an effective reward to motivate users toward action. Prolonged play is desirable as it allows for a higher measure of success, but it also taps into our natural human drive for survival.
    Sources Motivating users with the promise of extra core resources, is a technique used in gamification to get users to endeavour in actions they hadn’t intended. It is a type of reward and lends itself to classic behaviorism as explained by B. F: Skinner. 1 Jesse Schell, “The Art of Game Design – A Book of Lenses”, Carnegie Mellon University 2 Skinner, B. F. (1938). The Behavior of Organisms: An Experimental Analysis, New York: Appleton-Century-Crofts 3 Prolonged Play at Learning Loop
  avoid_when:
  - Encouraging excessive use would be harmful
  related_patterns: [Carousel, ContinuousScrolling, Variable-rewards]
  tags: [gamification, rewards, engagement]
  source_url: https://ui-patterns.com/patterns/Prolonged-play
  votes:
    up: 0
