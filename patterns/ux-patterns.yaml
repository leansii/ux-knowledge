- id: noble-edge-effect
  name: Noble Edge Effect
  problem: Users prefer brands that stand for something beyond profit.
  source_problem: Products of socially responsible companies are seen as superior
  when_to_use:
  - Brand positioning, about pages
  - Cause-related marketing
  solution: |
    Authentically align with a social cause. Donate a portion of profits.
    Be transparent about impact. "1% for the planet" or "Buy one, give one."
    The cause must be genuine — users detect performative activism.
  rationale: |-
    As companies show genuine care and social goodwill, it spills over to improved consumer perception of the company’s products. When consumers are unfamiliar in a market, companies with a noble edge attract even more consumer choice. Products are perceived as better and of higher quality only when the social goodwill of their companies are motivated by genuine kindness over self-interest
    Sources Although not using the term, Chernev & Blair provided a detailed description of how the Halo Effect can give rise to the Noble Edge Effect in their 2015 paper on chow ompanies are benefitting positively from doing social good. 1 Chernev, Alexander and Sean Blair (2015). Doing Well by Doing Good: The Benevolent Halo of Social Goodwill. Journal of Consumer Research 2 Patagonia: a values-led business from the start by Felicity Carus in 2012 3 The Noble Edge Effect at Coglode.com 4 What Entrepreneurs Can Learn From The Philanthropic Struggles Of TOMS Shoes by Mike Montgomery at Forbes 5 The Noble Edge Effect at Learning Loop
  avoid_when:
  - Cause alignment is superficial or contradicted by company practices
  related_patterns: [Authority, Liking, Social-proof]
  tags: [persuasion, social, values]
  source_url: https://ui-patterns.com/patterns/noble-edge-effect
