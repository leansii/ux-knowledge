- id: CopyBox
  name: Copy Box
  problem: Users need to copy text, code, or URLs but selecting text manually is error-prone.
  source_problem: Users need to easily view and copy preformatted text.
  when_to_use:
  - API keys, embed codes, share links
  - Code snippets, terminal commands
  solution: |
    Display the content in a distinct box with a "Copy" button.
    Show confirmation on click ("Copied!"). Auto-select all text on click.
  rationale: |-
    If you just paste ascii formatted text into a HTML file, the user’s browser will format the text and display it all in one line and regardless of how the code looks like in the HTML file as special tags are used in HTML to define line breaks (<br>).
    This article has been commented 1 time.
  avoid_when:
  - Content is dynamic and copying a snapshot would be misleading
