- id: Levels
  name: Levels
  problem: Users need a sense of progression and growing mastery.
  source_problem: Use levels to communicate progress and gauge users’ personal development
  when_to_use:
  - Learning platforms, loyalty programs
  - Community engagement, professional tools
  solution: |
    Define clear levels with names and visual indicators (Level 1: Beginner).
    Show progress toward next level. Unlock perks at each level.
    Make early levels quick to achieve, later levels require more effort.
  rationale: |-
    As users progress, so does their skill level, requiring increasingly more difficult challenges. Consider how you can partition your system into levels of increasing difficulty, powers, and features in order to keep users engaged, away from boredom, and provided with a sense of accomplishment.
    Sources Adjusting challenges exposed to users to their skill level, is a technique used in both video games and user experience design. The underlying reasoning can best be explained by Flow theory by Mihaly Csikszentmihalyi. 1 Schell, J (2008). The Art of Game Design – A Book of Lenses. Carnegie Mellon University. 2 Csikszentmihalyi, M. (1990), Flow: The Psychology of Optimal Experience, Journal of Leisure Research, 24(1), pp. 93–94 3 Levels design pattern at Learning Loop
  avoid_when:
  - Levels feel patronizing for the audience
