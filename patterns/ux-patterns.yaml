- id: ikea-effect
  name: IKEA Effect
  problem: Users don't value things they received for free as much as things they helped create.
  source_problem: We place a disproportionately high value on products we helped create
  when_to_use:
  - Onboarding with customization steps
  - User-generated content, profile building
  solution: |
    Let users invest effort in customizing their experience early on.
    Building their own dashboard, choosing preferences, creating content.
    This investment increases perceived value and retention.
  rationale: |-
    Allow customers to be involved in the creation of your product to establish a powerful emotional connection between the two. We will pay more for something we have put work into than if we bought it ready-made. Customers are willing to pay a premium for products they have customized. The effect is not simply due to the amount of time spent on the creations, as dismantling a previously built product will make the effect disappear.
    Sources The IKEA Effect can be explained by positive feelings of competence from completing a task, a focus on the product’s positive attributes3, a psychological sense of ownership4, and the relationship between effort & liking, effort & valuation, and between our relations & our self-concept2. The effect originated in the field of behavioral economics, but can similarly be explained by social psychology and self-determination theory. 1 Kruger, J., Wirtz, D., Van Boven, L., & Altermatt, T. W. (2004). The effort heuristic. Journal of Experimental Social Psychology, 40(1), 91-98. 2 Marsh, L. E., Kanngiesser, P., & Hood, B. (2018). When and how does labour lead to love? The ontogeny and mechanisms of the IKEA effect. Cognition, 170, 245-253. 3 Norton, M. I., Mochon, D., & Ariely, D. (2012). The IKEA effect: When labor leads to love. Journal of Consumer Psychology, 22, 453-460. 4 Sarstedt, M., Neubert, D., & Barth, K. (2017). The IKEA Effect. A conceptual replication. Journal of Marketing Behavior, 2(4), 307-312. 5 The IKEA Effect at Learning Loop
  avoid_when:
