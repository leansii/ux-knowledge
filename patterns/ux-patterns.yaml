- id: Trigger
  name: Trigger
  problem: Users forget to take action even when motivated, because they lack a prompt.
  source_problem: Place cues on our regular paths to remind and motivate us to take action
  when_to_use:
  - Habit formation, task reminders
  - Re-engagement, action prompts
  solution: |
    Send a prompt (notification, email, in-app message) at the right time.
    Make the desired action easy to take from the trigger itself.
    Combine with motivation and ability — trigger alone isn't enough.
  rationale: |-
    Without an appropriate prompt, behavior will not occur – even if we are both motivatated and able. Timing is key. When we are ready to perform a behavior, a well-timed trigger is a welcome distraction. A trigger is successfull when we notice it (so we can act on it), when we associate it with the target behavior, and when it comes at a time where we are both motivated and able to perform the behavior. Triggers can be external (an alarm sounding) or in form of an internal cue (walking through the kitchen triggers opening the fridge). Triggers cue the user to take action in the context they are in. Triggers might be notifications, tweets, emails, text messages, links, or other distractions. Offline triggers should also be considered. Triggers can be set (alarms), brought home (printed reminder sheet), or follow an action (ask someone a question).
    Sources Having established the Captology Lab at Stanford (renamed to Behavior Design Lab), BJ Fogg was among the first to research persuasive technologies. His Fogg Behavior Model has become a foundational pillar of persuasive design. It states that three elements must converge at the same moment for a behavior to occur: Motivation, Ability, and a Prompt (called Trigger in the first edition of the model). B = MAP. 1 Fogg Behavior Model & Prompts at behaviormodel.org 2 Fogg, BJ (2009). A behavior model for persuasive design, Persuasive ’09: Proceedings of the 4th International Conference on Persuasive Technology. Pages 1–7 3 The Trigger design technique at Learning Loop
  avoid_when:
  - Users have explicitly opted out of reminders
  related_patterns: [Kairos, notifications, Feedback-loops]
  tags: [persuasion, feedback, activation]
  source_url: https://ui-patterns.com/patterns/Trigger
  votes:
    up: 19
    down: 26
- id: Simulation
  name: Simulation
  problem: Users can't predict the outcome of their choices, leading to decision paralysis.
  source_problem: Give people first-hand insight into how inputs affect an output
  when_to_use:
  - Financial calculators, configuration previews
  - '"What if" scenarios, plan comparisons'
  solution: |
    Let users simulate outcomes before committing.
    "If you save $200/month, you'll have $12,000 in 5 years."
    Interactive sliders, before/after comparisons.
  rationale: |-
    Simulation enables users to observe the link between cause and effect in real time. The rules used to simulate outcomes are based on assumptions and as such have persuasive power. Simulation can serve as a great learning tool, as it enables users to try out behavior they wouldn’t dare in the real world.
    Sources Having established the Captology Lab at Stanford (renamed to Behavior Design Lab), BJ Fogg was among the first to research persuasive technologies. Although somewhat ignored his book on Persuasion kicked off a new field of research and continues to grow in importance. Computer simulation was among the core persuasive strategies BJ Fogg discovered. 1 B. J. Fogg (2002). Persuasive technology: using computers to change what we think and do. Ubiquity, Volume 2002, Issue December 2 Fogg, BJ, et. al. (2007). Motivating, Influencing, and Persuading Users, Human-Computer Interaction Fundamentals (pp.133-146). 3 The Simulation design technique at Learning Loop
  avoid_when:
  - Simulation results are unreliable or misleading
  related_patterns: [LivePreview, Feedback-loops, framing]
