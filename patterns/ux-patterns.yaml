    Ensure dropdowns are keyboard accessible.
  rationale: |-
    Drop-down menus save space by organising and concealing information. Drop-down menus are not regarded as a technique that increases usability, as they can often be difficult to use. Flyout menus allow for only showing top levels of the page’s hierarchy permanently, while still giving the option to show deeper levels on mouse over
    This article has been commented 2 times.
