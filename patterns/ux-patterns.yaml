- id: drag-and-drop
  name: Drag and Drop
  problem: Users need to reorder items, move content between containers, or upload files in a way that
    feels natural and direct.
  source_problem: The user needs to perform operations on one or more objects by moving them from one
    place to another.
  when_to_use:
  - Reordering lists or priority queues
  - Moving items between categories or columns (e.g., Kanban)
  - File upload interfaces
  solution: |
    Allow users to grab elements and move them to a new position or container.
    Provide clear visual affordances (grab handles, cursor changes).
    Show drop targets and insertion points during drag.
    Always provide a non-drag alternative for accessibility.
  rationale: >-
    Instinctively, many users try dragging and dropping objects in user interfaces. This conceptual metaphor
    with clear ties to the physical world provides a level of direct manipulation few methods can match.
    It is seen as one of the most effective ways to rearrange items in a list, move objects from one place
    to the other, or even upload files.
  discussion: >-
    As Drag and drop is not fully accessible you may want to consider supporting alternate ways to re-arrange
    your content modules.
  avoid_when:
  - Touch devices are the primary platform (unreliable gesture)
  - Items have a fixed, non-user-controlled order
  related_patterns: [keyboard-shortcuts, undo]
  tags: [input, interaction, reorder]
  source_url: https://ui-patterns.com/patterns/drag-and-drop
  votes:
