# UX Patterns Index — 170 patterns
# Format: id, p (problem), t (tags)

- id: drag-and-drop
  p: Users need to reorder items, move content between containers, or upload files in a way that feels
    natural and direct.
  t: [input, interaction, reorder]
- id: StructuredFormat
  p: Users must enter data in a specific format (phone numbers, dates, credit cards) but often get it
    wrong.
  t: [input, validation, forms]
- id: Captcha
  p: Bots submit forms, create fake accounts, or abuse services meant for humans.
  t: [input, security, forms]
- id: rule-builder
  p: Users need to define complex conditional logic (filters, automations, access rules) without writing
    code.
  t: [input, advanced, configuration]
- id: keyboard-shortcuts
  p: Frequent actions are slow when users must navigate menus or click through UI every time.
  t: [input, efficiency, power-users]
- id: InplaceEditor
  p: Navigating to a separate edit page creates friction for small content changes.
  t: [input, inline, editing]
- id: morphing-controls
  p: Static UI elements waste space or lack context when they could adapt to the current interaction state.
  t: [input, adaptive, interaction]
- id: FillInTheBlanks
  p: Traditional form layouts feel intimidating for complex configurations.
  t: [input, simplification, forms]
- id: PasswordStrengthMeter
  p: Users create weak, easily guessable passwords without realizing the risk.
  t: [input, security, feedback]
- id: InputFeedback
  p: Users submit forms only to discover errors, causing frustration and re-work.
  t: [input, validation, feedback]
- id: WYSIWYG
  p: Users need to create formatted content but don't know HTML or markup languages.
  t: [input, editing, content]
- id: autosave
  p: Users lose work when they forget to save, their browser crashes, or connection drops.
  t: [input, persistence, forms]
- id: CalendarPicker
  p: Typing dates leads to format confusion and errors.
  t: [input, dates, picker]
- id: LivePreview
  p: Users can't visualize the final result of their input until they submit.
  t: [input, feedback, preview]
- id: expandable-input
  p: Fixed-size input fields are either too small for long content or waste space for short content.
  t: [input, adaptive, forms]
- id: settings
  p: Users have different preferences and need to customize the application to work their way.
  t: [input, configuration, personalization]
- id: ForgivingFormat
  p: Users enter data in varied formats (with/without dashes, spaces, country codes) and get rejected.
  t: [input, tolerance, validation]
- id: InputPrompt
  p: An empty input field gives no indication of what the user should enter.
  t: [input, guidance, placeholder]
- id: undo
  p: Users make mistakes or change their mind but feel afraid to experiment without a safety net.
  t: [input, error-recovery, safety]
- id: GoodDefaults
  p: Users abandon forms that require too many decisions before they can proceed.
  t: [input, efficiency, forms]
- id: Wizard
  p: A complex task with many inputs overwhelms users when presented all at once.
  t: [input, process, step-by-step]
- id: InlineHelpBox
  p: Users need help understanding a feature without leaving the page or opening docs.
  t: [input, help, guidance]
- id: CompletenessMeter
  p: Users don't know how much of their profile or task they've completed.
  t: [input, progress, motivation]
- id: StepsLeft
  p: Users want to know how long a process will take before committing.
  t: [input, progress, transparency]
- id: RateContent
  p: Without user ratings, there's no way to surface the best content or products.
  t: [input, community, rating]
- id: pay-to-promote
  p: Users or businesses want their content to be seen by more people.
  t: [input, commerce, promotion]
- id: VoteToPromote
  p: Platform needs a democratic way to surface the best content.
  t: [input, community, curation]
- id: Wiki
  p: Knowledge needs to be created, maintained, and updated by the community, not a single author.
  t: [input, community, collaboration]
- id: flagging-and-reporting
  p: User-generated content platforms need a way for the community to identify harmful content.
  t: [input, community, moderation]
- id: NavigationTabs
  p: Users need to move between major sections of an application quickly.
  t: [navigation, tabs, structure]
- id: ModuleTabs
  p: A page section contains related but different views of the same data.
  t: [navigation, tabs, content]
- id: Breadcrumbs
  p: Users navigating deep hierarchies lose track of where they are and how to go back.
  t: [navigation, hierarchy, wayfinding]
- id: ShortcutDropdown
  p: Users repeatedly navigate to the same few items from a large collection.
  t: [navigation, efficiency, shortcuts]
- id: FatFooter
  p: Users who scroll to the bottom of a page need navigation options and useful links.
  t: [navigation, footer, discovery]
- id: modal-windows
  p: A subtask needs user attention without losing the context of the parent page.
  t: [navigation, overlay, focus]
- id: notifications
  p: Users miss important events, updates, or actions that require their attention.
  t: [navigation, alerts, awareness]
- id: HomeLink
  p: Users need a reliable, consistent way to start over or return to the main page.
  t: [navigation, home, wayfinding]
- id: VerticalDropdownMenu
  p: Many navigation items need to be organized but there isn't space to show them all.
  t: [navigation, menu, vertical]
- id: AccordionMenu
  p: A deep menu hierarchy needs to fit in a constrained sidebar or mobile view.
  t: [navigation, menu, expandable]
- id: HorizontalDropdownMenu
  p: Primary navigation needs to expose secondary options without cluttering the top bar.
  t: [navigation, menu, horizontal]
- id: AdaptableView
  p: Different users prefer different ways of viewing the same content (list, grid, map, table).
  t: [navigation, content, view-switching]
- id: ArticleList
  p: Multiple content items need to be scannable so users can find what interests them.
  t: [navigation, content, listing]
- id: Tag
  p: Content doesn't fit neatly into a single category and needs flexible cross-cutting labels.
  t: [navigation, content, taxonomy]
- id: Pagination
  p: Large datasets can't be loaded or displayed all at once without performance issues.
  t: [navigation, content, paging]
- id: categorization
  p: Content needs hierarchical organization so users can browse by topic.
  t: [navigation, content, organization]
- id: cards
  p: Heterogeneous content items need a consistent, scannable visual container.
  t: [navigation, content, layout]
- id: Carousel
  p: Multiple featured items need to share limited horizontal space.
  t: [navigation, content, slideshow]
- id: ProgressiveDisclosure
  p: Showing all options and information at once overwhelms users.
  t: [navigation, content, simplification]
- id: ContinuousScrolling
  p: Pagination interrupts the browsing flow for content users consume sequentially.
  t: [navigation, content, infinite-scroll]
- id: TagCloud
  p: Users want to see the most popular topics or categories at a glance.
  t: [navigation, content, visualization]
- id: Archive
  p: Older content still has value but shouldn't clutter current views.
  t: [navigation, content, history]
- id: EventCalendar
  p: Time-based events are hard to understand in a simple list format.
  t: [navigation, content, calendar]
- id: Thumbnail
  p: Users need to preview content visually before deciding to open it.
  t: [navigation, content, preview]
- id: favorites
  p: Users want quick access to items they use or visit frequently.
  t: [navigation, content, bookmarking]
- id: pull-to-refresh
  p: Mobile users need an intuitive way to check for new content.
  t: [navigation, mobile, gesture]
- id: AlternatingRowColors
  p: Dense table data is hard to read across long rows — eyes lose track of which row they're on.
  t: [data, tables, readability]
- id: TableFilter
  p: Users need to narrow down a large table to find specific rows.
  t: [data, tables, filtering]
- id: SortByColumn
  p: Users need to reorder data to find highest, lowest, newest, or alphabetically first items.
  t: [data, tables, sorting]
- id: frequently-asked-questions-faq
  p: Users repeatedly ask the same questions, overloading support channels.
  t: [data, content, self-service]
- id: dashboard
  p: Users need to monitor multiple metrics and statuses without navigating to separate pages.
  t: [data, overview, monitoring]
- id: CopyBox
  p: Users need to copy text, code, or URLs but selecting text manually is error-prone.
  t: [data, utility, clipboard]
- id: Gallery
  p: Users need to browse and view multiple images in an organized way.
  t: [data, images, browsing]
- id: Slideshow
  p: Images need to be presented sequentially in a focused, immersive way.
  t: [data, images, presentation]
- id: ImageZoom
  p: Users need to see fine details in an image that aren't visible at normal size.
  t: [data, images, detail]
- id: Autocomplete
  p: Users make typos, don't know exact terms, or type slowly when searching.
  t: [data, search, suggestions]
- id: LiveFilter
  p: Users want instant feedback as they narrow down a set of results.
  t: [data, search, real-time]
- id: testimonials
  p: Potential users or customers need reassurance from others who've already used the product.
  t: [social, reputation, trust]
- id: leaderboard
  p: Users lack motivation without knowing how they compare to peers.
  t: [social, reputation, competition]
- id: CollectibleAchievements
  p: Users want tangible proof of their accomplishments within the platform.
  t: [social, reputation, gamification]
- id: ActivityStream
  p: Users want to stay updated on what people in their network are doing.
  t: [social, feed, engagement]
- id: auto-sharing
  p: Manually sharing every action to social platforms is tedious.
  t: [social, sharing, automation]
- id: direct-messaging
  p: Users need to communicate privately within the platform.
  t: [social, messaging, communication]
- id: friend-list
  p: Users need to see and manage their social connections in one place.
  t: [social, connections, management]
- id: invite-friends
  p: Organic growth through existing users bringing in their contacts.
  t: [social, growth, referral]
- id: friend
  p: Users want to establish mutual connections with people they know.
  t: [social, connections, relationship]
- id: follow
  p: Users want to subscribe to another user's content without requiring mutual agreement.
  t: [social, connections, subscription]
- id: reaction
  p: Users want to respond to content quickly without writing a comment.
  t: [social, engagement, expression]
- id: Coupon
  p: Users need incentives to complete a purchase or try a product.
  t: [commerce, pricing, incentive]
- id: PricingTable
  p: Users need to compare plans or packages to choose the right one.
  t: [commerce, pricing, comparison]
- id: ProductPage
  p: Users need comprehensive information to make a confident purchase decision.
  t: [commerce, product, detail]
- id: ShoppingCart
  p: Users want to collect multiple items before committing to a purchase.
  t: [commerce, checkout, collection]
- id: TipAFriend
  p: Satisfied users don't have an easy way to recommend the product to others.
  t: [social, growth, word-of-mouth]
- id: coachmarks
  p: New users don't notice important UI elements in a complex interface.
  t: [onboarding, guidance, highlighting]
- id: playthrough
  p: Users learn best by doing, not by reading instructions.
  t: [onboarding, guidance, interactive]
- id: Guided-tour
  p: New users need a structured introduction to key features and workflow.
  t: [onboarding, guidance, walkthrough]
- id: inline-hints
  p: Users need contextual tips but a full tour would be too intrusive.
  t: [onboarding, guidance, contextual]
- id: Tour
  p: Users arriving at a complex app need a comprehensive overview before diving in.
  t: [onboarding, guidance, overview]
- id: BlankSlate
  p: Empty states (no data yet) confuse new users and miss an opportunity to guide them.
  t: [onboarding, guidance, empty-state]
- id: LazyRegistration
  p: Forcing users to register before they see value causes most to leave.
  t: [onboarding, registration, conversion]
- id: Paywall
  p: Premium content needs to be gated while showing enough to convince users to pay.
  t: [onboarding, registration, monetization]
- id: AccountRegistration
  p: Users need to create accounts but complex registration forms drive them away.
  t: [onboarding, registration, signup]
- id: Statusquo-bias
  p: Users prefer their current state and resist changes, even beneficial ones.
  t: [persuasion, cognition, bias]
- id: optimism-bias
  p: Users overestimate positive outcomes, which can be leveraged for engagement or managed for realistic
    expectations.
  t: [persuasion, cognition, bias]
- id: framing
  p: The same information presented differently leads to different user decisions.
  t: [persuasion, cognition, presentation]
- id: decoy-effect
  p: Users struggle to choose between two options and often defer the decision.
  t: [persuasion, cognition, pricing]
- id: ikea-effect
  p: Users don't value things they received for free as much as things they helped create.
  t: [persuasion, cognition, ownership]
- id: Loss-aversion
  p: Users are more motivated by avoiding losses than achieving equivalent gains.
  t: [persuasion, cognition, motivation]
- id: sunk-cost-effect
  p: Users are more likely to continue when they've already invested time or money.
  t: [persuasion, cognition, retention]
- id: Endowment-effect
  p: Users value things more once they feel ownership over them.
  t: [persuasion, cognition, ownership]
- id: Negativity-bias
  p: Negative experiences have disproportionate impact — one bad moment outweighs many good ones.
  t: [persuasion, cognition, risk]
- id: Illusion-of-control
  p: Users are more engaged and satisfied when they feel they influence outcomes.
  t: [persuasion, cognition, engagement]
- id: set-completion
  p: Users feel compelled to complete a collection once they've started it.
  t: [persuasion, cognition, motivation]
- id: present-bias
  p: Users prefer immediate rewards over larger future benefits.
  t: [persuasion, cognition, timing]
- id: delay-discounting
  p: Users devalue rewards the further away they are, making long-term engagement hard.
  t: [persuasion, cognition, timing]
- id: Need-for-closure
  p: Users feel uncomfortable with incomplete tasks or open-ended situations.
  t: [persuasion, cognition, completion]
- id: curiosity
  p: Users need a reason to explore deeper into the product or content.
  t: [persuasion, cognition, engagement]
- id: priming-effect
  p: Exposure to certain stimuli unconsciously influences subsequent behavior and perception.
  t: [persuasion, cognition, influence]
- id: Value-attribution
  p: Users judge quality based on superficial cues and first impressions.
  t: [persuasion, cognition, perception]
- id: Peakend-rule
  p: Users judge an experience by its most intense moment and its ending, not the average.
  t: [persuasion, cognition, experience]
- id: temptation-bundling
  p: Users avoid beneficial but unpleasant tasks.
  t: [persuasion, cognition, motivation]
- id: cashless-effect
  p: Digital payments don't trigger the same pain of spending as physical cash.
  t: [persuasion, cognition, spending]
- id: inaction-inertia-effect
  p: Users who miss one opportunity become less likely to act on the next, similar one.
  t: [persuasion, cognition, decision]
- id: choice-closure
  p: Users who keep second-guessing a decision experience less satisfaction.
  t: [persuasion, cognition, satisfaction]
- id: Limited-choice
  p: Too many options cause decision paralysis and lower satisfaction with the final choice.
  t: [persuasion, scarcity, simplification]
- id: Scarcity
  p: Users don't feel urgency when supply seems unlimited.
  t: [persuasion, scarcity, urgency]
- id: Limited-duration
  p: Without time pressure, users postpone decisions indefinitely.
  t: [persuasion, scarcity, urgency]
- id: Appropriate-challenge
  p: Tasks that are too easy are boring; too hard causes frustration and dropout.
  t: [gamification, design, difficulty]
- id: Storytelling
  p: Users disengage from purely functional interfaces without emotional connection.
  t: [gamification, design, narrative]
- id: Intentional-gaps
  p: Continuous access leads to saturation and declining engagement over time.
  t: [gamification, design, retention]
- id: investment-loops
  p: Users leave because they haven't built enough value to feel committed.
  t: [gamification, design, retention]
- id: periodic-events
  p: Routine use becomes monotonous without novelty.
  t: [gamification, design, engagement]
- id: hedonic-adaptation
  p: Users get used to rewards and features, requiring novelty to maintain the same level of excitement.
  t: [gamification, design, freshness]
- id: Levels
  p: Users need a sense of progression and growing mastery.
  t: [gamification, design, progression]
- id: self-monitoring
  p: Users can't improve what they can't measure.
  t: [gamification, design, analytics]
- id: Variable-rewards
  p: Predictable rewards become boring and lose motivational power.
  t: [gamification, rewards, engagement]
- id: Fixed-rewards
  p: Users need to know what they'll get for completing an action to feel motivated.
  t: [gamification, rewards, reinforcement]
- id: shaping
  p: Users give up on difficult tasks if they're not eased into them gradually.
  t: [gamification, rewards, progression]
- id: Completion
  p: Users want the satisfaction of finishing something 100%.
  t: [gamification, rewards, motivation]
- id: Powers
  p: Users want to feel special abilities or enhanced capabilities as they progress.
  t: [gamification, rewards, capability]
- id: Unlock-features
  p: Showing everything at once overwhelms new users and provides no growth incentive.
  t: [gamification, rewards, progression]
- id: delighters
  p: Routine interactions lack emotional moments that users remember and share.
  t: [gamification, rewards, delight]
- id: Achievements
  p: Users want recognition and visible proof of their accomplishments.
  t: [gamification, rewards, recognition]
- id: Praise
  p: Users don't receive positive reinforcement for completing desired actions.
  t: [gamification, rewards, feedback]
- id: appointment-dynamic
  p: Users don't have a reason to return at specific times.
  t: [gamification, rewards, retention]
- id: Prolonged-play
  p: Users have short sessions and don't engage deeply enough.
  t: [gamification, rewards, engagement]
- id: Tunnelling
  p: Users get distracted during critical processes and don't complete them.
  t: [persuasion, attention, focus]
- id: Reduction
  p: Complex tasks with many steps have high abandonment rates.
  t: [persuasion, attention, simplification]
- id: isolation-effect
  p: Everything looks the same and nothing stands out as important.
  t: [persuasion, attention, visual]
- id: picture-superiority-effect
  p: Text-heavy content is harder to remember and less engaging.
  t: [persuasion, attention, visual]
- id: zeigarnik-effect
  p: Completed tasks are quickly forgotten, but incomplete ones linger in memory.
  t: [persuasion, attention, retention]
- id: Chunking
  p: Large amounts of information overwhelm working memory (7±2 items).
  t: [persuasion, comprehension, organization]
- id: Anchoring
  p: Users need a reference point to evaluate whether a price or value is reasonable.
  t: [persuasion, comprehension, pricing]
- id: Serial-positioning-effect
  p: In a list, users remember the first and last items best, forgetting the middle.
  t: [persuasion, comprehension, layout]
- id: Recognition-over-recall
  p: Users struggle to remember exact terms, paths, or options from memory.
  t: [persuasion, comprehension, usability]
- id: Pattern-recognition
  p: Users waste time relearning interfaces that don't follow familiar conventions.
  t: [persuasion, comprehension, consistency]
- id: Conceptual-metaphor
  p: Abstract concepts are hard for users to understand without familiar reference points.
  t: [persuasion, comprehension, communication]
- id: Sequencing
  p: The order in which information or steps are presented affects comprehension and outcomes.
  t: [persuasion, comprehension, flow]
- id: Kairos
  p: Messages delivered at the wrong time are ignored or cause annoyance.
  t: [persuasion, feedback, timing]
- id: Feedback-loops
  p: Users can't see the consequences of their actions, so they don't learn or adjust.
  t: [persuasion, feedback, learning]
- id: Tailoring
  p: Generic one-size-fits-all content is less relevant and persuasive.
  t: [persuasion, feedback, personalization]
- id: Trigger
  p: Users forget to take action even when motivated, because they lack a prompt.
  t: [persuasion, feedback, activation]
- id: Simulation
  p: Users can't predict the outcome of their choices, leading to decision paralysis.
  t: [persuasion, feedback, preview]
- id: fresh-start-effect
  p: Users want to start new behaviors but feel weighed down by past performance.
  t: [persuasion, feedback, timing]
- id: Authority
  p: Users are uncertain and need guidance from a trusted expert source.
  t: [persuasion, social, trust]
- id: Liking
  p: Users are less persuaded by brands or interfaces they don't feel connected to.
  t: [persuasion, social, affinity]
- id: revenge
  p: Users who feel wronged may retaliate, even at cost to themselves.
  t: [persuasion, social, behavior]
- id: Roleplaying
  p: Users engage more deeply when they adopt a persona or role.
  t: [persuasion, social, identity]
- id: Self-expression
  p: Users want to showcase their individuality within the platform.
  t: [persuasion, social, identity]
- id: Reciprocation
  p: Users feel obligated to give back when they receive something.
  t: [persuasion, social, obligation]
- id: Social-proof
  p: Users are uncertain whether a product or action is the right choice.
  t: [persuasion, social, validation]
- id: cognitive-dissonance
  p: When users' actions don't align with their beliefs, they experience discomfort and seek to resolve
    it.
  t: [persuasion, social, consistency]
- id: Positive-mimicry
  p: Users adopt behaviors they see successful peers performing.
  t: [persuasion, social, imitation]
- id: Commitment-consistency
  p: Users are more likely to follow through on big asks if they've already made small commitments.
  t: [persuasion, social, conversion]
- id: reputation
  p: Without accountability, users may behave poorly in online communities.
  t: [persuasion, social, accountability]
- id: halo-effect
  p: One positive trait influences perception of everything else about a product or person.
  t: [persuasion, social, perception]
- id: nostalgia-effect
  p: Users have positive emotional associations with familiar past experiences.
  t: [persuasion, social, emotion]
- id: Competition
  p: Users need external motivation to perform better or engage more.
  t: [persuasion, social, motivation]
- id: autonomy
  p: Users lose motivation when they feel forced into specific actions.
  t: [persuasion, social, empowerment]
- id: Status
  p: Users want visible markers of their achievements and importance within a community.
  t: [persuasion, social, hierarchy]
- id: noble-edge-effect
  p: Users prefer brands that stand for something beyond profit.
  t: [persuasion, social, values]
