# UX Patterns Index — 170 patterns
# Format: id, p (problem), t (tags)
# Categories: Getting Input, Navigation, Dealing with Data, Social, Miscellaneous, Onboarding, Persuasive

# ── Getting Input > Forms ──

- id: drag-and-drop
  p: Users need to reorder or move items intuitively
  t: [input, interaction, reorder]

- id: StructuredFormat
  p: Input must follow a specific format but users make mistakes
  t: [input, validation, forms]

- id: Captcha
  p: Need to distinguish humans from bots on forms
  t: [input, security, forms]

- id: rule-builder
  p: Users need to create complex conditional logic without coding
  t: [input, advanced, configuration]

- id: keyboard-shortcuts
  p: Power users want faster ways to perform frequent actions
  t: [input, efficiency, power-users]

- id: InplaceEditor
  p: Users want to edit content without navigating away
  t: [input, inline, editing]

- id: morphing-controls
  p: UI elements need to transform based on context
  t: [input, adaptive, interaction]

- id: FillInTheBlanks
  p: Complex input can be simplified as sentence completion
  t: [input, simplification, forms]

- id: PasswordStrengthMeter
  p: Users create weak passwords without strength feedback
  t: [input, security, feedback]

- id: InputFeedback
  p: Users unsure if their input is valid while typing
  t: [input, validation, feedback]

- id: WYSIWYG
  p: Users need to format rich content without knowing markup
  t: [input, editing, content]

- id: autosave
  p: Users lose work when they forget to save or encounter errors
  t: [input, persistence, forms]

- id: CalendarPicker
  p: Users need to select dates accurately and quickly
  t: [input, dates, picker]

- id: LivePreview
  p: Users want to see results of their input in real time
  t: [input, feedback, preview]

- id: expandable-input
  p: Input field needs to accommodate varying content lengths
  t: [input, adaptive, forms]

- id: settings
  p: Users need to customize application behavior to their needs
  t: [input, configuration, personalization]

- id: ForgivingFormat
  p: Users enter data in various formats that should all be accepted
  t: [input, tolerance, validation]

- id: InputPrompt
  p: Users don't know what to enter in an empty field
  t: [input, guidance, placeholder]

- id: undo
  p: Users make mistakes and need to reverse actions easily
  t: [input, error-recovery, safety]

- id: GoodDefaults
  p: Users abandon forms that require too many decisions
  t: [input, efficiency, forms]

